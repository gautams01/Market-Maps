<!DOCTYPE html><html><head><meta charset="utf-8"><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;padding:10px;background:transparent;color:#1a1a1a}.ctrls{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;align-items:center}.ctrls input{padding:5px 10px;font-size:11px;border-radius:5px;border:1px solid #ccc;background:transparent;color:inherit;width:150px}.ctrls button{padding:4px 10px;font-size:11px;border-radius:5px;cursor:pointer;border:1px solid #ccc;background:transparent;color:inherit}.detail{padding:8px 12px;border-radius:6px;margin-bottom:8px;font-size:12px;line-height:1.5;border:1px solid #ddd;background:#f7f7f7;display:none;max-height:500px;overflow-y:auto}.detail.show{display:block}.bn-tag{font-size:9px;font-weight:600;padding:1px 4px;border-radius:3px;margin-left:6px;background:#fed7d7;color:#c53030}.tier-bar{font-size:10px;font-weight:500;color:#fff;padding:2px 8px;border-radius:5px 5px 0 0;display:flex;gap:6px;align-items:center}.tier-bar span{opacity:.5;font-size:8px}.tier-body{display:flex;flex-wrap:wrap;gap:2px;padding:4px 3px 8px;border-radius:0 0 5px 5px}.grp{border:1px solid #e2e2e2;border-radius:5px;padding:3px 4px 4px;flex:1 1 auto;min-width:65px}.grp-label{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.4px;color:#999;padding:0 2px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.grp-nodes{display:flex;flex-wrap:wrap;gap:2px}.nd{padding:3px 6px;border-radius:4px;cursor:pointer;border:1px solid #e0e0e0;transition:all .12s;position:relative;z-index:1;background:#fff}.nd:hover{border-color:#999}.nd-name{font-size:10.5px;font-weight:500;white-space:nowrap}.nd-tick{font-size:8.5px;font-family:monospace;color:#999}.nd.bn{border:2px solid #c53030}.nd.ai{background:linear-gradient(135deg,#1e40af,#1e3a8a)!important;border-color:#1e3a8a!important}.nd.ai .nd-name{color:#fff}.nd.ai .nd-tick{color:rgba(255,255,255,.65)}.nd.ai2{background:linear-gradient(135deg,#eff6ff,#e8f0fe)!important;border-color:#93c5fd!important}.nd.ai2 .nd-name{color:#3b6ead}.nd.ai2 .nd-tick{color:#7c8db5}.nd.ai.bn{background:linear-gradient(135deg,#7f1d1d,#6b1a1a)!important;border-color:#fca5a5!important}.nd.ai.bn .nd-name,.nd.ai.bn .nd-tick{color:#fff!important}.nd.ai.bn .bn-mark{color:#fca5a5!important}.nd.ai .bn-mark{color:#fca5a5}.nd.ai2.bn{background:linear-gradient(135deg,#fef8f8,#fef2f2)!important;border-color:#c53030!important}.nd.ai2.bn .nd-name{color:#991b1b}.nd.sel{background:#f59e0b!important;border:2px solid #f59e0b!important}.nd.sel .nd-name,.nd.sel .nd-tick{color:#fff!important}.nd.dim{opacity:.1;pointer-events:none}.bn-mark{font-size:7px;font-weight:700;margin-left:2px;color:#c53030;vertical-align:super}svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}</style></head><body>
<div class="ctrls"><input type="text" id="searchBox" placeholder="Search..." oninput="render()"><button id="clearBtn" onclick="sel=null;render()" style="display:none">Clear</button></div>
<div style="display:flex;gap:10px;flex-wrap:wrap;font-size:10px;color:#666;margin-bottom:8px;padding:6px 10px;border-radius:6px;background:#f8fafc;border:1px solid #e2e8f0"><span><span style="display:inline-block;width:14px;height:10px;border-radius:2px;background:linear-gradient(135deg,#7f1d1d,#6b1a1a);border:2px solid #fca5a5;vertical-align:-1px;margin-right:3px"></span>Primary AI + bottleneck</span><span><span style="display:inline-block;width:14px;height:10px;border-radius:2px;background:linear-gradient(135deg,#1e40af,#1e3a8a);border:1px solid #1e3a8a;vertical-align:-1px;margin-right:3px"></span>Primary AI</span><span><span style="display:inline-block;width:14px;height:10px;border-radius:2px;background:linear-gradient(135deg,#eff6ff,#e8f0fe);border:1px solid #93c5fd;vertical-align:-1px;margin-right:3px"></span>AI-adjacent</span><span><span style="display:inline-block;width:14px;height:10px;border-radius:2px;background:#fff;border:1px solid #e0e0e0;vertical-align:-1px;margin-right:3px"></span>Standard</span></div>

<div style="font-size:8px;color:#aaa;text-align:center;margin-top:6px">Click any node to see synopsis + supply chain.</div>
<script id="synData" type="application/json">{"shne": {"title": "Shin-Etsu Chemical", "bullets": ["Business: #1 silicon wafer manufacturer globally (~27% share) and uniquely also a top supplier of photoresists and photomask blanks \u2014 no other company spans all three critical lithography inputs. Revenue ~2.5T JPY ($17B+), net margin 21%. Electronics Materials: H1 FY2025 revenue 496B JPY (+7% YoY). Also #1 in PVC globally. Invested 150B JPY ($1B) in ultra-flat 300mm capacity for 2nm/3nm. Announced 500B JPY buyback (10.2% of shares). Top 5 wafer makers control 85% of 300mm \u2014 natural oligopoly with multi-year qualification cycles", "AI relevance: Every AI chip starts as a Shin-Etsu wafer. 300mm wafer demand is directly AI-anchored \u2014 TSMC, Samsung, Intel all expanding capacity for AI logic and HBM. Ultra-flat wafers for 2nm GAA command premium pricing. Photoresists are consumed in every EUV lithography step, and AI chips use more EUV layers than any prior generation", "Investment thesis:\n(1) Foundational position across three irreplaceable semiconductor materials.\n(2) AI-driven 300mm demand is the primary growth engine \u2014 capacity additions targeting 2nm/3nm.\n(3) PVC/silicones diversification provides revenue stability through semiconductor cycles.\n(4) 500B JPY buyback expected to boost EPS 9.2%.\n(5) Reasonable valuation (~18x forward P/E) for a monopoly-like franchise.", "Risks:\n(1) Cyclical wafer demand \u2014 long capex cycles mean supply can overshoot.\n(2) PVC division exposed to US housing weakness.\n(3) Chinese wafer competitors (NSIG, Zhonghuan) gaining share at mature nodes, pricing 10-15% below.\n(4) Yen appreciation reduces reported earnings.\n(5) Non-AI wafer demand still weak \u2014 recovery timing uncertain."]}, "sumc": {"title": "SUMCO", "bullets": ["Business: #2 silicon wafer manufacturer globally (~24% share). Pure-play wafer company (unlike diversified Shin-Etsu). Revenue ~400B JPY ($2.7B). Phasing out 200mm production at Miyazaki by end 2026 to focus exclusively on high-margin 300mm AI-grade wafers. SUMCO chairman is SEMI SMG chairman", "AI relevance: Same foundational position as Shin-Etsu \u2014 every advanced AI chip requires 300mm wafers. SUMCO chairman stated 300mm demand 'remains strong in AI-driven logic and HBM.' Strategic shift to 300mm-only concentrates the business on the AI-relevant segment", "Investment thesis:\n(1) Pure-play provides more direct leverage to AI wafer demand than diversified Shin-Etsu.\n(2) 200mm-to-300mm strategic shift concentrates on highest-growth, highest-margin segment.\n(3) Part of 85% oligopoly in 300mm \u2014 structural pricing power.\n(4) If AI-driven wafer demand accelerates, SUMCO benefits most directly as a pure-play.", "Risks:\n(1) More cyclical than Shin-Etsu \u2014 no PVC/silicones cushion.\n(2) Pricing pressure during demand softness.\n(3) Chinese competition at mature nodes.\n(4) 200mm phase-out creates transition risk if timing is off."]}, "glbw": {"title": "GlobalWafers", "bullets": ["Business: #3 silicon wafer manufacturer globally (~17% share). Taiwan-based. Building $7.5B fab in Sherman, Texas \u2014 first major US-based 300mm wafer facility. Phase 1 hit 300K wafers/year in Dec 2025, targeting 1.2M wafers/year by 2027. Backed by $406M in CHIPS Act grants. Lost Smart Cut SOI license from Soitec \u2014 exiting SOI market by 2027", "AI relevance: US-manufactured wafer supply is strategically important as TSMC, Intel, Samsung build American fabs. Co-location of wafer supply near customer fabs reduces logistics risk. CHIPS Act fabs will need local wafer sources", "Investment thesis:\n(1) Only major non-Japanese/Korean 300mm wafer source in the West \u2014 supply chain security premium.\n(2) CHIPS Act beneficiary ($406M grants) reduces capex burden on $7.5B Texas build.\n(3) Part of the 85% 300mm oligopoly.\n(4) US reshoring tailwind as new fabs come online 2026-2028.", "Risks:\n(1) $7.5B Texas fab is a massive bet \u2014 execution and utilization risk.\n(2) Lost SOI license limits product breadth.\n(3) Smaller scale than Shin-Etsu/SUMCO.\n(4) Taiwan geopolitical risk for headquarters/legacy operations."]}, "silt": {"title": "Siltronic AG", "bullets": ["Business: #5 silicon wafer manufacturer globally (~12% share). German-based. Failed acquisition by GlobalWafers in 2022 left it independent. Supplies European fabs and global foundries with 300mm and 200mm wafers", "AI relevance: European wafer supply for growing EU fab ecosystem. Less direct AI exposure than peers focused on leading-edge nodes, but all advanced fabs consume Siltronic wafers", "Investment thesis:\n(1) European manufacturing provides geographic diversification as EU CHIPS Act drives fab expansion.\n(2) Part of tight 300mm oligopoly.\n(3) Potential M&A target given strategic position and failed GlobalWafers deal.", "Risks:\n(1) Smaller scale limits cost competitiveness vs. Japanese peers.\n(2) Higher European cost base.\n(3) Less direct AI chip exposure than Shin-Etsu/SUMCO.\n(4) Failed merger limited strategic optionality."]}, "soit": {"title": "Soitec", "bullets": ["Business: Sole manufacturer of Photonics-SOI wafers (>95% share per BofA) using proprietary Smart Cut technology. Revenue 891M EUR (FY2025), down from 1B+ peak on smartphone/RF weakness. Three segments: Mobile Comms (RF-SOI/FD-SOI, 546M EUR), Auto & Industrial (SmartSiC, 129M EUR), Edge & Cloud AI (Photonics-SOI, ~100M EUR, growing 20-30%+ annually). GlobalWafers' license terminated (exits by 2027), Shin-Etsu licensed but not selling \u2014 no viable alternative exists", "AI relevance: The buried oxide layer in SOI wafers is physically irreplaceable for silicon photonics \u2014 you cannot build a SiPh waveguide without it. Every photonics chip at Tower Semi or GlobalFoundries sits on a Soitec wafer. As CPO scales for AI data centers, photonics wafer demand grows in direct proportion. NVIDIA Feynman reportedly integrates SiPh into the GPU package \u2014 if so, each GPU needs a photonics wafer", "Investment thesis:\n(1) Market is pricing Soitec on the struggling RF-SOI business (~3.2x P/S) while largely ignoring the photonics monopoly.\n(2) Tower is 5x-ing SiPh capacity in 2026, all on Soitec wafers.\n(3) Photonics-SOI growing 20-30%+ annually with no alternative supplier.\n(4) SmartSiC for EV power is a second growth vector using the same Smart Cut platform.", "Risks:\n(1) Core RF business in cyclical downturn, earnings negative (~-60M EUR).\n(2) Photonics revenue still small (~100M EUR) \u2014 CPO adoption timeline could extend.\n(3) Small market cap (~2.8B EUR) means volatility.\n(4) If a competitor qualifies an alternative Photonics-SOI substrate, the monopoly premium erodes."]}, "iqe": {"title": "IQE plc", "bullets": ["Business: Leading global supplier of III-V compound semiconductor epiwafers \u2014 grows epitaxial layers of InP, GaAs, GaN on substrates using MOCVD/MBE. Revenue ~97M GBP (FY2025), down from 118M in 2024. Wireless segment (GaAs for RF): 67M GBP in 2024, declined sharply in H1 2025 on handset weakness. Photonics segment (InP for lasers/sensors): ~50M GBP, growing on AI/data center demand. Exploring strategic review including potential sale of company. Near-breakeven EBITDA (~2M GBP in 2025). The only scaled, publicly traded pure-play outsourced III-V epiwafer supplier in the West", "AI relevance: Silicon cannot emit light \u2014 silicon photonics requires external III-V laser light sources grown on IQE epiwafers. Secured multiple Tier 1 customer design wins for laser and detector products enabling next-gen AI and hyperscale data center infrastructure. Launched 6-inch foundry platform for silicon photonics. As CPO volumes materialize, laser demand multiplies and IQE's wafers are the foundation layer", "Investment thesis:\n(1) Near-monopoly in outsourced III-V epitaxy \u2014 most laser companies depend on IQE for specialized epiwafers.\n(2) Photonics segment inflecting on AI/data center demand \u2014 'higher-than-forecasted photonics demand' in H2 2025.\n(3) Enters 2026 with 'strong first-quarter order book' across data center, AI photonics, and wireless.\n(4) Potential M&A target \u2014 strategic review ongoing, and the asset is irreplaceable.\n(5) Small market cap (~300-400M) relative to strategic importance \u2014 operating leverage on existing fab footprint if volumes materialize.", "Risks:\n(1) Persistent turnaround story with poor historical execution and margin compression.\n(2) Revenue declining (97M GBP vs 118M prior year) \u2014 near breakeven.\n(3) Wireless segment (~50% of revenue) exposed to handset cycle weakness.\n(4) Customer concentration \u2014 loss of any single major customer is material.\n(5) Competition from in-house epitaxy at Coherent, Lumentum.\n(6) Banking covenant waiver needed in Q4 2025 \u2014 balance sheet is tight."]}, "axt": {"title": "AXT Inc.", "bullets": ["Business: Manufacturer of InP, GaAs, and germanium bulk substrates \u2014 the raw crystalline wafers that IQE and laser companies grow epitaxial layers on. Revenue ~$90M trailing. Vertically integrated with partial ownership in Chinese raw material JVs. Substrates ~68% of revenue, raw materials ~32%. InP substrates surged 250% sequentially in Q3 2025 on data center demand. Order backlog exceeded $49M. Doubling InP capacity by end of 2026. Stock at $96 (May 2026), up ~92% over 12 months. Uses proprietary Vertical Gradient Freeze (VGF) crystal growth technology", "AI relevance: Bottom of the photonics supply chain. InP substrates are the base material for telecom/datacom lasers powering AI data center interconnects. No InP substrate = no laser = no optical transceiver. InP compound semiconductor market projected at 18% CAGR through 2031. 'Highly active time for our business with strong uptick in InP demand from data-center applications globally' \u2014 CEO Morris Young", "Investment thesis:\n(1) Top-3 global InP substrate supplier in a concentrated market where AI is driving 250% sequential demand surges.\n(2) Doubling InP capacity by end 2026 to meet backlog ($49M+).\n(3) InP market growing at 18% CAGR \u2014 structural tailwind from silicon photonics and coherent optics.\n(4) Re-obtained China export permits in 2025 \u2014 cleared key regulatory overhang.", "Risks:\n(1) China-based manufacturing creates ongoing export control risk \u2014 permits required for every customer order since Feb 2025.\n(2) Revenue is lumpy and permit-dependent \u2014 H1 2025 was severely disrupted.\n(3) Small company \u2014 customer concentration is rising (top 5 = 45% of revenue).\n(4) Commodity-like substrate business historically has limited pricing power.\n(5) Competition from Sumitomo Electric (Japan) and potential Chinese domestic suppliers."]}, "wolf": {"title": "Wolfspeed (SiC substrates)", "bullets": ["Business: #1 SiC substrate supplier in the West. Vertically integrated \u2014 grows SiC crystals, makes substrates, and fabricates SiC MOSFETs. Building 200mm SiC mega-fab (Mohawk Valley, NY) \u2014 $1.2B+ invested. Revenue ~$800M but operating at a loss during massive capacity build-out. Sold RF division to MACOM. Transitioning from 150mm to 200mm wafers for ~40% per-die cost reduction", "AI relevance: Indirect but growing. SiC power devices are used primarily in EV drivetrains but increasingly in data center power delivery. AI data centers consume enormous power \u2014 efficient SiC-based 48V-to-load conversion is becoming critical. Data center power semiconductor TAM expanding as GPU power consumption rises", "Investment thesis:\n(1) Dominant Western SiC substrate supplier with 200mm transition as a major competitive moat \u2014 larger wafers reduce per-die cost by ~40%.\n(2) Data center power delivery is an emerging growth vector beyond EV.\n(3) Deep crystal-growth expertise and IP portfolio in SiC.\n(4) If EV demand recovers and data center power scales, operating leverage on MV fab could be significant.", "Risks:\n(1) Burning significant cash during fab ramp \u2014 balance sheet pressure.\n(2) EV demand has been weaker than expected, core market is soft.\n(3) Chinese SiC suppliers growing rapidly.\n(4) Coherent expanding SiC substrate production as a direct competitor.\n(5) Execution risk on Mohawk Valley fab ramp."]}, "csic": {"title": "Coherent (SiC substrates)", "bullets": ["Business: SiC substrate division within diversified Coherent Corp. Produces 150mm/200mm SiC substrates inherited from II-VI acquisition. SiC is one segment alongside the larger optical transceivers and industrial lasers businesses", "AI relevance: Same dynamics as Wolfspeed \u2014 SiC for power conversion in data centers and EVs. Connected to Coherent's broader AI photonics portfolio", "Investment thesis:\n(1) SiC substrates benefit from diversified Coherent's scale and balance sheet.\n(2) Growing alternative to Wolfspeed for power device makers seeking second source.", "Risks:\n(1) SiC is secondary to Coherent's core optics business \u2014 may not get prioritized.\n(2) Wolfspeed is the larger, more established SiC player.\n(3) Chinese SiC competition."]}, "winm": {"title": "WIN Semiconductors", "bullets": ["Business: World's largest pure-play III-V compound semiconductor foundry \u2014 contract manufacturer of GaAs and GaN devices on 6-inch wafers. Taiwan-based. Revenue growing strongly on 5G and photonics demand (stock up ~228% YTD)", "AI relevance: Manufactures III-V components for 5G infrastructure and emerging photonics applications. As silicon photonics drives demand for III-V laser integration, WIN's foundry capability becomes more relevant for CPO component manufacturing", "Investment thesis:\n(1) Largest III-V foundry globally \u2014 capacity that would take years to replicate.\n(2) Deep process expertise in GaAs/GaN creates switching costs.\n(3) 5G mmWave and photonics are dual growth vectors.", "Risks:\n(1) Concentrated in III-V niche \u2014 small TAM vs. silicon foundries.\n(2) Taiwan geopolitical risk.\n(3) Competition from IDMs with in-house III-V fabs."]}, "aji": {"title": "Ajinomoto Co.", "bullets": ["Business: Sole manufacturer of ABF (Ajinomoto Build-up Film) \u2014 the critical insulation material laminated onto IC substrate cores to create build-up layers routing signals between chips and PCBs. Electronics segment ~500M revenue (electronics is <10% of total Ajinomoto, which is primarily a food company). Film is sold to all major IC substrate manufacturers globally. No qualified alternative material supplier exists at production scale \u2014 ABF has been one of the most supply-constrained materials in semiconductor", "AI relevance: Every advanced IC substrate under NVIDIA GPUs, AMD processors, Intel CPUs, and Broadcom ASICs uses Ajinomoto ABF film. As AI chip packages get larger and more complex, more ABF layers per substrate are needed. Substrate content per AI GPU is significantly higher than consumer chips \u2014 larger package = more ABF film consumed", "Investment thesis:\n(1) Absolute monopoly \u2014 sole supplier of ABF film qualified for advanced IC substrates. No competitor has replicated the material properties at scale.\n(2) AI GPU substrate demand is growing (larger packages = more ABF layers).\n(3) All substrate makers (Unimicron, Ibiden, Shinko, etc.) are captive customers \u2014 Ajinomoto has pricing power.\n(4) Substrate capacity expansion by customers drives proportional ABF demand.", "Risks:\n(1) Electronics is <10% of food-company Ajinomoto \u2014 limited pure-play investor access.\n(2) Japanese chemical companies are trying to qualify alternative materials.\n(3) Capacity additions take years \u2014 supply constraints could persist.\n(4) If glass substrates (LPKF/Intel) displace organic ABF substrates long-term, the monopoly is disrupted."]}, "tok": {"title": "Tokyo Ohka Kogyo (TOK)", "bullets": ["Business: Leading supplier of ArF, KrF, and EUV photoresists \u2014 the light-sensitive chemicals applied to wafers before every lithography step. Also thick resists for packaging. Revenue grows with wafer processing volume and mix shift to advanced (EUV) resists. Competitors include Shin-Etsu, Fujifilm, JSR (privatized 2024), Merck KGaA", "AI relevance: Every lithography step requires photoresist. EUV lithography (used for all AI chips at 7nm and below) requires specialized EUV resists with tighter specifications. More EUV layers per AI chip = more resist consumed. AI chips have more EUV layers than any prior generation", "Investment thesis:\n(1) Consumable material with direct volume leverage to AI chip wafer starts.\n(2) EUV resist commands premium pricing vs. legacy resists.\n(3) Deep co-development with TSMC and Samsung on EUV formulations creates qualification moat.\n(4) JSR privatization may reduce competitive intensity from one rival.", "Risks:\n(1) Cyclical with wafer starts.\n(2) Competition from Shin-Etsu (vertically integrated) and Fujifilm in EUV.\n(3) Resist is a small cost per wafer \u2014 limited pricing power vs. equipment companies.\n(4) High-NA EUV may require entirely new resist chemistries \u2014 development risk."]}, "entg": {"title": "Entegris", "bullets": ["Business: Broadest specialty materials portfolio in semiconductor \u2014 CMP slurries (via CMC Materials acquisition), contamination control (filters, purifiers), specialty gases, and deposition precursors. Revenue ~$3.6B. ~75% of revenue is consumable/recurring. Every advanced fab depends on Entegris materials across multiple process steps. Mission-critical contamination control where a single particle can kill a $20K wafer", "AI relevance: Advanced nodes require purer chemicals, tighter contamination control, and more CMP steps. Materials purity requirements become extreme at 2nm \u2014 Entegris content per wafer increases with node shrinks. CMP is performed after each deposition step, and AI chips have more deposition steps than any prior generation", "Investment thesis:\n(1) Consumable/recurring revenue model (~75%) provides stability through cycles.\n(2) Content per wafer increases at each new node \u2014 structural growth driver.\n(3) CMC acquisition made Entegris the CMP market leader.\n(4) Contamination control is mission-critical \u2014 failure is catastrophic, creating deep switching costs.", "Risks:\n(1) Debt from CMC acquisition.\n(2) Cyclical with wafer starts despite recurring revenue model.\n(3) Competition from DuPont and Japanese chemical companies.\n(4) China revenue exposure to export restrictions."]}, "hoya": {"title": "HOYA Corporation", "bullets": ["Business: Dominant supplier of EUV photomask blanks \u2014 ultra-pure, defect-free glass substrates coated with absorber materials that become photomasks. Duopoly with AGC (Asahi Glass). EUV blanks require extreme perfection \u2014 defect densities below 0.003/cm2 on multi-layer Mo/Si reflective coatings. Also makes optical glass, contact lenses, endoscopes (diversified)", "AI relevance: Critical chokepoint. Every EUV photomask starts as a HOYA (or AGC) blank. No blank = no mask = no EUV lithography = no advanced AI chip. Demand scales with number of EUV layers per chip design (increasing) and number of EUV-capable fabs (increasing)", "Investment thesis:\n(1) Duopoly in EUV mask blanks with technology barriers that are nearly insurmountable.\n(2) More EUV layers per chip design = more blanks consumed.\n(3) Growing number of EUV fabs expands the customer base.\n(4) High-NA EUV requires even tighter blank specifications \u2014 favors incumbents.", "Risks:\n(1) Photomask blanks are a small part of diversified HOYA \u2014 limited pure-play access.\n(2) AGC competition in the duopoly.\n(3) If alternative mask technologies emerge (nanoimprint), blank demand could shift.\n(4) Capacity-constrained market could attract new entrants long-term."]}, "plab": {"title": "Photronics", "bullets": ["Business: Largest independent photomask manufacturer \u2014 makes the patterned glass plates used in lithography to transfer circuit designs onto wafers. Revenue ~$900M. Each new chip design requires a mask set ($2-5M+ at leading edge). JV with TSMC in Taiwan and DNP in China. Invested in multi-beam mask writers for advanced nodes", "AI relevance: Every AI chip requires a complete mask set. More complex designs (chiplets, AI accelerators) often require more masks. However, leading-edge masks are increasingly made in-house by TSMC, Samsung, Intel captive mask shops \u2014 limiting Photronics' advanced-node TAM", "Investment thesis:\n(1) Largest merchant mask maker with JVs alongside TSMC and DNP.\n(2) New chip designs (AI accelerators, chiplets) drive mask demand.\n(3) Fab regionalization creates demand for local mask capacity.\n(4) Multi-beam mask writer investment extends capability to more complex nodes.", "Risks:\n(1) Leading-edge captive mask production at foundries limits TAM at advanced nodes.\n(2) Cyclical with design starts.\n(3) Capital-intensive.\n(4) Competition from Toppan and DNP."]}, "lin": {"title": "Linde plc", "bullets": ["Business: World's largest industrial gas company. Supplies electronic-grade gases (nitrogen, argon, hydrogen, helium, fluorine-based etch gases) to semiconductor fabs. On-site gas plants operate under 15-20 year contracts \u2014 essentially impossible to displace once installed. Electronics is ~20% of Linde revenue. Duopoly with Air Liquide in industrial gases", "AI relevance: Every semiconductor process (deposition, etch, cleaning) requires ultra-pure gases. More process steps at advanced AI chip nodes = more gas consumed. On-site gas plants are built when new fabs are constructed \u2014 CHIPS Act fabs are new long-term contracts", "Investment thesis:\n(1) 15-20 year on-site contracts create near-permanent recurring revenue.\n(2) CHIPS Act fab construction drives new contract wins.\n(3) Duopoly with Air Liquide \u2014 structural pricing power.\n(4) Gas purity requirements at advanced nodes favor established suppliers.", "Risks:\n(1) Electronics is only ~20% of diversified Linde \u2014 limited semiconductor leverage.\n(2) Modest growth profile vs. pure-play semiconductor names.\n(3) Capital-intensive on-site plants require upfront investment."]}, "lwlg": {"title": "Lightwave Logic", "bullets": ["Business: Developing electro-optic (EO) polymer materials for photonic modulators in silicon photonics circuits. Pre-revenue \u2014 ~$237K total revenue on ~$1.15B market cap (~4,800x P/S). Partnerships with Tower Semiconductor and GlobalFoundries to integrate EO polymers into SiPh foundry processes. Gross margin on tiny sales is 97%. Stock surged from $0.79 to ~$8 over 52 weeks", "AI relevance: EO polymers could enable higher-performance, lower-power optical modulators in silicon photonics PICs for AI data center CPO. If EO polymers become standard in SiPh manufacturing, every CPO transceiver would use Lightwave Logic material. Tower and GF integration partnerships signal potential adoption", "Investment thesis:\n(1) Pure optionality on EO polymers becoming standard for SiPh modulators.\n(2) Tower and GlobalFoundries partnerships provide credibility and path to production.\n(3) If CPO volumes materialize with EO polymer integration, revenue inflection would be dramatic.\n(4) Small market cap means massive upside if the technology wins.", "Risks:\n(1) Pre-revenue \u2014 $1.15B market cap on essentially zero sales.\n(2) Pure speculation on future technology adoption.\n(3) Alternative modulator approaches (silicon, thin-film LiNbO3) may win instead.\n(4) Long timeline to production \u2014 years of qualification ahead.\n(5) Needs to prove EO polymers work reliably at production scale and temperature."]}, "lpkf": {"title": "LPKF Laser & Electronics", "bullets": ["Business: Makes LIDE (Laser Induced Deep Etching) systems for glass substrate processing \u2014 creates crack-free through-glass vias (TGVs). Operates Vitrion glass foundry. Revenue ~115M EUR (2025) but semiconductor revenue is essentially zero today \u2014 stock rallied ~300% in 2025 on anticipation. Operating at a loss (net loss 14.3M EUR). Other segments: laser plastic welding, solar scribing", "AI relevance: Glass substrates are emerging as a potential successor to organic (ABF) substrates for advanced packaging \u2014 better electrical properties, lower warpage, and ability to integrate optical waveguides for CPO. If glass replaces ABF for high-end AI chip packages, LPKF's LIDE technology would be the enabling manufacturing process. Intel, TSMC, Samsung all evaluating glass substrates", "Investment thesis:\n(1) LIDE technology is proprietary \u2014 no competitor has demonstrated equivalent crack-free TGV processing at scale.\n(2) Glass substrates could combine electrical and optical functions, disrupting both ABF (Ajinomoto) and separate SiPh PICs.\n(3) Vitrion foundry provides vertical integration.\n(4) If glass becomes standard for AI chip packaging, TAM expands from ~100M EUR to multi-billion.", "Risks:\n(1) Extremely speculative \u2014 semiconductor revenue is zero today.\n(2) 300% stock rally built entirely on future expectations.\n(3) Glass substrate qualification could take 2-5+ years at major fabs.\n(4) ABF technology continues improving \u2014 Ajinomoto is not standing still.\n(5) Operating at a loss, small company (~570M EUR market cap).\n(6) Solar segment in sharp decline."]}, "shpr": {"title": "Shin-Etsu (Photoresists)", "bullets": ["Business: See Shin-Etsu main entry \u2014 also a leading photoresist supplier (ArF/EUV) alongside its dominant silicon wafer position. Unique in spanning wafers + resists + mask blanks", "AI relevance: EUV photoresists consumed in every lithography step for AI chips. More EUV layers per design = more resist consumed", "Investment thesis:\n(1) Synergies from supplying three critical lithography inputs to the same customers.\n(2) See Shin-Etsu main entry for full thesis.", "Risks:\n(1) See Shin-Etsu main entry."]}, "sumc2": {"title": "Sumitomo Chemical", "bullets": ["Business: Japanese chemical conglomerate producing photoresists and electronic materials for semiconductor manufacturing. Photoresists are one division alongside petrochemicals, energy, pharma. Competes with TOK, Shin-Etsu, Fujifilm in resist market", "AI relevance: Photoresists consumed in AI chip lithography. Benefits from volume growth at advanced nodes but is not a dominant player vs. TOK or Shin-Etsu", "Investment thesis:\n(1) Diversified chemical company with semiconductor materials exposure.\n(2) Benefits from overall EUV resist demand growth.", "Risks:\n(1) Semiconductor is a small part of diversified Sumitomo.\n(2) Competitive resist market with multiple strong players."]}, "fuji2": {"title": "Fujifilm Holdings", "bullets": ["Business: Diversified Japanese company (imaging, healthcare, materials) producing photoresists and CMP slurries for semiconductor manufacturing. Electronic materials are a growth segment within the larger Fujifilm portfolio", "AI relevance: EUV photoresist supplier \u2014 benefits from advanced node lithography demand growth", "Investment thesis:\n(1) Growing electronic materials division within diversified Fujifilm.\n(2) EUV resist co-development with major fabs.", "Risks:\n(1) Semiconductor is a small part of diversified Fujifilm.\n(2) Competitive market \u2014 TOK and Shin-Etsu are ahead in EUV resist."]}, "ddpr": {"title": "DuPont", "bullets": ["Business: US chemicals company supplying photoresists, CMP slurries, and advanced packaging materials to semiconductor fabs. Electronic materials is a focused growth segment within DuPont's broader specialty chemicals portfolio", "AI relevance: Materials consumed across every AI chip manufacturing process \u2014 photoresists for lithography, CMP slurries for planarization, packaging materials for assembly. Content per wafer increases at advanced nodes", "Investment thesis:\n(1) Broad electronic materials portfolio serving multiple fab process steps.\n(2) Advanced packaging materials growing with chiplet/HBM trends.\n(3) US-based supplier benefits from reshoring.", "Risks:\n(1) Semiconductor is one division of diversified DuPont.\n(2) Competition from Entegris (CMP), TOK (resist), and Japanese chemical companies.\n(3) Cyclical with wafer starts."]}, "mrkd": {"title": "Merck KGaA", "bullets": ["Business: German specialty chemicals company (not US Merck) producing deposition precursors, CMP materials, and photoresists for semiconductor manufacturing. Electronics segment is a strategic growth area alongside healthcare and life science", "AI relevance: Deposition precursors consumed in thin-film deposition for AI chips. Benefits from process complexity increase at advanced nodes", "Investment thesis:\n(1) Specialty deposition materials for advanced nodes.\n(2) European supplier diversifies fab material sourcing.", "Risks:\n(1) Semiconductor is a minority of total Merck KGaA revenue.\n(2) Competitive materials market."]}, "fjmi": {"title": "Fujimi Inc.", "bullets": ["Business: Japanese manufacturer of CMP slurries and polishing materials for semiconductor wafer planarization. Competes with Entegris (CMC) and DuPont in CMP consumables", "AI relevance: CMP is performed after each deposition step \u2014 more layers at advanced AI chip nodes = more CMP consumed", "Investment thesis:\n(1) CMP consumables grow with process complexity.\n(2) Established position in Japanese fab ecosystem.", "Risks:\n(1) Entegris/CMC is the larger CMP player.\n(2) Niche market within broader chemicals."]}, "ddcm": {"title": "DuPont (CMP)", "bullets": ["Business: See DuPont main entry \u2014 CMP slurries are one product line within DuPont's electronic materials division", "AI relevance: See DuPont main entry", "Investment thesis:\n(1) See DuPont main entry.", "Risks:\n(1) See DuPont main entry."]}, "aifp": {"title": "Air Liquide", "bullets": ["Business: #2 industrial gas company globally (duopoly with Linde). Supplies electronic-grade gases to semiconductor fabs under long-term on-site contracts. Electronics is ~15-20% of total Air Liquide revenue", "AI relevance: Same dynamics as Linde \u2014 every fab process requires ultra-pure gases. On-site contracts at new CHIPS Act fabs create long-term revenue", "Investment thesis:\n(1) 15-20 year on-site contracts create durable recurring revenue.\n(2) New fab construction drives contract wins.\n(3) Duopoly with Linde \u2014 structural pricing power.", "Risks:\n(1) Electronics is a minority of diversified Air Liquide.\n(2) Modest growth vs. pure-play semiconductor names."]}, "apd": {"title": "Air Products", "bullets": ["Business: US industrial gas company supplying specialty gases for semiconductor manufacturing. Smaller semiconductor exposure than Linde or Air Liquide", "AI relevance: Specialty gases consumed in fab processes. Benefits from overall fab capacity growth", "Investment thesis:\n(1) Specialty gas supplier benefiting from fab expansion.\n(2) US-based \u2014 positioned for CHIPS Act fab supply.", "Risks:\n(1) Smaller semiconductor exposure than Linde/Air Liquide.\n(2) Company has been focused on hydrogen/clean energy \u2014 semiconductor is secondary."]}, "topp": {"title": "Toppan Holdings", "bullets": ["Business: Japanese photomask manufacturer \u2014 one of the major merchant mask shops alongside Photronics and DNP. Also a large printing/packaging company. Competes for mask orders with foundry captive mask shops", "AI relevance: Photomasks required for every AI chip design. Benefits from new chip tape-outs and advanced node mask complexity", "Investment thesis:\n(1) Established mask manufacturer with global customer base.\n(2) New AI chip designs drive mask demand.", "Risks:\n(1) Captive mask shops at TSMC/Samsung/Intel limit merchant TAM at leading edge.\n(2) Photomasks are a small part of diversified Toppan."]}, "dnp": {"title": "Dai Nippon Printing (DNP)", "bullets": ["Business: Japanese photomask and nanoimprint template manufacturer. JV with AXT in China. Also developing nanoimprint lithography (NIL) templates as a potential future patterning approach for memory", "AI relevance: Photomasks for chip manufacturing. NIL technology could be relevant for future memory patterning", "Investment thesis:\n(1) Photomask business benefits from design activity.\n(2) NIL technology is an interesting long-term optionality.", "Risks:\n(1) Masks are a small part of diversified DNP.\n(2) NIL adoption remains unproven at scale."]}, "shne2": {"title": "Shin-Etsu (Mask Blanks)", "bullets": ["Business: See Shin-Etsu main entry \u2014 also supplies photomask blanks alongside HOYA in the EUV mask blank duopoly", "AI relevance: EUV mask blanks are essential for every advanced AI chip mask set", "Investment thesis:\n(1) See Shin-Etsu main entry.", "Risks:\n(1) See Shin-Etsu main entry."]}, "mtrn": {"title": "Materion Corporation", "bullets": ["Business: US manufacturer of sputtering targets and advanced materials \u2014 beryllium, precious metals, and alloy targets for thin-film PVD deposition in semiconductor fabs", "AI relevance: Sputtering targets are consumed in PVD deposition for interconnect metallization in every chip. Volume scales with wafer starts", "Investment thesis:\n(1) Niche materials supplier with specialized metallurgy expertise.\n(2) Consumable targets grow with wafer production volume.", "Risks:\n(1) Small, niche market.\n(2) Competition from JX Nippon Mining (ENEOS) and Tosoh."]}, "eneo": {"title": "ENEOS Holdings", "bullets": ["Business: Japanese energy/materials conglomerate. JX Nippon Mining subsidiary produces copper and tantalum sputtering targets for semiconductor interconnect deposition", "AI relevance: Copper targets used for chip interconnect metallization. Benefits from wafer volume growth", "Investment thesis:\n(1) Niche materials position within large conglomerate.", "Risks:\n(1) Semiconductor is a tiny part of energy-focused ENEOS."]}, "toso": {"title": "Tosoh Corporation", "bullets": ["Business: Japanese chemicals company producing sputtering targets (ITO, zinc oxide) for semiconductor and display manufacturing", "AI relevance: Limited direct \u2014 sputtering targets for thin-film deposition. More display-focused than semiconductor", "Investment thesis:\n(1) Niche sputtering target supplier.", "Risks:\n(1) Limited semiconductor relevance.\n(2) Display market exposure."]}, "resc": {"title": "Resonac (electronic chemicals)", "bullets": ["Business: Formerly Showa Denko Materials + Showa Denko, rebranded as Resonac. Produces electronic chemicals, photoresists, CMP materials for semiconductor fabs. Also produces bonding wire, die-attach film for packaging (see packaging materials entry). Stock up ~160% combined 2025+2026", "AI relevance: Chemicals consumed across fab and packaging processes. Benefits from overall semiconductor volume growth and advanced packaging expansion", "Investment thesis:\n(1) Broad electronic materials portfolio spanning fab chemicals and packaging materials.\n(2) Strong stock performance suggests market recognizing AI semiconductor materials leverage.\n(3) Japanese manufacturing quality and deep domestic customer relationships.", "Risks:\n(1) Competition from Entegris, DuPont, and other Japanese chemical companies.\n(2) Cyclical with semiconductor volumes."]}, "mitc": {"title": "Mitsubishi Chemical Group", "bullets": ["Business: Japanese chemical conglomerate producing electronic chemicals and specialty materials for semiconductor manufacturing", "AI relevance: Chemicals consumed in fab processes. Benefits from overall semiconductor growth", "Investment thesis:\n(1) Diversified chemical company with semiconductor exposure.", "Risks:\n(1) Semiconductor is a small part of huge conglomerate.\n(2) Competitive market."]}, "entg2": {"title": "Entegris (electronic chemicals)", "bullets": ["Business: See Entegris main entry \u2014 also produces electronic chemicals and specialty gases alongside CMP slurries and contamination control", "AI relevance: See Entegris main entry", "Investment thesis:\n(1) See Entegris main entry.", "Risks:\n(1) See Entegris main entry."]}, "resp": {"title": "Resonac (packaging materials)", "bullets": ["Business: Produces bonding wire, die-attach film, and encapsulation materials \u2014 essential consumables for semiconductor packaging. Every packaged chip uses bonding materials. See Resonac electronic chemicals entry for broader company context", "AI relevance: Packaging materials consumed in every AI chip assembly. Advanced packaging (HBM stacking, chiplets) uses more materials per package", "Investment thesis:\n(1) Consumable packaging materials with direct volume leverage to chip production.\n(2) Advanced packaging drives higher material content per package.", "Risks:\n(1) Commodity-like materials with competitive pricing.\n(2) Cyclical with semiconductor assembly volumes."]}, "henk": {"title": "Henkel", "bullets": ["Business: German consumer/industrial conglomerate producing underfill adhesives, die-attach materials, and thermal interface materials for semiconductor packaging. Electronics is a small specialty division", "AI relevance: Underfill materials in advanced packages for AI chips. As AI chip power and thermal requirements increase, thermal interface materials become more critical", "Investment thesis:\n(1) Niche position in advanced packaging materials.\n(2) Thermal management materials grow with GPU power dissipation.", "Risks:\n(1) Semiconductor is a tiny part of huge Henkel conglomerate.\n(2) Competitive specialty chemicals market."]}, "nags": {"title": "Nagase & Co.", "bullets": ["Business: Japanese trading company distributing epoxy molding compounds and electronic materials to the semiconductor packaging industry", "AI relevance: Limited direct \u2014 materials distribution for packaging", "Investment thesis:\n(1) Benefits from overall semiconductor packaging volume growth.", "Risks:\n(1) Distribution business with limited moat.\n(2) Small semiconductor relevance within diversified trading company."]}, "asml": {"title": "ASML", "bullets": ["Business: Sole supplier of EUV lithography systems \u2014 100% market share in EUV, no competitor has a production-ready tool. Revenue 32.7B EUR (2025, +15% YoY), EPS 24.73 EUR (+28.5%). Gross margin 52.8%. Backlog 38.8B EUR at year-end 2025. EUV system revenue 11.6B EUR (+39%), recognized 48 EUV systems. High-NA EUV (EXE:5200B) now shipping at $380-478M per unit. Installed Base Management 8.2B EUR (+26%). Guided 36-40B EUR for 2026 (raised from 34-39B after Q1). Long-term target: 44-60B EUR by 2030. Q1 2026 gross margin 53-54%. Invested 1.3B EUR in Mistral AI for AI-driven lithography optimization", "AI relevance: Every advanced AI chip at 7nm and below REQUIRES EUV lithography \u2014 there is zero alternative. TSMC, Samsung, Intel, SK Hynix all depend on ASML for AI chip and HBM production. SK Hynix ordered ~$8B of EUV tools for HBM. Samsung securing ~20 EUV systems for new fab. 'AI customers fundamentals remain strong' \u2014 ASML CEO. Litho intensity (EUV layers per chip) continues increasing, meaning each new AI chip generation needs more ASML tools", "Investment thesis:\n(1) True monopoly \u2014 ~30 years and ~$10B+ cumulative R&D created barriers no competitor can replicate.\n(2) 38.8B EUR backlog provides multi-year revenue visibility \u2014 effectively sold out.\n(3) High-NA EUV ramp (2nm and beyond) extends technology lead and raises ASPs.\n(4) China revenue falling from 36% to 19% is being replaced by higher-margin EUV demand from AI customers \u2014 mix improves.\n(5) Services growing 26% YoY with 50 consecutive quarters of growth \u2014 installed base creates decades of recurring revenue.\n(6) 2030 guide of 44-60B EUR implies 7-12% revenue CAGR with margin expansion.", "Risks:\n(1) Trades at ~30x forward earnings \u2014 premium valuation vs. 22-25x for equipment peers.\n(2) China revenue normalization (from ~30% to ~19%) creates near-term headwinds.\n(3) Customer concentration (TSMC is ~35% of revenue).\n(4) Any AI capex slowdown would impact orders with 12-18 month lag.\n(5) High-NA adoption pace is uncertain \u2014 customers need to justify $380M+ per tool.\n(6) Geopolitical risk around Taiwan (TSMC is largest customer)."]}, "nikn": {"title": "Nikon", "bullets": ["Business: ArF immersion and i-line lithography for mature/specialty nodes (28nm+). Also cameras and precision optics. Distant #2 in litho behind ASML. Cannot compete in EUV", "AI relevance: Limited direct AI exposure \u2014 Nikon litho serves mature nodes, not leading-edge AI chips. Benefits from overall wafer start growth and CHIPS Act specialty fab expansion", "Investment thesis:\n(1) Mature-node fab expansion (automotive, IoT, power) drives DUV demand.\n(2) CHIPS Act-funded legacy fabs need DUV lithography.", "Risks:\n(1) Secular share loss to ASML in lithography.\n(2) Camera business declining.\n(3) Irrelevant to leading-edge AI chip production."]}, "canl": {"title": "Canon", "bullets": ["Business: i-line and KrF lithography for legacy nodes. Developing nanoimprint lithography (NIL) as potential alternative patterning. Semiconductor litho is a small part of Canon's imaging/printing conglomerate", "AI relevance: Minimal for current products. NIL is an interesting wildcard for future memory patterning but unproven at high volume", "Investment thesis:\n(1) NIL technology could disrupt lithography for specific memory applications.\n(2) Legacy node litho benefits from overall fab expansion.", "Risks:\n(1) Tiny semiconductor revenue vs. total Canon.\n(2) NIL adoption risk \u2014 may never reach production scale.\n(3) Irrelevant to leading-edge AI chips."]}, "amat": {"title": "Applied Materials", "bullets": ["Business: #1 semiconductor equipment company by revenue (~$27B). Broadest portfolio \u2014 deposition (CVD, PVD, ALD, epi), etch, CMP, ion implant, inspection. ~70% Semiconductor Systems, ~25% Applied Global Services (recurring), ~5% Display. Bundles into Integrated Materials Solutions (IMS) for cross-sell. 42% of etch revenue from IMS in 2025. Sculpta patterning system for EUV edge placement at $1.8M ASP. Gross margins ~47%", "AI relevance: Critical across multiple vectors. GAA transistors at 2nm require more deposition/etch steps. HBM stacking requires precision bonding and thin-film deposition. Advanced packaging (CoWoS, hybrid bonding) is a fast-growing new market. Every process complexity increase at advanced nodes adds more AMAT tool steps per wafer", "Investment thesis:\n(1) Broadest product portfolio creates cross-selling leverage \u2014 customers often standardize on AMAT.\n(2) GAA transistor transition drives more deposition/etch steps per wafer.\n(3) Advanced packaging equipment is a fast-growing adjacent market.\n(4) Services (~25% of revenue) provides stability through cycles.\n(5) Sculpta and other new tools extend competitive position.", "Risks:\n(1) China export controls impact ~25-30% of historical revenue.\n(2) Cyclical semiconductor capex.\n(3) Strong competition from Lam Research and TEL in deposition/etch \u2014 AMAT is not a monopoly like ASML.\n(4) KLA gaining share in inspection at AMAT's expense."]}, "lrcx": {"title": "Lam Research", "bullets": ["Business: Dominant in plasma etch and deposition, especially high-aspect-ratio etch for 3D NAND (200+ layers) and HBM TSVs. Revenue ~$16B+. CSBG (services) is ~30% of revenue and growing. Signed $2.3B multi-year tool agreement with SK Hynix for HBM3E/HBM4 etch in late 2025. ~45-50% etch market share", "AI relevance: Very high. 3D NAND scaling (200+ layers) and HBM manufacturing both require Lam's high-aspect-ratio etch. More NAND layers = more etch steps. HBM through-silicon-via (TSV) etching is critical for memory stacking. Advanced packaging etch growing \u2014 Lam predicts 40% advanced packaging growth in 2026", "Investment thesis:\n(1) Market leader in semiconductor etch with ~45-50% share.\n(2) $2.3B SK Hynix HBM deal demonstrates direct AI/HBM leverage.\n(3) 3D NAND 200+ layers drives more etch steps per wafer \u2014 structural growth.\n(4) Advanced packaging etch growing 40% in 2026.\n(5) Recurring services (~30%) provides cycle stability.", "Risks:\n(1) Heavy memory exposure (~50%+ of revenue) makes Lam cyclical.\n(2) China restrictions \u2014 formed $320M JV with NAURA for localization.\n(3) If NAND investment slows, Lam is disproportionately affected.\n(4) Competition from TEL and AMAT in etch."]}, "tel_e": {"title": "Tokyo Electron (TEL)", "bullets": ["Business: #2 semiconductor equipment company globally (~$18B / 2.5T JPY). #1 in coater/developers (monopoly-like \u2014 applies and develops photoresist for every lithography step). Also top-tier in etch, deposition, cleaning, thermal processing. >75% of revenue outside Japan. Co-developed cryogenic etch with TSMC for 2nm backside power rails", "AI relevance: TEL's coater/developer is required for every lithography step \u2014 EUV and DUV. As AI chips require more patterning layers, TEL benefits directly. Growing in etch and deposition for GAA and HBM. Every EUV exposure needs a TEL coater/developer \u2014 litho intensity increase means more TEL tools per fab", "Investment thesis:\n(1) Coater/developer monopoly ensures TEL participates in every lithography step at every fab.\n(2) Top-3 in etch alongside Lam and AMAT \u2014 competitive across multiple process steps.\n(3) Co-development with TSMC on cryogenic etch for 2nm demonstrates technology leadership.\n(4) Excellent cost structure and execution \u2014 strong margins for a Japanese equipment company.", "Risks:\n(1) China revenue exposure.\n(2) Competition from AMAT and Lam in deposition/etch.\n(3) Yen fluctuation impacts reported results.\n(4) Cyclical with semiconductor capex."]}, "asmi": {"title": "ASM International", "bullets": ["Business: Market leader in ALD (atomic layer deposition) with ~55% share. Pure-play on ALD/epitaxy \u2014 narrower than AMAT/Lam/TEL but deeper expertise. Revenue ~2.8B EUR. ALD deposits one atomic layer at a time \u2014 the most precise thin-film technique. Premium pricing and margins", "AI relevance: High. GAA transistors at 2nm require 2-3x more ALD steps than FinFET \u2014 ALD is essential for gate dielectrics, work function metals, and spacers in GAA. As AI chips push to 2nm/1.4nm, ALD content per wafer increases substantially. ASM's position becomes MORE critical, not less, as transistor architecture evolves", "Investment thesis:\n(1) ~55% ALD market share \u2014 leadership in the most critical deposition technique for GAA.\n(2) GAA transition drives 2-3x ALD step increase vs. FinFET \u2014 structural content growth.\n(3) Deep co-development with TSMC for N2/A16 nodes.\n(4) CFET (complementary FET) architecture will further increase ALD steps.\n(5) High barriers \u2014 ALD requires extreme precision and years of qualification.", "Risks:\n(1) Customer concentration \u2014 TSMC is ~40%+ of revenue.\n(2) If GAA adoption delays, growth slows.\n(3) TEL and AMAT expanding ALD portfolios \u2014 competitive pressure.\n(4) Narrow product focus vs. diversified equipment peers."]}, "klac": {"title": "KLA Corporation", "bullets": ["Business: Dominant process control company \u2014 wafer inspection, metrology, reticle inspection, yield management software. Revenue ~$12B+. Q2 FY2026: $3.3B (beat). ~55-60% share of overall inspection/metrology, ~75-80% in patterned wafer inspection. Gross margin ~61-62%. ROIC averages 35%+. Advanced packaging revenue ~$950M in CY2025 (+70% YoY), targeting ~$1B in 2026. Services: 50 consecutive quarters of YoY growth targeting 12-14% CAGR. $7B share buyback + 21% dividend increase announced", "AI relevance: Essential. A 3nm wafer costs ~$21,760 with ~650 dies \u2014 a missed defect can scrap the entire wafer. As AI chips push to 2nm with GAA, defect budgets tighten dramatically. Yield is the revenue metric. KLA's inspection determines whether AI chip production is economically viable. Advanced packaging inspection (~$1B) growing 70%+ YoY on CoWoS/HBM demand. 'KLA enables the manufacturability of NVIDIA's AI chips'", "Investment thesis:\n(1) 55-60% share and GAINING \u2014 every competitor lost share in 2025. Market leadership is expanding.\n(2) Inspection scales with process COMPLEXITY, not just volume \u2014 structurally less cyclical than processing equipment.\n(3) Advanced packaging revenue growing 70% YoY to ~$1B \u2014 new TAM opening.\n(4) 50 consecutive quarters of services growth \u2014 massive installed base creates durable recurring revenue.\n(5) Gross margins >60%, ROIC >35% \u2014 best-in-class returns in semiconductor equipment.\n(6) $7B buyback + 21% dividend increase signals confidence.", "Risks:\n(1) Trades at premium (~30x forward P/E) reflecting quality.\n(2) China export controls.\n(3) Competition from ASML in computational metrology.\n(4) Lasertec dominates EUV mask inspection specifically.\n(5) Customer concentration in leading-edge foundries."]}, "lase": {"title": "Lasertec Corporation", "bullets": ["Business: SOLE supplier of actinic (at-wavelength) EUV photomask inspection tools. Revenue ~150B JPY ($1B+). Revenue grew >5x in 5 years driven by EUV adoption. Niche company but absolute monopoly pricing power \u2014 every EUV mask must be inspected for defects before use", "AI relevance: Critical chokepoint. No EUV mask \u2192 no advanced chip. No Lasertec inspection \u2192 no usable EUV mask. Every AI chip at 7nm and below depends on Lasertec-inspected masks. The technology requires EUV light source integration with nanometer-resolution optics \u2014 barriers are nearly insurmountable", "Investment thesis:\n(1) Sole-source monopoly in actinic EUV mask inspection \u2014 like ASML, there is no alternative.\n(2) More EUV layers per chip = more masks = more inspection demand.\n(3) High-NA EUV requires even tighter mask specs \u2014 favors Lasertec.\n(4) Growing installed base service revenue.", "Risks:\n(1) Customer concentration (~3-4 mask shops globally).\n(2) Extremely niche market limits TAM ceiling.\n(3) KLA competes in non-actinic mask inspection.\n(4) Yen exposure."]}, "advt": {"title": "Advantest", "bullets": ["Business: #1 ATE (automated test equipment) company with ~50-60% overall share, ~60-70% in memory test. Revenue ~700B JPY ($6.5B). V93000 EXA Scale for SoC, T5500 for DRAM/HBM, T2000 for analog. Capital equipment ($3-10M+ per system) plus recurring test cards/modules and cloud analytics (ACS). Massive installed base creates ecosystem lock-in \u2014 switching test programs costs years", "AI relevance: Every HBM stack must be individually tested with 5-10x higher test intensity than standard DRAM. Advantest is the dominant HBM tester. As AI GPUs get more complex (2nm GAA, chiplets), SoC test time and value per device rises sharply. Test equipment demand surged 48% in 2025", "Investment thesis:\n(1) ~50-60% ATE share with dominance in HBM testing \u2014 direct AI chip leverage.\n(2) HBM test intensity 5-10x higher than standard DRAM \u2014 content per GPU package is significantly higher.\n(3) Installed base lock-in \u2014 customers build years of test software around Advantest platforms.\n(4) Cloud analytics (ACS) platform adds AI-driven yield optimization as recurring revenue.\n(5) Test equipment demand growing 48% (2025) with 12% projected for 2026.", "Risks:\n(1) Chinese ATE competitors gaining share at mature nodes.\n(2) Cyclical semiconductor capex.\n(3) Customer concentration in memory (Samsung + SK Hynix = large % of memory test).\n(4) Teradyne competing aggressively in SoC test."]}, "ter": {"title": "Teradyne", "bullets": ["Business: #2 ATE company. Revenue $3.2B (2025, +13% YoY). Q1 2026 hit record $1.2B. ~80% Semiconductor Test, ~10% Robotics (Universal Robots), ~10% Product Test. AI-related demand now ~70% of total revenue, up from ~40% two years ago. Compute segment grew from $109M (2023) to $753M (2025) \u2014 nearly 7x in two years. UltraFLEX for compute, Magnum for memory", "AI relevance: Direct and accelerating. Qualifying as a tester on a major GPU customer's production line (widely believed NVIDIA) for H2 2026 revenue. AI accelerators have dramatically more transistors and I/O, requiring more test time and more sophisticated equipment. HBM and networking testing also surging", "Investment thesis:\n(1) AI revenue exploded from 40% to 70% in two years \u2014 the fastest AI pivot in semiconductor equipment.\n(2) GPU production test win (believed NVIDIA) sets up H2 2026 revenue inflection.\n(3) Management targets $6B revenue at ATE TAM maturity ($12-14B, up from $9B in 2025).\n(4) MultiLane JV extends into AI data center interconnect test.\n(5) $800M+ cash, no debt.", "Risks:\n(1) Advantest dominance in memory test.\n(2) GPU test win is not yet in production revenue \u2014 needs to prove out.\n(3) Robotics division has underperformed historically.\n(4) Cyclicality if AI capex slows."]}, "form": {"title": "FormFactor", "bullets": ["Business: #1 or #2 probe card manufacturer globally (~26% share). Probe cards create temporary electrical connections between wafers and ATE during wafer-level testing. Revenue ~$825M (2025). Foundry & Logic ~60%, Memory (DRAM/HBM) ~30%. MEMS microspring technology enables 10,000+ contacts with sub-5\u03bcm accuracy. Consumable-like model \u2014 each new tape-out needs new probe cards. No long-term debt, $300M+ cash", "AI relevance: Critical for HBM. Each HBM die must be tested before stacking (known-good-die requirement) and HBM requires dramatically more probe contacts per wafer at finer pitch. HBM3E\u2192HBM4 increases probe counts further. 2nm GAA logic also increases test complexity. FormFactor's MEMS probes are the enabling technology", "Investment thesis:\n(1) Each new tape-out drives recurring probe card revenue \u2014 tied to design activity, not just volume.\n(2) HBM4 ramp = more probe contacts per wafer = higher content per die.\n(3) Advanced packaging (chiplet) test adds new probe card demand.\n(4) Strong balance sheet ($300M+ cash, no debt).\n(5) MEMS technology creates switching costs \u2014 high engineering collaboration.", "Risks:\n(1) Competition from Technoprobe (Italy) and Japanese players.\n(2) Customer concentration (TSMC + memory = large share).\n(3) Geopolitical risk if Taiwan/Korea tensions escalate.\n(4) Cyclical with design activity and wafer starts."]}, "aehr": {"title": "Aehr Test Systems", "bullets": ["Business: Wafer-level and package-level burn-in systems. FOX family (wafer-level), FOX-XP (high-power for AI processors), Sonoma (ultra-high-power packaged part burn-in). Burns in entire wafers/packages under stress to screen early-life failures. Revenue ~$50M (small-cap). Bookings surged to $37M in a single quarter on AI demand \u2014 book-to-bill of 3.5x. Transitioning from SiC-dependent to diversified across AI, GaN, SiPh, memory", "AI relevance: Emerging and potentially transformative. As AI processors run at ever-higher power and deploy in mission-critical environments, reliability screening via burn-in becomes essential. Lead hyperscaler customer (believed major cloud company) adopted FOX-XP/Sonoma for AI processor burn-in. SiPh burn-in is another AI vector", "Investment thesis:\n(1) 3.5x book-to-bill signals inflection from AI processor burn-in demand.\n(2) Niche leader in wafer-level burn-in with few competitors.\n(3) Consumable WaferPaks drive recurring revenue per system.\n(4) SiPh and GaN burn-in add optionality beyond AI processors.\n(5) Small market cap means massive upside if AI burn-in demand sustains.", "Risks:\n(1) Very small company \u2014 customer concentration is extreme.\n(2) SiC/EV weakness has been prolonged.\n(3) Revenue is lumpy and hard to predict.\n(4) Needs to prove AI burn-in demand is sustained, not one-time.\n(5) Single hyperscaler = large % of bookings."]}, "besi": {"title": "BE Semiconductor (BESI)", "bullets": ["Business: Market leader in die-attach and hybrid bonding equipment \u2014 ~42% of global die-attach market. Revenue ~700-800M EUR. Hybrid bonding is THE key technology for HBM stacking and future CPO. Equipment serves semiconductor backend/advanced packaging. Premium valuation reflects AI packaging leverage", "AI relevance: Critical. Hybrid bonding enables next-gen HBM (HBM4+) and CPO. Every HBM stack requires precision die-to-die bonding. Chiplet architectures multiply hybrid bonding demand. TSMC's SoIC uses BESI tools. As AI chips move to chiplet architectures, hybrid bonding demand multiplies", "Investment thesis:\n(1) ~42% die-attach share with market leadership in hybrid bonding \u2014 first-mover advantage.\n(2) HBM4 stacking (more layers = more bonding) is a direct growth driver.\n(3) Chiplet assembly and CPO integration expand addressable market.\n(4) High switching costs \u2014 qualifying new bonding tools takes 1-2 years.\n(5) TSMC CoWoS/SoIC expansion drives demand.", "Risks:\n(1) Highly cyclical.\n(2) Concentrated customer base (TSMC is very large).\n(3) Competition from K&S and Japanese players in TCB.\n(4) If hybrid bonding adoption slower than expected, growth decelerates.\n(5) Premium valuation leaves limited margin for error."]}, "disc": {"title": "DISCO Corporation", "bullets": ["Business: ~80% global market share in wafer dicing and grinding. Revenue ~300B JPY ($2B+). Razor-and-blade model: capital equipment + high-margin consumable diamond blades (recurring). Every chip must be singulated from its wafer \u2014 no practical alternative at production scale", "AI relevance: Every AI chip must be diced. Advanced packaging (chiplets, HBM) INCREASES dicing complexity \u2014 multiple die sizes must be precisely cut. Laser dicing for ultra-thin wafers (HBM requires thinned dies) is a growth area. Dicing demand scales with wafer starts across all chip types", "Investment thesis:\n(1) ~80% share \u2014 near-monopoly in dicing/grinding.\n(2) Consumable diamond blades provide recurring revenue that grows with wafer starts.\n(3) HBM wafer thinning and chiplet dicing add complexity = higher content per wafer.\n(4) Extremely high switching costs \u2014 fabs cannot risk yield on unproven tools.", "Risks:\n(1) Tokyo Seimitsu (Accretech) is the only meaningful competitor \u2014 concentrated market could attract new entrants.\n(2) Cyclical with wafer starts.\n(3) Yen exposure.\n(4) Dominant position may invite antitrust attention long-term."]}, "klic": {"title": "Kulicke & Soffa (K&S)", "bullets": ["Business: #1 in wire bonding (~60% share), also TCB (thermo-compression bonding) and wedge bonders for power/auto. Revenue ~$700-800M. Wire bonding is mature/declining but still ~50% of all chip packages. TCB and advanced packaging are growth vectors", "AI relevance: TCB equipment used in some HBM assembly flows and flip-chip BGA for AI processors. Less direct AI leverage than BESI (which leads hybrid bonding) but benefits from overall advanced packaging volume growth", "Investment thesis:\n(1) #1 wire bonding with 60% share \u2014 cash cow even as market matures.\n(2) TCB growing for advanced packaging.\n(3) Consumable revenue (bonding wire, capillaries) provides stability.\n(4) Automotive power wire bonding (SiC/GaN) is a growth vector.", "Risks:\n(1) Wire bonding is a declining market as packages shift to flip-chip.\n(2) Behind BESI in hybrid bonding.\n(3) Cyclical with auto/consumer cycles."]}, "scrn": {"title": "SCREEN Holdings", "bullets": ["Business: #1 in wafer cleaning/surface preparation equipment globally. Every wafer is cleaned dozens of times during manufacturing \u2014 after nearly every process step. Revenue grows with both wafer volume and process complexity (more steps = more cleaning)", "AI relevance: More cleaning steps per wafer at advanced nodes. GAA, EUV multi-patterning, backside power \u2014 each new layer requires cleaning. HBM wafer bonding requires ultra-clean surfaces. Cleaning demand is a direct function of process complexity", "Investment thesis:\n(1) Market leadership in essential, high-frequency process step.\n(2) Cleaning scales with process complexity \u2014 structural growth as nodes shrink.\n(3) Consumable-like demand \u2014 steady regardless of which process technology wins.\n(4) HBM and advanced packaging require ultra-clean surfaces.", "Risks:\n(1) Mature technology \u2014 less pricing power than lithography or etch.\n(2) China competition in legacy cleaning tools.\n(3) Cleaning is viewed as commodity vs. 'hero' equipment like EUV."]}, "aixt": {"title": "Aixtron SE", "bullets": ["Business: #1 MOCVD equipment maker with ~70% overall market share and ~90% in GaN at 200mm. German-based. Revenue ~630M EUR. G10 platform family is the industry standard for GaN power and SiC epitaxy. New 100M EUR Innovation Center opened Dec 2024 for 300mm development. Batch planetary reactor design provides throughput advantage competitors cannot replicate. First to 300mm GaN capability", "AI relevance: Critical enabler of compound semiconductor manufacturing. GaN power devices made on Aixtron tools are increasingly used for efficient 48V power conversion in AI data centers. InP/GaAs epitaxy for SiPh lasers is also Aixtron's domain. Kerrisdale Capital identified Aixtron as 'a critical data center and AI play'", "Investment thesis:\n(1) ~70% MOCVD share overall, ~90% in GaN at 200mm \u2014 dominant bottleneck position.\n(2) First to 300mm GaN \u2014 Infineon's 100+ reactor opportunity, TI quadrupled GaN capacity using Aixtron.\n(3) Data center GaN power is an emerging growth vector beyond EV.\n(4) InP/GaAs MOCVD for SiPh lasers connects Aixtron to the photonics/CPO chain.\n(5) 300mm transition extends moat \u2014 competitors cannot match at this diameter.", "Risks:\n(1) SiC/EV cycle has been weak.\n(2) Chinese AMEC gaining in commodity LED MOCVD (though not up-market).\n(3) Narrow product focus \u2014 entirely dependent on compound semi spending.\n(4) European cost base."]}, "veco": {"title": "Veeco Instruments", "bullets": ["Business: #2 MOCVD maker behind Aixtron (~28% share). Also MBE (molecular beam epitaxy), laser annealing, and ion beam processing. Revenue ~$700M. More diversified than Aixtron across MOCVD + MBE + laser annealing. MBE used for highest-performance III-V devices. Laser annealing growing with TSMC for GAA", "AI relevance: Growing. Laser annealing for advanced logic (GAA at TSMC) is a newer AI-adjacent vector. MOCVD for III-V photonics lasers is AI-relevant. But Aixtron is the more dominant MOCVD player", "Investment thesis:\n(1) Diversified across MOCVD + MBE + laser annealing \u2014 broader exposure than Aixtron.\n(2) Laser annealing for GAA/2nm at TSMC is a differentiated growth vector.\n(3) MBE for highest-performance III-V devices serves premium market.\n(4) SiPh laser manufacturing and microLED are growth vectors.", "Risks:\n(1) Aixtron is more dominant in core MOCVD (~70% vs. ~28%).\n(2) Chinese AMEC displacing Veeco in commodity LED.\n(3) Narrower moat in MOCVD than Aixtron.\n(4) Small revenue base."]}, "snps": {"title": "Synopsys", "bullets": ["Business: #1 EDA vendor (~38% market share) in unbreakable duopoly with Cadence (~36%). Revenue ~$6.1B (FY2024). ~80-85% recurring subscription with near-100% retention. Design Automation ~65% of revenue, Design IP ~30%. R&D >30% of revenue. Ansys acquisition adds multi-physics simulation for system-level design. First PCIe 7.0 IP, first UCIe IP for chiplet interconnect. Customer lifetimes easily span 20+ years", "AI relevance: Foundational. AI chips are the most complex ever designed \u2014 billions of transistors requiring millions of design rules to verify. AI is both demand driver (more complex chips = more EDA spend) AND product enhancer (Synopsys.ai uses ML to optimize placement/routing, reducing design time 10-30%). No chip can be designed without Synopsys or Cadence tools \u2014 full stop", "Investment thesis:\n(1) #1 in EDA duopoly with near-100% client retention and 20+ year customer relationships.\n(2) No startup can replicate decades of design rule libraries qualified at every major foundry.\n(3) AI chip complexity drives more verification/simulation compute \u2014 structural growth.\n(4) Ansys acquisition creates 'silicon-to-system' design platform.\n(5) Design IP content per chip increasing in chiplet era (PCIe 7.0, UCIe, HBM interface).\n(6) Synopsys.ai creates AI-driven EDA tools \u2014 selling AI to AI chip designers.", "Risks:\n(1) Ansys integration risk and regulatory scrutiny.\n(2) DOJ antitrust attention on EDA duopoly.\n(3) Premium valuation.\n(4) Competition from Cadence in adjacent markets."]}, "cdns": {"title": "Cadence Design Systems", "bullets": ["Business: #2 EDA vendor (~36% share) in duopoly with Synopsys. Revenue ~$4.6B (FY2024). Q1 2025: $1.24B (+23% YoY), 34% EPS growth. ~85% recurring subscription. $6.4B backlog. Palladium/Protium hardware emulation is gold standard for pre-silicon verification. Expanding into computational fluid dynamics for system simulation. Joint SiPh design flow with Tower Semiconductor", "AI relevance: Equally foundational as Synopsys. AI chip design cannot happen without Cadence verification tools. Palladium emulation enables pre-silicon verification of billion-transistor AI accelerators. Cerebrus AI engine uses ML to explore design space 10x faster. SiPh design flow with Tower positions Cadence in CPO ecosystem", "Investment thesis:\n(1) #2 EDA with same structural moat as Synopsys \u2014 near-100% retention.\n(2) Palladium hardware emulation has no real competitor at scale.\n(3) Higher operating margins than Synopsys \u2014 more capital-efficient model.\n(4) SiPh design flow with Tower creates unique positioning in CPO ecosystem.\n(5) System-level simulation (ECAD + MCAD) expands TAM beyond chip design.", "Risks:\n(1) Synopsys+Ansys creates stronger system-level competitor.\n(2) Narrower IP portfolio than Synopsys.\n(3) DOJ antitrust risk.\n(4) Smaller scale than post-Ansys Synopsys."]}, "onto": {"title": "Onto Innovation", "bullets": ["Business: Advanced packaging inspection and metrology. Formed from Nanometrics + Rudolph Technologies merger. Revenue ~$1B. Growing faster than overall WFE due to advanced packaging exposure. Specializes in overlay metrology, macro inspection, and lithography process control for packaging", "AI relevance: High. Advanced packaging (CoWoS, fan-out, 2.5D/3D) is THE bottleneck for AI chip production. Onto's inspection tools ensure packaging yield. Chiplet architectures multiply packaging inspection demand", "Investment thesis:\n(1) Strong position in advanced packaging metrology \u2014 less KLA competition in this segment.\n(2) CoWoS inspection for AI GPUs is a direct growth driver.\n(3) Growing installed base at TSMC, ASE, Amkor.\n(4) Panel-level packaging could be a new growth vector.", "Risks:\n(1) KLA expanding into packaging inspection.\n(2) Smaller scale limits R&D vs. KLA.\n(3) Cyclical."]}, "camt": {"title": "Camtek", "bullets": ["Business: 2D and 3D inspection for semiconductor packaging. Israeli company. Revenue ~$400M, growing rapidly on advanced packaging. Specializes in bumped wafer inspection, HBM inspection", "AI relevance: Direct. HBM wafer bumping and advanced packaging inspection are core markets. As AI chips require more complex packaging, Camtek inspection demand grows", "Investment thesis:\n(1) Niche expertise in packaging inspection at lower price points than KLA.\n(2) HBM inspection is a direct AI growth driver.\n(3) Fast-growing installed base.\n(4) Fan-out and chiplet inspection expand TAM.", "Risks:\n(1) KLA is a much larger competitor expanding in packaging.\n(2) Small company.\n(3) Limited product breadth."]}, "nvmi": {"title": "Nova Ltd.", "bullets": ["Business: Inline process control metrology \u2014 X-ray, optical, and materials-focused measurement. Israeli company. Differentiated by X-ray metrology increasingly critical at advanced nodes", "AI relevance: Advanced nodes require more metrology points per wafer. X-ray metrology helps control GAA transistor dimensions and HBM stack quality", "Investment thesis:\n(1) X-ray metrology is a technique KLA doesn't dominate.\n(2) Growing share in advanced logic and memory.\n(3) GAA and CFET require new metrology approaches.", "Risks:\n(1) Smaller scale than KLA.\n(2) Limited product breadth.\n(3) KLA expanding metrology offerings."]}, "hita": {"title": "Hitachi High-Tech", "bullets": ["Business: CD-SEM (measures nanometer-scale features), e-beam review/inspection, etch equipment, FIB tools. Part of Hitachi Group. Revenue ~$5B+ total (semi equipment is largest segment). Also appears in deposition/etch tier", "AI relevance: CD-SEMs verify EUV lithography produced correct feature dimensions \u2014 essential for yield at 2nm. E-beam review for defect characterization at advanced nodes", "Investment thesis:\n(1) Strong in CD-SEM and e-beam review \u2014 entrenched at several leading fabs.\n(2) Advanced node CD measurement becomes more critical as features shrink.", "Risks:\n(1) KLA dominance in overall process control.\n(2) Part of diversified conglomerate.\n(3) Limited pricing power vs. KLA."]}, "sie": {"title": "Siemens EDA", "bullets": ["Business: EDA tools \u2014 Calibre (physical verification de facto standard), HyperLynx, Xpedition. Part of Siemens since 2017 acquisition of Mentor Graphics. Revenue ~$2B (estimated). ~13% EDA market \u2014 distant #3 behind Synopsys/Cadence", "AI relevance: Calibre is used for physical verification of virtually every chip (including AI chips) even when the rest of the design flow uses Synopsys/Cadence. But Siemens EDA is less AI-leveraged than the duopoly", "Investment thesis:\n(1) Calibre is entrenched as a verification standard \u2014 hard to displace.\n(2) Digital twin integration with Siemens industrial software.\n(3) Automotive/aerospace design are growth areas.", "Risks:\n(1) Buried inside Siemens conglomerate.\n(2) Losing share to Synopsys/Cadence in advanced EDA.\n(3) Not keeping pace in AI-driven EDA innovation."]}, "keys": {"title": "Keysight Technologies", "bullets": ["Business: Electronic test and measurement \u2014 oscilloscopes, signal generators, network analyzers, PathWave software. Revenue ~$5B. ~50/50 split between Communications and Electronic Industrial. Not pure semiconductor", "AI relevance: Moderate. High-speed signal integrity testing critical for AI interconnect (PCIe 6.0/7.0, UCIe, 800G/1.6T Ethernet). Instruments validate high-speed links between AI processors. 5G/6G test benefits from wireless AI infrastructure", "Investment thesis:\n(1) High-speed AI interconnect validation is growing.\n(2) PCIe 7.0 and CXL testing create new demand.\n(3) PathWave software creates recurring revenue.", "Risks:\n(1) Diversified \u2014 limited pure-play AI leverage.\n(2) Cyclical with R&D budgets.\n(3) Competition from Rohde & Schwarz, NI (Emerson)."]}, "svco": {"title": "Silvaco", "bullets": ["Business: TCAD (process/device simulation) software and analog EDA tools. Recently IPO'd. Smaller scale than Synopsys/Cadence but fills niches in process modeling and analog design. Stock up ~157% combined returns", "AI relevance: TCAD helps foundries simulate GAA/CFET transistor architectures before committing to silicon \u2014 more valuable as nodes get complex", "Investment thesis:\n(1) TCAD becomes more valuable as transistor architectures get more complex.\n(2) Analog design tools serve growing power management market.\n(3) Small company with potential to be acquired.", "Risks:\n(1) Very small.\n(2) Synopsys also has strong TCAD.\n(3) Post-IPO maturation risk."]}, "pdfs": {"title": "PDF Solutions", "bullets": ["Business: Yield management software (Exensio platform) using AI/ML to analyze fab data. Also characterization test chips. SaaS recurring revenue model. Stock up ~87% combined returns", "AI relevance: AI chip manufacturing at advanced nodes has tight yield budgets. PDF's analytics help fabs find yield-killing defects faster. The more complex the chip, the more valuable yield management becomes", "Investment thesis:\n(1) AI/ML yield optimization is a growing TAM as advanced node yield gets harder.\n(2) SaaS model provides recurring revenue.\n(3) CHIPS Act fab ramp-ups need yield learning acceleration.", "Risks:\n(1) Small company.\n(2) Competition from KLA's software and fab-internal teams.\n(3) Limited pricing power."]}, "aip": {"title": "Arteris", "bullets": ["Business: Network-on-chip (NoC) interconnect IP \u2014 the 'nervous system' connecting IP blocks within a chip. Revenue ~$60M. FlexNoC and Ncore IP. IP licensing (upfront + per-chip royalties). Stock up ~117% combined returns", "AI relevance: AI SoCs are among the most complex chips, requiring sophisticated on-chip interconnect. More IP blocks = more NoC IP needed. Arteris IP helps manage data flow between dozens of blocks in AI accelerators", "Investment thesis:\n(1) Leading independent NoC IP provider.\n(2) AI chip complexity (more IP blocks) drives structural demand for NoC IP.\n(3) Royalty base growing as customer chips enter production.\n(4) Chiplet-to-chiplet interconnect is an expanding opportunity.", "Risks:\n(1) Very small (~$60M revenue).\n(2) Arm's free interconnect IP is competitive.\n(3) Long revenue cycle (2-4 years from design win to royalty).\n(4) Customer design cancellations."]}, "rmbs": {"title": "Rambus", "bullets": ["Business: Memory interface IP (DDR5 controllers, PHY) and DIMM chipsets for server memory. Also security IP. Revenue ~$600M. Transitioned from patent licensing to product revenue. High-margin business. 3,000+ patents in memory interface technology", "AI relevance: Direct. AI servers require high-bandwidth memory interfaces \u2014 Rambus provides PHY IP and chipsets connecting processors to DDR5 and CXL memory. CXL memory expansion for AI is a major growth vector. Every server DIMM uses memory interface chips", "Investment thesis:\n(1) DDR5 DIMM chipset ramp provides direct server market leverage.\n(2) CXL memory expansion for AI data centers is a major new TAM.\n(3) 3,000+ patent portfolio provides IP licensing optionality.\n(4) Shifting from patent licensing to higher-value product revenue.", "Risks:\n(1) Patent licensin
