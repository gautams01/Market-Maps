g revenue declining (by design).\n(2) CXL adoption pace uncertain.\n(3) Competition from Montage Technology (China) in DIMM chipsets."]}, "koku": {"title": "Kokusai Electric", "bullets": ["Business: Batch processing equipment \u2014 vertical furnaces for CVD, ALD, thermal processing. Spun out of Hitachi Kokusai, IPO'd 2023. Competes with TEL in batch processing", "AI relevance: Batch furnaces used in DRAM, NAND, HBM manufacturing for oxidation and insulation layers. HBM and 3D NAND scaling drive more furnace steps", "Investment thesis:\n(1) IPO provides investor access to batch processing niche.\n(2) HBM and NAND scaling drive furnace step count.\n(3) Deep Japanese memory fab relationships.", "Risks:\n(1) Narrow product focus.\n(2) TEL competition in batch processing.\n(3) Memory cycle sensitivity."]}, "naur": {"title": "NAURA Technology", "bullets": ["Business: China's largest domestic semiconductor equipment maker \u2014 etch, deposition, cleaning, thermal. Benefits from China's self-sufficiency push. Won $380M order from CXMT. Formed $320M JV with Lam Research", "AI relevance: Indirect to Western AI. Enables China's domestic semiconductor build-out. Could become competitor to AMAT/Lam/TEL in mature-node equipment over time", "Investment thesis:\n(1) Protected domestic market due to Western export controls.\n(2) Government subsidies support growth.\n(3) Growing installed base in China.", "Risks:\n(1) Technology gap vs. Western leaders (1-2 generations).\n(2) Dependent on Chinese government policy.\n(3) If export controls ease, Western equipment becomes available again."]}, "cvv": {"title": "CVD Equipment Corp", "bullets": ["Business: Niche CVD systems for specialty semiconductor, industrial, and research applications. Very small company", "AI relevance: Minimal \u2014 too small to be material in AI chip manufacturing", "Investment thesis:\n(1) Niche specialty equipment.", "Risks:\n(1) Micro-cap with limited relevance to mainstream semiconductor."]}, "ebar": {"title": "Ebara Corporation", "bullets": ["Business: CMP equipment (wafer polishing/planarization) \u2014 #2 behind Applied Materials. Also industrial pumps and environmental equipment (diversified). CMP flattens surfaces between process layers", "AI relevance: CMP required after each deposition step. More layers at advanced AI nodes = more CMP. Essential for advanced packaging (hybrid bonding requires atomically flat surfaces)", "Investment thesis:\n(1) CMP is a growing market driven by back-end-of-line complexity.\n(2) Hybrid bonding surface prep is a new growth vector.\n(3) #2 position behind AMAT.", "Risks:\n(1) AMAT dominance in CMP.\n(2) Semiconductor is a smaller part of diversified Ebara.\n(3) Limited direct AI leverage."]}, "axcl": {"title": "Axcelis Technologies", "bullets": ["Business: Ion implantation systems \u2014 embeds dopant atoms into silicon to modify electrical properties. Strong in SiC power semiconductor implant. Revenue ~$1B. Stock up ~140% combined returns", "AI relevance: Indirect. Ion implant required for all chips but less of a bottleneck than lithography or etch. SiC implant serves EV/power markets. Data center power delivery growing", "Investment thesis:\n(1) Market leader in SiC ion implantation alongside AMAT.\n(2) SiC power for data center and EV are dual growth vectors.\n(3) Diversifying beyond SiC into logic/memory implant.", "Risks:\n(1) SiC/EV cycle has been weaker than expected.\n(2) AMAT is the dominant implant player overall.\n(3) Narrower portfolio than diversified competitors."]}, "cohu": {"title": "Cohu Inc.", "bullets": ["Business: Test handlers (move chips through ATE), test contactors/sockets, and lower-end ATE. Revenue ~$500M. More exposed to automotive/industrial than AI. Stock up ~145% combined returns", "AI relevance: Indirect \u2014 handlers needed for every chip tested. Benefits from overall volume growth but less leveraged to AI/HBM than Advantest/Teradyne", "Investment thesis:\n(1) Leading test handler position globally.\n(2) Consumable contactors provide recurring revenue.\n(3) Automotive/industrial semiconductor recovery is a cyclical upside.", "Risks:\n(1) Heavy auto cycle exposure.\n(2) Limited AI leverage vs. top-2 ATE players.\n(3) Lower margins and smaller scale."]}, "tpro": {"title": "Technoprobe", "bullets": ["Business: Probe cards for wafer testing \u2014 direct competitor to FormFactor. Italian-based. Strong in MEMS and vertical probe technologies. Opened 80M EUR Dresden facility for European fabs. Stock up ~79% combined returns", "AI relevance: Same dynamics as FormFactor \u2014 benefits from HBM and advanced-node probe complexity", "Investment thesis:\n(1) European manufacturing for growing EU fab ecosystem.\n(2) MEMS probe technology competitive with FormFactor.\n(3) Dresden facility positions for Intel Germany, TSMC potential EU fabs.", "Risks:\n(1) Smaller than FormFactor.\n(2) Asian competitors in probe cards.\n(3) Needs scale to compete on cost."]}, "mpic": {"title": "MPI Corporation", "bullets": ["Business: Probe stations and probe cards. Taiwan-based. Probe stations are platforms that bring probe cards into contact with wafers for testing. Partnership with ASE for chiplet-ready probe cards. Stock up ~144% combined returns", "AI relevance: Chiplet-ready probe cards directly relevant to AI chip architectures. Probe stations essential for R&D and production wafer test", "Investment thesis:\n(1) Chiplet probe card partnership with ASE targets AI packaging.\n(2) Probe stations serve all fabs.\n(3) Strong Taiwan market position.", "Risks:\n(1) Smaller scale globally.\n(2) Taiwan concentration."]}, "shkw": {"title": "Shinkawa Ltd.", "bullets": ["Business: Wire bonding and die bonding equipment \u2014 similar space to K&S but focused on Japanese domestic market", "AI relevance: Limited direct. Benefits from overall packaging volume growth", "Investment thesis:\n(1) Japanese domestic market position.\n(2) Automotive power packaging.", "Risks:\n(1) Small scale.\n(2) Wire bonding declining.\n(3) Limited international presence."]}, "hnmi": {"title": "Hanmi Semiconductor", "bullets": ["Business: Packaging equipment \u2014 trim/form, singulation, vision inspection. Korean domestic market leader. Stock up ~130% combined returns", "AI relevance: Benefits from Korean semiconductor industry growth (Samsung, SK Hynix HBM packaging)", "Investment thesis:\n(1) Korean semiconductor ecosystem exposure (Samsung, SK Hynix).\n(2) HBM packaging equipment demand.\n(3) Strong domestic market position.", "Risks:\n(1) Smaller scale.\n(2) Limited global reach.\n(3) Competition from Japanese equipment makers."]}, "towa": {"title": "Towa Corporation", "bullets": ["Business: Resin molding and encapsulation equipment \u2014 seals chips in protective resin after assembly. Compression molding for advanced packages. Also singulation/cutting systems", "AI relevance: Growing. Compression molding increasingly critical for large-format AI chip packages. As packages get bigger (chiplets, large SoCs), molding precision and uniformity matter more", "Investment thesis:\n(1) Advanced compression molding serves growing advanced package market.\n(2) Fan-out and SiP packaging drive demand.\n(3) Leading Japanese molding technology.", "Risks:\n(1) Niche market.\n(2) Competition from APIC Yamada.\n(3) Limited direct AI leverage vs. BESI/DISCO."]}, "azta": {"title": "Azenta (Brooks Automation)", "bullets": ["Business: Automated wafer handling and contamination control \u2014 robots transporting wafers between process chambers in fabs. Also cryogenics (being divested)", "AI relevance: Indirect \u2014 fab automation scales with wafer starts. More AI chip production = more handling", "Investment thesis:\n(1) New fab construction (CHIPS Act) drives equipment demand.\n(2) Advanced packaging automation is growing.", "Risks:\n(1) Cyclical with fab construction.\n(2) Commoditized vs. process-critical equipment."]}, "daif": {"title": "Daifuku", "bullets": ["Business: Automated material handling systems (AMHS) \u2014 overhead transport systems moving wafer lots through entire fabs. Revenue tied to new fab construction ($50-200M+ per fab). Also logistics automation. Semiconductor is ~40% of diversified Daifuku", "AI relevance: Every new fab needs AMHS. CHIPS Act fabs are direct demand drivers. Larger/more complex fabs for AI chips need more sophisticated AMHS", "Investment thesis:\n(1) Market leader in semiconductor AMHS.\n(2) CHIPS Act fab construction creates multi-year order pipeline.\n(3) High switching costs \u2014 AMHS designed into fab from the beginning.", "Risks:\n(1) Revenue is lumpy/project-based.\n(2) Cyclical with fab construction.\n(3) Semiconductor is ~40% of diversified company."]}, "jeol": {"title": "JEOL Ltd.", "bullets": ["Business: Electron microscopes (SEM, TEM), e-beam lithography for mask writing and R&D. Scientific instruments company", "AI relevance: Minimal for production. E-beam litho for mask writing, TEM/SEM for failure analysis", "Investment thesis:\n(1) Mask writing for advanced nodes.\n(2) R&D microscopy demand.", "Risks:\n(1) Very niche semiconductor exposure.\n(2) Scientific instruments market is modest growth."]}, "ndsn": {"title": "Nordson", "bullets": ["Business: Precision dispensing, fluid management, and test/inspection for electronics assembly. Semiconductor is one division alongside adhesive dispensing and medical", "AI relevance: Indirect \u2014 electronics assembly testing benefits from volume growth", "Investment thesis:\n(1) Advanced packaging dispensing is growing.\n(2) Diversified industrial company with semi exposure.", "Risks:\n(1) Semiconductor is a minority of total Nordson.\n(2) Not a pure-play."]}, "brkr": {"title": "Bruker", "bullets": ["Business: Scientific instruments \u2014 X-ray diffraction, AFM, surface analysis for semiconductor R&D and metrology", "AI relevance: R&D tools help develop advanced materials and processes but not a production inline tool", "Investment thesis:\n(1) Semiconductor R&D tool demand growing.\n(2) Advanced materials characterization.", "Risks:\n(1) Semiconductor is small part of diversified Bruker.\n(2) R&D budgets can be cut."]}, "atro": {"title": "Astronics Corporation", "bullets": ["Business: Test systems for semiconductor (lower-complexity) and aerospace lighting/power. Dual business", "AI relevance: Limited direct AI exposure", "Investment thesis:\n(1) Aerospace recovery.\n(2) Defense electronics test.", "Risks:\n(1) Semiconductor is secondary business.\n(2) Limited AI leverage."]}, "chrm": {"title": "Chroma ATE", "bullets": ["Business: ATE for power electronics, LED, battery, and EV testing. Strong in Taiwan/China. Power semiconductor testing is the AI-adjacent segment", "AI relevance: Indirect. Power testing for data center power supplies. Less tied to AI chip testing than Advantest/Teradyne", "Investment thesis:\n(1) EV battery and power semiconductor testing.\n(2) Data center power validation is growing.", "Risks:\n(1) Chinese economic cycle exposure.\n(2) Niche market."]}, "toks": {"title": "Tokyo Seimitsu (Accretech)", "bullets": ["Business: Semiconductor probers and wafer dicing/grinding (competes with DISCO). Also precision metrology. Dual business", "AI relevance: Wafer probing essential for every fab. Dicing competes with DISCO for backend processing", "Investment thesis:\n(1) Probing systems benefit from increased wafer starts.\n(2) Dicing is a #2 to DISCO's monopoly.", "Risks:\n(1) DISCO dominance in dicing.\n(2) Limited international reach."]}, "smin": {"title": "Smiths Interconnect", "bullets": ["Business: Test sockets, connectors, RF/microwave test solutions. Part of Smiths Group plc. Serves semiconductor and defense", "AI relevance: Test sockets needed for every packaged chip test. Higher I/O on AI processors drives more complex socket requirements", "Investment thesis:\n(1) High-speed test interfaces for AI chips.\n(2) 5G/mmWave test solutions.", "Risks:\n(1) Part of diversified conglomerate.\n(2) Limited pure-play exposure."]}, "jem": {"title": "JEM (Japan Electronic Materials)", "bullets": ["Business: Probe cards \u2014 strong in Japanese domestic market. Serves Japanese IDMs and fabs", "AI relevance: Indirect \u2014 benefits from test intensity increase but less directly than FormFactor", "Investment thesis:\n(1) Domestic Japanese fab expansion.\n(2) Memory test probe cards.", "Risks:\n(1) Limited international diversification.\n(2) Smaller scale vs. global leaders."]}, "ceva": {"title": "CEVA Inc.", "bullets": ["Business: Semiconductor IP \u2014 DSP cores, AI/ML processors (NeuPro), sensor hubs, wireless (BT/Wi-Fi) IP. Revenue ~$120M. IP licensing + royalties. Licensed to chip designers globally", "AI relevance: Moderate. NeuPro AI processor IP licensed to edge device designers for on-device AI inference. Growing demand for AI-capable IP blocks in IoT and mobile", "Investment thesis:\n(1) AI/ML processor IP addresses growing on-device AI market.\n(2) Royalty model provides recurring revenue as customer chips ship.\n(3) Wireless IP (BT/Wi-Fi) is a stable revenue base.", "Risks:\n(1) Small company.\n(2) Competition from Arm (which also licenses AI-capable cores).\n(3) Long IP licensing cycles."]}, "awe": {"title": "Alphawave Semi", "bullets": ["Business: High-speed connectivity IP (SerDes, PCIe, CXL, UCIe) and custom silicon for AI interconnect. Revenue ~$300M. UK-based, fabbed at TSMC. Multi-die chiplet interconnect solutions. Also appears in IP/cores and SerDes tiers", "AI relevance: High. SerDes IP and custom silicon for AI chip connectivity. UCIe chiplet interconnect essential for next-gen AI chip architectures. Custom silicon for hyperscaler AI chips", "Investment thesis:\n(1) Leading-edge SerDes IP at 3nm/2nm.\n(2) UCIe chiplet interconnect for next-gen AI architectures.\n(3) Custom silicon for hyperscalers adds higher-value revenue.\n(4) Multi-protocol support (PCIe 6.0, CXL 3.0, UCIe).", "Risks:\n(1) Small company \u2014 execution risk.\n(2) Competition from Synopsys/Cadence IP and Credo/Astera.\n(3) Custom silicon is capital-intensive."]}, "tsmc": {"title": "TSMC", "bullets": ["Business: World's leading foundry \u2014 ~60% global share, ~90% of sub-7nm production. Revenue ~$90B+ (2025, ~25% YoY growth). Gross margin ~60%. Capex $40-42B for 2025. CoWoS advanced packaging capacity scaling from 35K wafers/month (late 2024) to projected 130K wafers/month by end 2026. NVIDIA secures >60% of CoWoS capacity. Also provides InFO, SoIC packaging. Arizona fab began 4nm production in March 2026 (20K wafers/month). N2 (2nm GAA) ramping 2025-2026, A16 (1.6nm backside power) in 2026-2027", "AI relevance: THE most critical single company in the AI supply chain. Every NVIDIA GPU, AMD MI accelerator, Broadcom custom ASIC, and Apple chip is made at TSMC. CoWoS packaging is the primary physical bottleneck for AI GPU production \u2014 demand still exceeds supply despite massive expansion. 'CoWoS capacity is very tight and remains sold out through 2025 and into 2026' \u2014 CEO C.C. Wei. First commercial CPO chips expected within 18-24 months from TSMC packaging", "Investment thesis:\n(1) 3-5 year technology lead over Samsung at leading edge \u2014 no customer can leave.\n(2) $30B+ annual capex creates barriers no competitor can match.\n(3) CoWoS capacity 3-4x expansion is the single biggest unlock for AI GPU supply.\n(4) Network effects \u2014 more customers = better yields = more customers.\n(5) N2/A16 extends technology leadership into next-gen AI chips.\n(6) Arizona fab provides US supply chain diversification.\n(7) ~$90B+ revenue at 60% gross margins \u2014 best financial profile in semiconductors.", "Risks:\n(1) Taiwan geopolitical risk \u2014 #1 investor concern.\n(2) Customer concentration (Apple + NVIDIA = ~40% of revenue).\n(3) Massive capex ($40B+/year) creates execution risk.\n(4) If AI capex slows, leading-edge utilization drops.\n(5) Samsung and Intel competing aggressively at leading edge.\n(6) Arizona fab is significantly more expensive than Taiwan operations."]}, "sam_f": {"title": "Samsung Foundry/Memory", "bullets": ["Business: Both foundry (#2 behind TSMC) and memory (DRAM, NAND, HBM). Only company manufacturing leading-edge logic AND memory. Total Samsung Electronics revenue ~$220B (semi ~60%). Memory alone ~$70B+. Q1 2026 posted record profit. Reclaimed #1 DRAM revenue from SK Hynix in Q4 2025, but SK Hynix dominates HBM with 57-62% share vs. Samsung at ~17%. Resumed P5 fab construction. Started shipping HBM4 in Feb 2026, ~1 year after SK Hynix samples. Raising HBM prices 'high-teens to low-twenties percent' for 2026", "AI relevance: Major HBM producer (17% share, growing) supplying NVIDIA and hyperscalers, though lagging SK Hynix in HBM qualification. Foundry makes some Qualcomm chips but has struggled with yields at leading-edge vs. TSMC. Memory pricing power is rising \u2014 'customers are prioritizing procurement over price.' HBM4 ramp and P5 fab expansion are key AI catalysts", "Investment thesis:\n(1) Only company that manufactures both leading-edge logic and memory \u2014 unique strategic position.\n(2) HBM share expected to rise above 30% as HBM3E/HBM4 qualifications broaden.\n(3) Memory pricing power increasing \u2014 customers signing multi-year deals at rising prices.\n(4) Scale advantages in DRAM/NAND provide cost leadership.\n(5) Conglomerate discount means semiconductor value is partially hidden.", "Risks:\n(1) Foundry yield issues vs. TSMC have lost market share \u2014 customers migrating away.\n(2) HBM lags SK Hynix by ~1 year in NVIDIA qualification.\n(3) Conglomerate structure limits pure-play access.\n(4) Geopolitical risk (South Korea).\n(5) Memory is cyclical despite current strength."]}, "int_f": {"title": "Intel Foundry", "bullets": ["Business: Intel's manufacturing division \u2014 fabricates Intel's own chips plus pursuing external foundry customers. Intel 18A (1.8nm-class) process in development. ~$100B+ announced fab investments backed by $8.5B CHIPS Act grants. Revenue ~$54B total Intel but foundry is currently unprofitable. Altera FPGA being spun off. Also has SiPh transceiver manufacturing capability", "AI relevance: Strategic importance for US semiconductor sovereignty. If 18A succeeds, it provides an alternative to TSMC for AI chip production. SiPh transceivers relevant for AI data center interconnects. Only advanced foundry on US soil until TSMC Arizona ramps fully", "Investment thesis:\n(1) Only advanced foundry on US soil \u2014 strategic importance for supply chain security.\n(2) CHIPS Act funding ($8.5B grants) reduces capital burden.\n(3) If 18A yields are competitive with TSMC N2, Intel regains manufacturing credibility.\n(4) Altera IPO unlocks hidden value.\n(5) SiPh manufacturing adds AI interconnect angle.", "Risks:\n(1) Enormous execution risk \u2014 must prove 18A yields are competitive.\n(2) Massive cash burn during foundry transition.\n(3) Has lost technology leadership to TSMC over past decade.\n(4) Cultural shift from IDM to customer-serving foundry is difficult.\n(5) Gaudi AI accelerator failed to gain traction.\n(6) Management credibility concerns after years of process delays."]}, "gf": {"title": "GlobalFoundries", "bullets": ["Business: Specialty foundry \u2014 RF, silicon photonics, automotive, IoT. Deliberately does NOT compete at leading edge (<7nm). Revenue ~$7B. Key SiPh foundry platform alongside Tower. Acquired AMF (Advanced Micro Foundry) for photonics. US-based (Malta, NY). Abu Dhabi (Mubadala) ownership provides patient capital", "AI relevance: Growing. SiPh platform is one of two key foundries for CPO photonics chips (alongside Tower). CPO transceivers fabricated at GF. Also supplies Marvell, NXP, Qualcomm for RF/connectivity. US manufacturing provides supply chain security premium", "Investment thesis:\n(1) SiPh foundry platform positions GF in AI interconnect supply chain.\n(2) US-based manufacturing \u2014 supply chain security advantage.\n(3) Specialty processes (RF, SiPh, automotive) that TSMC doesn't focus on.\n(4) AMF acquisition strengthens photonics capability.\n(5) Patient Mubadala ownership supports long-term investment.", "Risks:\n(1) Cannot compete at leading edge \u2014 missing from the highest-value AI chip manufacturing.\n(2) Specialty markets have been in inventory correction.\n(3) SiPh revenue is still small.\n(4) Tower Semi is the more established SiPh foundry.\n(5) Revenue growth has been modest."]}, "tower": {"title": "Tower Semiconductor", "bullets": ["Business: Specialty analog foundry and THE leading open-platform silicon photonics foundry. Revenue ~$1.6B. Committed $920M in SiPh capital spending, with 70%+ of capacity pre-sold before being built. 5x-ing photonics capacity from year-end 2025 to year-end 2026. Joint SiPh EDA flow with Cadence. Stock up ~6x from 52-week low, trailing P/E ~105x. Also serves analog, RF, power management customers", "AI relevance: CRITICAL. Tower is the #1 open-platform SiPh foundry. As CPO becomes essential for AI data center interconnects (NVIDIA Rubin/Feynman), the photonics chips are fabricated at Tower. SiPh process qualified by Broadcom, Cisco, Coherent, Credo, MACOM. Uses Soitec's Photonics-SOI wafers and Lightwave Logic's EO polymers. CPO foundry services announced 2025", "Investment thesis:\n(1) First-mover in open-platform SiPh foundry \u2014 deep process co-development with leading designers.\n(2) 70%+ of new SiPh capacity pre-sold \u2014 extraordinary customer commitment.\n(3) 5x capacity ramp in 2026 demonstrates conviction from both Tower and customers.\n(4) Diversified analog foundry provides revenue stability beyond SiPh.\n(5) Joint EDA flow with Cadence creates design ecosystem moat.", "Risks:\n(1) Stock has already run ~6x \u2014 P/E of ~105x prices in significant growth.\n(2) Massive SiPh capex ($920M) must deliver returns.\n(3) Concentrated SiPh customer base.\n(4) If CPO adoption timeline extends, capacity could be underutilized.\n(5) GF competing in SiPh.\n(6) Specialty foundry margins are lower than leading-edge."]}, "umc": {"title": "UMC", "bullets": ["Business: Specialty foundry \u2014 mature nodes (12nm-180nm) for automotive, IoT, consumer, RF. Taiwan-based. Revenue ~$7B. Profitable at mature nodes with lower capex than leading-edge. Licensed imec SiPh process for future CPO capability but not yet in production", "AI relevance: Indirect. Serves mature node markets, not leading-edge AI. SiPh license from imec is an interesting future optionality but unproven. Benefits from overall semiconductor demand growth", "Investment thesis:\n(1) Profitable mature-node foundry with stable customer base.\n(2) Lower capex requirements than leading-edge foundries.\n(3) SiPh license from imec provides future CPO optionality.\n(4) Mature nodes still in high demand for automotive/IoT.", "Risks:\n(1) Not participating in leading-edge AI chip manufacturing.\n(2) Chinese foundry competition at mature nodes (SMIC, Hua Hong).\n(3) Taiwan geopolitical risk.\n(4) Mature node pricing pressure."]}, "smic": {"title": "SMIC", "bullets": ["Business: China's largest foundry. Capable up to ~7nm-class without EUV. Revenue ~$8B. Benefits from Chinese government self-sufficiency push. Under US export restrictions limiting EUV access", "AI relevance: Limited for Western AI supply chain. Serves Chinese domestic market. Cannot access EUV lithography for leading-edge AI chips. Could be relevant for Chinese AI chip production (Huawei)", "Investment thesis:\n(1) Protected domestic market due to Western export controls.\n(2) Chinese government support and subsidies.\n(3) Growing domestic customer base.", "Risks:\n(1) Technology gap vs. TSMC (1-2 generations behind at leading edge).\n(2) Cannot access EUV \u2014 limits advancement.\n(3) Geopolitical risk \u2014 further sanctions possible.\n(4) If export controls ease, TSMC/Samsung capture Chinese demand."]}, "sk": {"title": "SK Hynix", "bullets": ["Business: #1 HBM supplier globally with 57-62% share. Also #2 in DRAM overall, major NAND producer. Q1 2026: record revenue 52.6T KRW ($35.5B annualized), operating profit 37.6T KRW \u2014 72% operating margin. Entire DRAM, NAND, and HBM capacity sold out through 2026. Customers no longer negotiating price \u2014 just securing supply. Signed 3-year DDR5 deal with Microsoft, reportedly finalizing 5-year DRAM deal with Google. HBM4 development complete, mass production targeting H2 2026 for NVIDIA Rubin. UBS predicts ~70% HBM4 market share. Investing 19T KRW in new Korean fab. Market cap surged to ~$800B+ (up 80% in one month). Confidentially filed for US ADR listing targeting 2026", "AI relevance: ESSENTIAL. NVIDIA's AI GPUs run almost exclusively on SK Hynix HBM. No HBM = no AI at scale. 'Customers are prioritizing procurement over price' \u2014 SK Hynix executive. Memory bandwidth is proving to be a bigger bottleneck than compute in AI clusters. HBM demand projected to grow 30% annually through 2030. SK Group chairman stated chip wafer shortage likely to persist until 2030", "Investment thesis:\n(1) 57-62% HBM market share with first-mover NVIDIA qualification \u2014 dominant position.\n(2) 72% operating margin in Q1 2026 \u2014 higher than Apple, unprecedented for hardware.\n(3) Entire 2026 production sold out \u2014 complete demand visibility.\n(4) HBM4 for NVIDIA Rubin extends technology leadership to next generation (UBS: ~70% HBM4 share).\n(5) Memory pricing power rising \u2014 multi-year deals with MSFT, GOOG at increasing prices.\n(6) HBM demand creating shortage in standard DRAM/NAND \u2014 virtuous cycle for pricing.\n(7) US ADR filing would unlock broader investor access.", "Risks:\n(1) Memory is historically cyclical \u2014 current supercycle pricing may not sustain.\n(2) Samsung and Micron competing aggressively in HBM \u2014 share could erode.\n(3) Stock has surged dramatically \u2014 premium valuation.\n(4) Massive capex required (19T KRW new fab).\n(5) Geopolitical risk (South Korea).\n(6) HBM pricing correction possible after 2026 as capacity expands."]}, "mu": {"title": "Micron Technology", "bullets": ["Business: #3 memory company \u2014 DRAM, NAND, HBM. Only US-based memory manufacturer. Revenue ~$29B (FY2025). HBM revenue run-rate ~$8B annually (Q4 FY2025: ~$2B). Building CHIPS Act-funded fabs in Idaho and New York ($6.1B in grants). First to ship 1-gamma DRAM. HBM market share rose to 21% in Q2 2025, surpassing Samsung for #2 position. Shipped HBM4 samples. Expects to sell out entire 2026 HBM supply", "AI relevance: High. HBM3E supplier for NVIDIA Blackwell and AMD MI350. US-based HBM production is strategically important. DRAM essential for AI servers beyond GPU HBM. Enterprise SSDs for AI training data storage growing", "Investment thesis:\n(1) Only US-based memory manufacturer \u2014 strategic supply chain importance.\n(2) HBM share rising (21%, up from ~15%) \u2014 gaining on Samsung.\n(3) CHIPS Act funding ($6.1B) reduces capex burden for Idaho/NY fabs.\n(4) HBM supply expected to sell out for 2026 \u2014 pricing power.\n(5) First to 1-gamma DRAM process \u2014 technology leadership.\n(6) Enterprise SSD demand growing with AI training data sets.", "Risks:\n(1) Trailing SK Hynix in HBM market share and NVIDIA qualification timing.\n(2) Memory pricing cycles \u2014 current strength may not sustain.\n(3) Massive capex for CHIPS Act fabs.\n(4) Samsung and SK Hynix are formidable competitors.\n(5) NAND market has been softer than DRAM."]}, "nny": {"title": "Nanya Technology", "bullets": ["Business: #4 DRAM maker globally. Taiwan-based. Focused on specialty DRAM (consumer, networking, niche). Does NOT produce HBM", "AI relevance: Limited. Does not produce HBM. Focused on commodity/specialty DRAM segments. Benefits from general DRAM pricing improvement as HBM production diverts industry capacity", "Investment thesis:\n(1) Benefits from DRAM pricing uplift as HBM production tightens standard DRAM supply.\n(2) Specialty DRAM niches are less competitive.", "Risks:\n(1) No HBM \u2014 missing the highest-growth memory segment.\n(2) Smaller scale vs. Samsung/SK Hynix/Micron.\n(3) Taiwan geopolitical risk."]}, "kxia": {"title": "Kioxia", "bullets": ["Business: #2 NAND flash producer globally (JV with Western Digital). IPO'd on Tokyo Stock Exchange late 2024. Revenue ~$11B. NAND for SSDs, smartphones, data centers. Stock up ~234% YTD", "AI relevance: Moderate but growing. AI training requires massive storage for training data. Enterprise SSDs for AI servers growing rapidly. NAND is less directly AI-critical than HBM but storage is an expanding part of AI infrastructure", "Investment thesis:\n(1) #2 NAND with technology leadership in 3D NAND scaling.\n(2) Enterprise SSD demand growing with AI data storage needs.\n(3) IPO provides public market access to pure-play NAND leader.\n(4) 234% YTD return reflects AI storage demand recognition.", "Risks:\n(1) NAND pricing is cyclical and historically volatile.\n(2) Competition from Samsung, SK Hynix, WDC, Micron.\n(3) Less directly tied to AI than HBM/DRAM.\n(4) Post-IPO maturation."]}, "wdc": {"title": "Western Digital", "bullets": ["Business: HDDs and NAND flash SSDs. Split into HDD and Flash companies in 2024. Stock up ~126% YTD. Enterprise storage for data centers is the primary growth driver", "AI relevance: Growing. Enterprise SSDs for AI data storage. HDDs for massive AI training data sets. AI data volumes growing exponentially \u2014 both hot (SSD) and cold (HDD) storage demand increasing", "Investment thesis:\n(1) Enterprise SSD demand for AI data centers driving revenue growth.\n(2) HDD still essential for bulk AI training data storage.\n(3) Company split unlocks pure-play value for each segment.\n(4) 126% YTD return reflects AI storage demand.", "Risks:\n(1) NAND pricing cyclicality.\n(2) HDD is a declining market long-term.\n(3) Competition from Samsung, Kioxia, Micron in NAND.\n(4) Less directly AI-critical than compute or memory."]}, "winb": {"title": "Winbond Electronics", "bullets": ["Business: NOR flash and specialty DRAM. Taiwan-based. NOR flash for firmware/boot in IoT, automotive, consumer devices", "AI relevance: Limited. NOR flash serves firmware storage \u2014 not a primary AI growth vector", "Investment thesis:\n(1) NOR flash demand from IoT and automotive.\n(2) Specialty DRAM for niche applications.", "Risks:\n(1) Niche market.\n(2) Competition from Macronix, GigaDevice.\n(3) Not an AI play."]}, "mxic": {"title": "Macronix International", "bullets": ["Business: NOR flash memory. Taiwan-based. Stock up ~294% YTD \u2014 strongest performer in the entire semiconductor map", "AI relevance: Limited direct AI exposure. NOR flash serves firmware/boot applications. The massive stock move may reflect speculative momentum or specific product wins rather than AI fundamentals", "Investment thesis:\n(1) 294% YTD suggests significant market re-rating \u2014 worth investigating what's driving it.\n(2) NOR flash demand from automotive and IoT growing.", "Risks:\n(1) Massive YTD move may be overdone.\n(2) NOR is a niche, mature market.\n(3) Limited AI relevance."]}, "giga": {"title": "GigaDevice", "bullets": ["Business: Chinese NOR flash and MCU manufacturer. Benefits from China domestic semiconductor push", "AI relevance: Limited. NOR flash and MCUs for Chinese domestic market", "Investment thesis:\n(1) Protected Chinese domestic market.\n(2) MCU growth in Chinese automotive/IoT.", "Risks:\n(1) Geopolitical risk.\n(2) Limited international relevance.\n(3) Competition from Winbond, Macronix."]}, "evrsp": {"title": "Everspin Technologies", "bullets": ["Business: MRAM (magnetoresistive RAM) \u2014 non-volatile memory with SRAM-like speed. Revenue ~$50M. Niche memory technology for applications requiring fast non-volatile storage", "AI relevance: Niche. MRAM used in some AI inference applications requiring fast, persistent storage. Potential for edge AI applications", "Investment thesis:\n(1) MRAM is a unique memory technology with specific performance advantages.\n(2) Edge AI applications could drive demand.", "Risks:\n(1) Very small company.\n(2) Niche market with limited TAM.\n(3) Competition from other emerging memory technologies."]}, "phis": {"title": "Phison Electronics", "bullets": ["Business: NAND flash controller design \u2014 makes the controller chips that manage flash storage in SSDs. Taiwan-based. Partners with NAND suppliers to deliver complete SSD solutions", "AI relevance: Moderate. SSD controllers in AI server storage. As AI training data sets grow, enterprise SSD demand increases, driving controller demand", "Investment thesis:\n(1) SSD controller demand grows with enterprise SSD deployment.\n(2) AI data storage expansion drives volume.\n(3) Taiwan market leader in flash controllers.", "Risks:\n(1) Competition from Silicon Motion.\n(2) Dependent on NAND suppliers for partnership models.\n(3) Controller is lower-value component vs. NAND itself."]}, "simo": {"title": "Silicon Motion", "bullets": ["Business: NAND flash controllers for SSDs and eMMC. US-listed, Taiwan-based. Competes with Phison in flash controller market", "AI relevance: Same as Phison \u2014 SSD controllers for AI data storage. Enterprise SSD demand growing", "Investment thesis:\n(1) Enterprise SSD controller demand from AI.\n(2) Growing share in enterprise segment.", "Risks:\n(1) Competition from Phison.\n(2) Controller market is competitive.\n(3) Dependent on NAND ecosystem."]}, "ase": {"title": "ASE Technology", "bullets": ["Business: Largest OSAT globally \u2014 packaging and test for chips from all major foundries. Revenue ~$20B. Capabilities: flip-chip, wire bond, fan-out, 2.5D/3D, SiP, testing. Increasingly performing advanced packaging that was historically done by foundries. Global manufacturing footprint", "AI relevance: Growing. As AI chip packaging becomes more complex (chiplets, 2.5D/3D), OSATs handle more workload. However, the highest-end packaging (CoWoS) is primarily done by TSMC in-house. ASE serves the broader chip packaging market including AI-adjacent chips", "Investment thesis:\n(1) Largest OSAT by revenue \u2014 scale and cost advantages.\n(2) Advanced packaging capability growing (2.5D/3D).\n(3) Chiplet architectures expand OSAT workload.\n(4) Diversified customer base across all major chip designers.", "Risks:\n(1) TSMC in-sources highest-value packaging (CoWoS) \u2014 ASE gets the rest.\n(2) Pricing pressure from other OSATs.\n(3) Cyclical with semiconductor volumes.\n(4) Competition from Amkor and JCET."]}, "amk": {"title": "Amkor Technology", "bullets": ["Business: OSAT #2. Revenue ~$6.5B. US-headquartered with Asian manufacturing. Building new advanced packaging facility in Arizona near TSMC's fab. Strong in flip-chip, 2.5D, fan-out, SiP", "AI relevance: Growing. 2.5D/3D packaging capability serves HPC/AI chip customers. Arizona facility will support US-based AI chip packaging near TSMC's fab \u2014 reshoring synergy", "Investment thesis:\n(1) Arizona fab creates US packaging capability alongside TSMC \u2014 reshoring play.\n(2) Growing advanced packaging capability for AI chips.\n(3) #2 OSAT scale.\n(4) Geographic diversification (Korea, Vietnam, Arizona).", "Risks:\n(1) TSMC in-sourcing highest-value packaging.\n(2) Pricing pressure.\n(3) Cyclical.\n(4) Arizona fab execution risk."]}, "jcet": {"title": "JCET Group", "bullets": ["Business: OSAT #3. China's largest OSAT. Revenue ~$4B. Flip-chip, WLCSP, SiP capabilities. Serves Qualcomm, MediaTek, Chinese chip designers", "AI relevance: Indirect. Packages mainstream chips, primarily for Chinese and Asian customers. Less advanced packaging capability than ASE/Amkor for HPC/AI", "Investment thesis:\n(1) Largest Chinese OSAT \u2014 benefits from domestic semiconductor growth.\n(2) Growing packaging capability.", "Risks:\n(1) Less advanced than ASE/Amkor.\n(2) Geopolitical risk \u2014 primarily Chinese operations.\n(3) Competition from ASE and Amkor."]}, "pwt": {"title": "Powertech Technology", "bullets": ["Business: OSAT \u2014 memory packaging specialist. Key DRAM/NAND packaging provider in Taiwan", "AI relevance: Moderate. Packages DRAM for servers, though not the most advanced HBM packaging", "Investment thesis:\n(1) Memory packaging demand growing with DRAM/NAND production.\n(2) Taiwan ecosystem positioning.", "Risks:\n(1) Not participating in highest-value HBM packaging.\n(2) Competition from larger OSATs."]}, "tfme": {"title": "TongFu Microelectronics", "bullets": ["Business: Chinese OSAT. Packaging and test primarily for Chinese domestic semiconductor market", "AI relevance: Limited. Primarily serves Chinese domestic market", "Investment thesis:\n(1) Benefits from Chinese semiconductor self-sufficiency push.", "Risks:\n(1) Limited international relevance.\n(2) Chinese domestic market focus."]}, "htia": {"title": "Huatian Technology", "bullets": ["Business: Chinese OSAT. Packaging services for Chinese semiconductor companies", "AI relevance: Limited. Chinese domestic market focused", "Investment thesis:\n(1) Chinese domestic semiconductor growth.", "Risks:\n(1) Limited international relevance."]}, "kyec": {"title": "KYEC (King Yuan Electronics)", "bullets": ["Business: Taiwan-based independent semiconductor test house. Provides testing services for IC companies without in-house test capability", "AI relevance: Moderate. Tests chips across the industry including AI-adjacent devices. Benefits from overall test demand increase", "Investment thesis:\n(1) Independent test capacity is valuable as chip complexity increases.\n(2) Taiwan ecosystem positioning.", "Risks:\n(1) Competition from OSATs that also offer testing.\n(2) Cyclical."]}, "imos": {"title": "ChipMOS Technologies", "bullets": ["Business: Semiconductor testing and packaging \u2014 specializes in display driver and memory test/packaging", "AI relevance: Limited. Display driver and legacy memory testing", "Investment thesis:\n(1) Display driver IC packaging is a stable niche.", "Risks:\n(1) Limited AI exposure.\n(2) Display market cyclicality."]}, "chpb": {"title": "Chipbond Technology", "bullets": ["Business: LCD/OLED driver IC packaging and testing. Taiwan-based", "AI relevance: Minimal. Pure display driver packaging", "Investment thesis:\n(1) Display driver packaging niche.", "Risks:\n(1) No AI relevance.\n(2) Display market exposure."]}, "unim": {"title": "Unimicron", "bullets": ["Business: #1 IC substrate (ABF) manufacturer globally with ~22% share. Also HDI PCBs. Taiwan-based. Supplies substrates for the highest-end processors. Every NVIDIA GPU package sits on an ABF substrate. Revenue driven by substrate complexity and AI GPU demand", "AI relevance: Critical. Every NVIDIA GPU, AMD CPU, Broadcom ASIC sits on an Unimicron (or competitor) ABF substrate. As AI chips get larger (more I/O, more power), substrates become more complex (more ABF layers, finer pitch). Substrate content per AI GPU is significantly higher than consumer chips", "Investment thesis:\n(1) #1 ABF substrate maker \u2014 key NVIDIA supplier.\n(2) AI GPU substrate complexity driving higher content per chip.\n(3) Capacity takes 2-3 years to build \u2014 supply constraints create pricing power during demand surges.\n(4) Chiplet architectures need more sophisticated substrates.", "Risks:\n(1) Ajinomoto ABF film sole-source dependency.\n(2) Taiwan geopolitical risk.\n(3) Cyclical with chip demand.\n(4) Competition from Ibiden and Shinko.\n(5) Capital-intensive capacity expansion."]}, "ibid": {"title": "Ibiden", "bullets": ["Business: #2 IC substrate (ABF) manufacturer globally with ~19% share. Japanese company. Key Intel and NVIDIA substrate supplier. Also makes automotive exhaust ceramics (diversified). Revenue growth driven by semiconductor substrates", "AI relevance: Same dynamics as Unimicron \u2014 critical substrate supplier for AI processors. Intel CPU substrates and growing NVIDIA GPU substrates drive AI leverage", "Investment thesis:\n(1) #2 ABF substrate maker \u2014 deep Intel relationship + growing NVIDIA.\n(2) Japanese manufacturing quality.\n(3) Diversified revenue (automotive ceramics) provides stability.\n(4) Growing GPU substrate wins expanding AI exposure.", "Risks:\n(1) ABF film sole-source dependency on Ajinomoto.\n(2) Intel market share loss reduces one key customer.\n(3) Competition from Unimicron.\n(4) Capital-intensive."]}, "shko": {"title": "Shinko Electric Industries", "bullets": ["Business: ABF IC substrate maker. Fujitsu subsidiary. Key Intel and NVIDIA substrate supplier. Revenue ~$3B. Strong in flip-chip BGA substrates for server processors", "AI relevance: High. Supplies substrates under Intel Xeon and growing NVIDIA GPU business. Critical link between Ajinomoto ABF film and finished AI chip packages", "Investment thesis:\n(1) Key Intel substrate supplier with growing NVIDIA exposure.\n(2) Fujitsu backing provides stability.\n(3) Japanese quality in high-reliability substrates.", "Risks:\n(1) Ajinomoto ABF sole-source dependency.\n(2) Intel customer concentration.\n(3) Competition from Unimicron and Ibiden."]}, "kins": {"title": "Kinsus Interconnect", "bullets": ["Business: ABF IC substrates \u2014 specialist in GPU and HPC substrates. Taiwan-based. Revenue ~$800M. Strong position in high-end compute substrates", "AI relevance: High. Supplies substrates for NVIDIA GPUs and AMD processors. AI chip substrate content significantly higher than consumer chips", "Investment thesis:\n(1) GPU/HPC substrate specialist \u2014 directly leveraged to AI chip demand.\n(2) Fine-pitch substrate expertise for high-performance computing.", "Risks:\n(1) Ajinomoto ABF dependency.\n(2) Taiwan geopolitical risk.\n(3) Competition from larger substrate makers."]}, "nypc": {"title": "Nan Ya PCB", "bullets": ["Business: ABF IC substrates and HDI PCBs. Part of Formosa Plastics Group. Taiwan-based", "AI relevance: Moderate. Substrates for Intel CPUs and growing GPU substrate business", "Investment thesis:\n(1) Formosa Plastics backing provides capital.\n(2) Growing AI GPU substrate business.", "Risks:\n(1) Smaller than Unimicron/Ibiden.\n(2) Ajinomoto ABF dependency."]}, "ats": {"title": "AT&S", "bullets": ["Business: ABF IC substrates \u2014 European leader (~16% share). Austrian company. Key Intel substrate supplier. Building capacity in Kulim (Malaysia) and Leoben (Austria)", "AI relevance: Substrates for Intel server CPUs and growing AI GPU business. European manufacturing provides geographic diversification", "Investment thesis:\n(1) Only European ABF substrate maker \u2014 supply chain diversification premium.\n(2) Capacity expansion in Malaysia reduces cost.\n(3) Intel + growing AI exposure.", "Risks:\n(1) Smaller than Asian competitors.\n(2) Intel dependency.\n(3) European cost base for legacy operations."]}, "seme": {"title": "Samsung Electro-Mechanics", "bullets": ["Business: IC substrates, MLCC capacitors, camera modules. Part of Samsung Group. Substrates serve Samsung's own chips and external customers", "AI relevance: IC substrates for Samsung products. MLCCs used in every AI server (hundreds per board)", "Investment thesis:\n(1) Captive Samsung substrate demand.\n(2) MLCC content per AI server is high.", "Risks:\n(1) Samsung Group internal dynamics.\n(2) Competition from larger substrate makers."]}, "ddk": {"title": "Daeduck Electronics", "bullets": ["Business: Korean IC substrate and PCB manufacturer. Stock up ~143% combined returns. Serves Korean semiconductor ecosystem", "AI relevance: Substrates for Korean semiconductor companies (Samsung, SK Hynix). Benefits from Korean AI semiconductor investment", "Investment thesis:\n(1) Korean semiconductor ecosystem exposure.\n(2) 143% combined return suggests market recognizing positioning.\n(3) Benefits from Samsung/SK Hynix capacity expansion.", "Risks:\n(1) Smaller scale.\n(2) Korean market concentration."]}, "xfab": {"title": "X-Fab", "bullets": ["Business: European specialty foundry \u2014 SiC, SOI, MEMS, analog at 180nm-1um. Belgian-based", "AI relevance: Limited. Specialty processes for automotive/industrial, not AI chips", "Investment thesis:\n(1) European specialty foundry with SiC capability.\n(2) EU CHIPS Act investment in local manufacturing.", "Risks:\n(1) Not participating in AI chip manufacturing.\n(2) Niche market."]}, "skyt": {"title": "SkyWater Technology", "bullets": ["Business: US-based specialty foundry \u2014 CHIPS Act beneficiary. Defense-grade and research fabs in Minnesota and Florida. Stock up ~113% combined returns", "AI relevance: Strategic US foundry for defense and research. Potential for specialized AI chip prototyping. Trusted foundry designation gives access to government AI programs", "Investment thesis:\n(1) Only US-based trusted foundry \u2014 defense and government AI programs.\n(2) CHIPS Act beneficiary.\n(3) Research/prototyping services for AI startups.", "Risks:\n(1) Small revenue base.\n(2) Mature nodes \u2014 not leading-edge AI chip manufacturing.\n(3) Government contract timing can be lumpy."]}, "vang": {"title": "Vanguard International Semiconductor", "bullets": ["Business: TSMC subsidiary \u2014 specialty foundry for 150mm/200mm wafers. Power, analog, MEMS", "AI relevance: Limited. Mature-node foundry for non-AI applications", "Investment thesis:\n(1) TSMC subsidiary with stable business.\n(2) Power/analog demand for automotive.", "Risks:\n(1) Mature nodes only.\n(2) Limited growth vs. leading-edge."]}, "hhng": {"title": "Hua Hong Semiconductor", "bullets": ["Business: Chinese specialty foundry \u2014 power discrete, NOR flash, logic at 55nm-350nm", "AI relevance: Limited. Chinese domestic market, mature nodes", "Investment thesis:\n(1) Chinese domestic semiconductor growth.", "Risks:\n(1) Mature nodes.\n(2) Geopolitical risk."]}, "dbhi": {"title": "DB HiTek", "bullets": ["Business: Korean specialty foundry \u2014 display drivers, power management, analog ICs", "AI relevance: Limited. Mature-node foundry for non-AI applications", "Investment thesis:\n(1) Korean semiconductor ecosystem.", "Risks:\n(1) Mature nodes.\n(2) Display market exposure."]}, "psmc": {"title": "PSMC (Powerchip)", "bullets": ["Business: Taiwan-based specialty foundry and DRAM. Makes commodity DRAM and provides foundry services at mature nodes", "AI relevance: Limited. Commodity DRAM and mature-node foundry", "Investment thesis:\n(1) Commodity DRAM benefits from overall pricing uplift.", "Risks:\n(1) Small scale.\n(2) Not participating in HBM or advanced nodes."]}, "wins": {"title": "WIN Semiconductors", "bullets": ["Business: World's largest pure-play III-V foundry \u2014 GaAs/GaN devices on 6-inch wafers. Taiwan-based. Stock up ~228% YTD. Revenue growing strongly on 5G and photonics", "AI relevance: III-V component manufacturing for 5G infrastructure and emerging photonics. As SiPh drives demand for III-V laser integration, WIN's foundry becomes more relevant for CPO", "Investment thesis:\n(1) Largest III-V foundry \u2014 capacity that takes years to replicate.\n(2) 228% YTD return reflects 5G/photonics demand recognition.\n(3) Deep GaAs/GaN process expertise creates switching costs.\n(4) 5G mmWave and photonics are dual growth vectors.", "Risks:\n(1) Concentrated in III-V niche \u2014 small TAM.\n(2) Taiwan geopolitical risk.\n(3) Competition from IDMs with in-house fabs."]}, "cohr": {"title": "Coherent Corp.", "bullets": ["Business: #1 optical transceiver manufacturer (~25% share). Revenue $1.8B in Q3 FY2026 (record), up 17% YoY. Formed from II-VI + Finisar + original Coherent mergers. Three segments: Networking (~50%, AI growth driver), Materials (SiC substrates), Industrial (lasers). Data center book-to-bill exceeds 4x with backlog extending to 2028. Scaling InP wafer production from 3-inch to 6-inch \u2014 doubling output by end Q4 FY2026, doubling again by end 2027. NVIDIA invested $2B + multi-year CPO supply agreement covering CW lasers, ELS modules, fiber attach through end of decade. CPO represents >$15B incremental TAM. Also makes SiC substrates and optical circuit switches (OCS, >$4B TAM). Debt leverage improving: 1.7x, down from 2.3x", "AI relevance: Core AI infrastructure company. 800G/1.6T transceivers connect AI GPU clusters. NVIDIA's $2B investment signals Coherent is the strategic laser/optics supplier for next-gen AI networking. CPO revenue for scale-out begins H2 2026, scale-up CPO in H2 2027. InP CW lasers are essential for CPO \u2014 silicon cannot emit light. NVIDIA's Spectrum-6 switch integrates 200Gb/s CPO, replacing pluggable transceivers entirely, creating structural procurement for Coherent's components", "Investment thesis:\n(1) NVIDIA's $2B investment + multi-year supply agreement provides revenue visibility through end of decade.\n(2) #1 transceiver share with InP laser technology that is essential for CPO \u2014 no substitutes.\n(3) Data center book-to-bill >4x with backlog to 2028.\n(4) CPO is >$15B incremental TAM on top of existing transceiver business.\n(5) 6-inch InP capacity ramp ahead of schedule \u2014 output doubling twice by end 2027.\n(6) OCS (optical circuit switches) adds another $4B+ TAM.\n(7) Q4 FY2026 guide: $1.91-2.05B revenue \u2014 quarterly run-rate approaching $8B annualized.", "Risks:\n(1) Customer concentration rising as NVIDIA becomes dominant buyer.\n(2) CPO transition could cannibalize pluggable transceiver revenue if timing misaligns.\n(3) Debt from acquisitions (though leverage declining).\n(4) Competition from Lumentum in lasers, Broadcom in SiPh.\n(5) SiC/Industrial segments have been softer.\n(6) Execution risk on rapid InP capacity ramp."]}, "lite": {"title": "Lumentum Holdings", "bullets": ["Business: CW (continuous wave) lasers for silicon photonics, coherent optical components, 3D sensing VCSELs, telecom lasers. Revenue ~$1.5B. NVIDIA invested $2B alongside Coherent to secure laser supply. Key CPO laser supplier \u2014 CW lasers are the external light sources that SiPh PICs require. Shifting from telecom dependence to datacom/AI", "AI relevance: High. CW lasers are mandatory for silicon photonics \u2014 silicon cannot generate its own light. Every SiPh chip for CPO needs an external laser, and Lumentum is a primary supplier. NVIDIA's $2B investment confirms strategic importance. As CPO scales, laser demand multiplies directly", "Investment thesis:\n(1) NVIDIA's $2B investment secures Lumentum as strategic CPO laser supplier.\n(2) CW lasers are mandatory for SiPh \u2014 no alternative light source exists.\n(3) CPO laser demand multiplies with every SiPh chip deployed.\n(4) 1.6T datacom transceivers provide near-term revenue growth.\n(5) Deep InP laser technology expertise with strong IP portfolio.", "Risks:\n(1) Apple VCSEL revenue has declined \u2014 3D sensing business weakening.\n(2) Telecom market weakness.\n(3) Competition from Coherent in lasers.\n(4) If CPO adoption delays, laser demand growth slows.\n(5) Needs to execute shift from telecom to datacom/AI."]}, "aaoi": {"title": "Applied Optoelectronics (AAOI)", "bullets": ["Business: Vertically integrated optical transceiver manufacturer \u2014 makes its own lasers + modules in-house. Revenue growing rapidly on AI data center demand. Received first volume order for 1.6T transceivers from major hyperscale customer (suspected Amazon). CFO targets mid-2027 monthly transceiver revenue run-rate of ~$378M/month across 100/400G, 800G, and 1.6T products. Three hyperscale customers confirmed", "AI relevance: High. Transceivers connect AI GPU clusters in data centers. 800G/1.6T transceiver demand surging with AI buildout. Vertically integrated InP laser manufacturing is the key differentiator \u2014 AAOI can control its laser supply chain when others face shortages", "Investment thesis:\n(1) Vertical integration (own laser fabs) provides cost advantage and supply security.\n(2) First 1.6T volume order from hyperscaler validates product.\n(3) $378M/month target by mid-2027 implies massive revenue inflection.\n(4) Three hyperscale customers provide diversification.\n(5) Pluggable transceivers remain dominant for next 18-24 months before CPO transition.", "Risks:\n(1) Smaller than Coherent/Lumentum \u2014 less diversified.\n(2) Customer concentration in hyperscalers.\n(3) CPO could eventually displace pluggable transceivers \u2014 transition risk.\n(4) Historically volatile financial performance.\n(5) Competition from larger optical players."]}, "siv_p": {"title": "Sivers Semiconductors (Lasers)", "bullets": ["Business: III-V laser diodes and photonic integrated circuits for silicon photonics external light sources. Swedish company (~$300M market cap). Partnership with POET Technologies for CPO modules. InP lasers designed specifically for SiPh integration", "AI relevance: External light sources are mandatory for silicon photonics. As CPO scales, laser demand multiplies. Sivers' InP lasers are designed specifically for integration with SiPh foundry processes at Tower and GlobalFoundries", "Investment thesis:\n(1) Specialized III-V laser technology for SiPh applications.\n(2) Partnership ecosystem (POET, foundry customers) provides design-in pathway.\n(3) If CPO volumes materialize, revenue inflection from small base could be dramatic.\n(4) Small market cap means high upside potential.", "Risks:\n(1) Small company \u2014 pre-production for CPO lasers.\n(2) Customer concentration.\n(3) Needs to prove volume manufacturing capability.\n(4) Competition from Coherent and Lumentum which have massive scale."]}, "poet": {"title": "POET Technologies", "bullets": ["Business: Photonic integrated circuit platform \u2014 combines electronic and photonic functions on a single chip. Partnership with Sivers for external light source modules for AI data centers. Pre-revenue/early stage", "AI relevance: Potential enabler for next-gen CPO if platform gains adoption. Integrating optical and electronic functions could simplify CPO packaging", "Investment thesis:\n(1) Novel integration approach could reduce CPO cost and complexity.\n(2) Sivers partnership provides access to III-V laser technology.", "Risks:\n(1) Very early stage \u2014 unproven at production scale.\n(2) Small company with limited resources.\n(3) Competition from established players (Coherent, Broadcom SiPh)."]}, "hama": {"title": "Hamamatsu Photonics", "bullets": ["Business: Photodetectors, photomultiplier tubes, image sensors, laser diodes for scientific/industrial applications. Revenue ~$1.5B. Deep expertise in photon detection and measurement. Japanese company", "AI relevance: Moderate. Photonic components for sensing and measurement. Less directly tied to AI data center interconnect than Coherent/Lumentum. Potential role in quantum computing and advanced imaging for AI", "Investment thesis:\n(1) Deep photonics expertise positions for emerging applications (quantum, LiDAR).\n(2) Scientific instruments demand is stable.", "Risks:\n(1) Limited direct AI data center exposure.\n(2) Scientific instruments market is modest growth."]}, "fabn": {"title": "Fabrinet", "bullets": ["Business: Contract manufacturer for optical transceivers and photonics components. Revenue ~$3B. Key manufacturing partner for Coherent and Lumentum. Thailand-based manufacturing with precision optical assembly expertise. Revenue grows in direct proportion to transceiver demand", "AI relevance: High. Manufactures the transceivers that connect AI GPU clusters. As optical interconnect scales for AI data centers, Fabrinet's manufacturing volume grows directly. When Coherent and Lumentum sell more, Fabrinet makes more", "Investment thesis:\n(1) Pure-play contract manufacturer riding the AI optical interconnect wave.\n(2) Precision optical manufacturing expertise is difficult to replicate.\n(3) Thailand-based cost advantage.\n(4) Revenue directly correlated to Coherent/Lumentum growth.\n(5) Multiple product lines provide diversification within optics.", "Risks:\n(1) Manufacturing margins are lower than component/IP companies.\n(2) Customer concentration (Coherent + Lumentum = large share).\n(3) If CPO changes transceiver form factors, manufacturing processes may need to adapt.\n(4) Thai baht currency exposure."]}, "brcm_s": {"title": "Broadcom (Silicon Photonics)", "bullets": ["Business: Leading merchant SiPh chip designer \u2014 designs photonic integrated circuits for CPO. SiPh PICs fabricated at Tower Semi and GlobalFoundries. Broadcom's dominant switch position (Tomahawk) creates natural path to integrate CPO. Demonstrated 6.4T socketed SiPho CPO at OFC 2026", "AI relevance: Critical. CPO is the next paradigm for AI data center interconnects. Broadcom's SiPh PICs replace pluggable transceivers in next-gen networking switches, dramatically increasing bandwidth density and reducing power. NVIDIA's Spectrum-6 architecture integrates CPO \u2014 Broadcom's Tomahawk is the competitive switch platform", "Investment thesis:\n(1) First-mover in merchant CPO \u2014 deep co-development with Tower Semi SiPh process.\n(2) Broadcom's dominant switch position creates natural CPO integration pathway.\n(3) 6.4T CPO demonstrated \u2014 technology is production-ready.\n(4) CPO eliminates pluggable transceivers entirely \u2014 structural architecture shift.", "Risks:\n(1) CPO adoption timeline could extend.\n(2) Competition from Cisco/Intel/Marvell SiPh.\n(3) Requires new packaging ecosystem.\n(4) Tower Semi SiPh capacity could constrain ramp."]}, "csc_s": {"title": "Cisco (Silicon Photonics)", "bullets": ["Business: SiPh transceivers and coherent optics via Luxtera (acquired 2018) and Acacia acquisitions. Fabricated at Tower Semi/GF. Early SiPh pioneer", "AI relevance: SiPh optics for AI data center networking. Cisco integrating photonics into its networking portfolio. Coherent optics for DCI (data center interconnect)", "Investment thesis:\n(1) Early SiPh pioneer with acquired technology (Luxtera, Acacia).\n(2) Networking market position provides distribution for SiPh products.", "Risks:\n(1) SiPh is one small division within huge Cisco.\n(2) Broadcom SiPh may be more advanced.\n(3) Cisco's networking share under pressure from Broadcom/Arista."]}, "int_s": {"title": "Intel (Silicon Photonics)", "bullets": ["Business: SiPh optical transceivers manufactured in Intel's own fabs. One of first companies to ship SiPh products at scale. Unique because Intel fabs its own SiPh \u2014 unlike Broadcom/Cisco which use Tower/GF", "AI relevance: SiPh transceivers serve AI data center interconnect. Vertically integrated SiPh manufacturing is a differentiator", "Investment thesis:\n(1) Only company manufacturing SiPh in-house at scale.\n(2) Deep process expertise from years of development.\n(3) Could supply SiPh to Intel Foundry external customers.", "Risks:\n(1) Intel is restructuring \u2014 SiPh may not get investment priority.\n(2) Tower Semi's open-platform model may be more attractive to designers.\n(3) Small division within struggling Intel."]}, "mrv_s": {"title": "Marvell (Silicon Photonics)", "bullets": ["Business: SiPh-based optical I/O via Celestial AI acquisition ($5.5B). Enables chip-to-chip communication via light instead of electrical traces. Could be transformative for AI cluster scaling", "AI relevance: Very high. Optical I/O replaces electrical interconnects between chiplets \u2014 this could solve the bandwidth/power wall for AI cluster scaling. If optical I/O becomes standard, every AI chip package needs photonic interconnect", "Investment thesis:\n(1) Celestial AI's optical I/O technology could be transformative.\n(2) Chip-to-chip photonic communication solves AI scaling bottleneck.\n(3) Marvell's custom silicon platform provides distribution.", "Risks:\n(1) Very early stage \u2014 optical I/O not yet proven at production scale.\n(2) $5.5B acquisition integration risk.\n(3) If electrical interconnects continue improving, optical I/O may not be necessary near-term."]}, "glw": {"title": "Corning Inc.", "bullets": ["Business: #1 optical fiber manufacturer globally. Revenue ~$14B. Optical Communications ~35% of revenue. Also display glass, specialty materials, life sciences. Estimates AI data centers use 10x more fiber per rack than traditional data centers", "AI relevance: High. AI data centers require massive amounts of optical fiber for GPU interconnects. 10x fiber content per AI rack vs. traditional. New ultra-low-loss fiber products designed for AI workloads. Every CPO and pluggable transceiver connection needs Corning fiber", "Investment thesis:\n(1) 10x fiber content per AI data center rack \u2014 structural demand multiplier.\n(2) #1 fiber manufacturer with decades of manufacturing expertise.\n(3) Ultra-low-loss fiber for AI workloads commands premium pricing.\n(4) Volume commitments from hyperscalers provide revenue visibility.", "Risks:\n(1) Fiber is a commodity-like product with competitive pricing.\n(2) Telecom fiber demand has been weak.\n(3) Optical Communications is ~35% of diversified Corning.\n(4) If AI data center buildout slows, fiber demand declines."]}, "aph": {"title": "Amphenol", "bullets": ["Business: #1 connector company globally. Revenue ~$15B. Diversified across 45+ end markets. High-speed connectors, cables, and interconnect solutions in every AI server rack. 25%+ operating margins. Acquisitive growth model", "AI relevance: High. High-speed connectors in every AI server rack \u2014 GPU-to-switch cables, power connectors, backplane interconnects. AI data center buildout drives connector content per rack significantly higher than traditional data centers", "Investment thesis:\n(1) AI data center connector content per rack is significantly higher than traditional.\n(2) #1 connector company with scale and breadth.\n(3) 800G/1.6T cable assemblies for AI networking.\n(4) Power connectivity for high-wattage GPU racks is growing.\n(5) 25%+ operating margins with acquisitive growth model.", "Risks:\n(1) Diversified \u2014 limited pure-play AI leverage.\n(2) Connector market is competitive.\n(3) If AI data center buildout slows, connector demand normalizes."]}, "tec": {"title": "TE Connectivity", "bullets": ["Business: Connectors, sensors, electronic components. Revenue ~$16B. Automotive ~50%, data center/communications growing. High-power connectors for data centers", "AI relevance: Growing. Data center power and signal connectors for AI servers. High-power connector demand for GPU racks. 48V power distribution connectors", "Investment thesis:\n(1) Data center connector demand growing with AI.\n(2) High-power connectors for GPU racks.\n(3) Automotive provides stable base revenue.", "Risks:\n(1) Automotive is largest segment \u2014 not an AI pure-play.\n(2) Competition from Amphenol.\n(3) Cyclical with auto/industrial."]}, "crdo": {"title": "Credo Technology", "bullets": ["Business: High-speed SerDes chipsets and active electrical cables (AECs) for AI data center interconnects. Revenue ~$250M and growing 50%+ YoY. AECs replace passive copper cables in AI GPU clusters with active signal conditioning. Enables 100G/200G per lane connectivity. Fabbed at Tower Semiconductor", "AI relevance: Very high. As AI clusters scale to tens of thousands of GPUs, the cables connecting them become a bottleneck. Credo's AECs enable longer reach and higher bandwidth between GPUs within racks. Every AI GPU needs multiple high-speed connections", "Investment thesis:\n(1) Leading-edge SerDes technology (200G/lane) \u2014 first-mover in AECs for AI clusters.\n(2) 50%+ YoY revenue growth demonstrates product-market fit.\n(3) Deep hyperscaler relationships (Microsoft, Google reportedly).\n(4) Tower Semi fabrication connects Credo to SiPh ecosystem.\n(5) Every AI GPU added to a cluster needs more cables \u2014 linear scaling.", "Risks:\n(1) Small company \u2014 customer concentration.\n(2) Competition from Broadcom and Marvell in SerDes.\n(3) If optical cables replace electrical (CPO), AEC demand shifts.\n(4) Stock has already run significantly."]}, "alab": {"title": "Astera Labs", "bullets": ["Business: PCIe/CXL retimers, smart cable modules, connectivity ICs for AI data center infrastructure. Revenue ~$400M+ and growing rapidly. IPO'd 2024. Products solve signal integrity problems in AI server designs \u2014 retimers clean up degraded signals at high speeds", "AI relevance: Very high. AI servers push PCIe and CXL interfaces to their limits. Retimers are needed as link lengths and speeds increase. CXL memory expansion enables larger memory pools for AI workloads. Every AI server uses PCIe \u2014 retimers become essential at higher speeds", "Investment thesis:\n(1) First-mover in AI-optimized PCIe/CXL retimers.\n(2) Strong hyperscaler design wins validate product.\n(3) PCIe 6.0/7.0 transition drives retimer demand \u2014 higher speeds need more signal conditioning.\n(4) CXL memory expansion for AI is a major new TAM.\n(5) Rapidly growing revenue validates product-market fit.", "Risks:\n(1) Broadcom and Marvell competing in PCIe retimers.\n(2) CXL adoption pace uncertain.\n(3) Small company \u2014 stock has run significantly from IPO.\n(4) If PCIe speeds plateau, retimer demand stalls."]}, "macom": {"title": "MACOM Technology", "bullets": ["Business: High-speed analog/mixed-signal \u2014 TIAs, laser drivers, RF amplifiers, ADCs for optical, 5G, and defense. Revenue ~$750M. Acquired Wolfspeed's RF GaN business. Products enable electrical-to-optical conversion in transceivers and RF amplification in 5G", "AI relevance: Growing. TIAs and drivers are inside optical transceivers connecting AI GPU clusters. As transceiver speeds increase to 800G/1.6T, more sophisticated analog components needed. 5G infrastructure for wireless AI also growing", "Investment thesis:\n(1) Critical analog components inside every optical transceiver.\n(2) 800G/1.6T speed transitions drive higher-value analog content.\n(3) Wolfspeed RF acquisition adds GaN for 5G/defense.\n(4) Defense RF provides stable revenue base.", "Risks:\n(1) Wolfspeed RF integration risk.\n(2) Competition from Broadcom in transceiver analog.\n(3) If CPO changes transceiver architecture, analog component requirements may shift."]}, "nvda": {"title": "NVIDIA", "bullets": ["Business: Dominant AI accelerator company \u2014 ~80% market share in AI GPUs. FY2026 revenue $215.9B (+65% YoY). Data Center ~91% of revenue ($194B+). Q4 FY2026 revenue $68.1B (+73% YoY). Gross margins 79-88% depending on product mix. Market cap ~$3.2-4.5T (world's most valuable). Blackwell architecture generating billions per quarter, GB300 now ~2/3 of Blackwell revenue. Supply commitments nearly doubled to $95.2B. CFO visibility into $500B Blackwell+Rubin revenue through end of calendar 2026. 5M+ CUDA developers. Invested $4B in Coherent+Lumentum for CPO supply. Rubin samples shipping, Vera Rubin on track for H2 FY2027. Gaming $16B (+41%), Auto $2.3B (+39%), ProViz $3.2B (+70%)", "AI relevance: THE center of the AI universe. NVIDIA GPUs are the default hardware for AI training and inference. CUDA ecosystem (5M+ developers, 18+ years) creates near-insurmountable switching costs. Full-stack advantage: hardware + software + networking + now optical (CPO investments). Every major AI lab, hyperscaler, and enterprise trains on NVIDIA. Hyperscalers projected to spend ~$700B on AI capex in 2026 \u2014 flows through NVIDIA", "Investment thesis:\n(1) ~80% AI accelerator market share with CUDA ecosystem moat.\n(2) $500B revenue visibility through end of calendar 2026.\n(3) FY2026 $215.9B revenue at ~80%+ gross margins \u2014 unprecedented hardware economics.\n(4) Blackwell sold out, Rubin extending product cycle \u2014 annual cadence prevents customer pause.\n(5) $4B CPO investment secures optical supply chain for Spectrum-6/Rubin networking.\n(6) Forward P/E compressed to ~25x despite 60%+ earnings growth \u2014 valuation reasonable relative to growth.\n(7) Networking (InfiniBand, Ethernet) and CPO expanding TAM beyond GPUs.\n(8) Gaming, Auto, ProViz provide diversification \u2014 all growing 35%+.", "Risks:\n(1) Customer concentration \u2014 top 4 hyperscalers are 40%+ of revenue.\n(2) AMD (MI350) and custom ASICs (Broadcom for Google/Meta) competing for share \u2014 absolute share may decline from 87% to 75% by 2026 even as absolute revenue grows.\n(3) China export restrictions limit TAM.\n(4) Rubin delay reportedly one quarter \u2014 product cadence credibility.\n(5) If AI spending growth slows, revenue could decelerate sharply.\n(6) Extremely high expectations priced in \u2014 any miss is punished.\n(7) Sovereign AI deals may be lumpy and politically sensitive."]}, "amd": {"title": "AMD", "bullets": ["Business: CPUs (Ryzen, EPYC), GPUs (Radeon, Instinct MI300/MI325/MI350), FPGAs (Xilinx), adaptive SoCs. Revenue ~$26B. Data Center growing ~60% YoY driven by EPYC server CPUs and MI300 AI accelerators. Fabless \u2014 all chips at TSMC. Server CPU share now ~25%+ (up from ~5% five years ago). ROCm open-source software stack as CUDA alternative", "AI relevance: #2 AI GPU company behind NVIDIA. MI300X/MI325X deployed at Microsoft, Meta, Google, Oracle for AI training and inference. EPYC server CPUs power AI data centers alongside GPUs. Xilinx FPGAs used for edge AI inference. ROCm software improving but still behind CUDA maturity", "Investment thesis:\n(1) x86 CPU duopoly with Intel \u2014 rapidly gaining server share (25%+, still growing).\n(2) MI350 (next-gen AI GPU) could narrow the CUDA gap.\n(3) TSMC leading-edge access ensures competitive silicon.\n(4) Xilinx FPGA adds adaptable compute for edge AI.\n(5) Broader portfolio (CPU+GPU+FPGA) than NVIDIA.\n(6) Trades at significant discount to NVIDIA on P/E basis.", "Risks:\n(1) NVIDIA's CUDA ecosystem is a massive moat \u2014 ROCm is not yet equivalent.\n(2) Intel fighting back in server CPUs.\n(3) Custom ASICs (Broadcom, Marvell) taking AI accelerator share.\n(4) If AI GPU demand concentrates on NVIDIA, AMD share gains could stall."]}, "avgo": {"title": "Broadcom", "bullets": ["Business: Custom AI ASICs (Google TPU, Meta, others), networking silicon (Tomahawk/Jericho switches), SiPh PICs, Wi-Fi/BT, broadband, VMware enterprise software. Revenue ~$50B+. Semi segment ~$30B+ growing 25%+ on AI. VMware adds $15B+ recurring software. Designs custom AI accelerators for specific hyperscalers \u2014 potentially $60-90B TAM by 2027 per management", "AI relevance: Very high \u2014 #2 AI chip revenue after NVIDIA. Custom ASICs designed for each hyperscaler's specific AI workload offer better cost/power efficiency for targeted tasks. Tomahawk/Jericho switches connect AI clusters. SiPh PICs for CPO (demonstrated 6.4T). VMware provides cloud/virtualization software for AI infrastructure", "Investment thesis:\n(1) $60-90B custom ASIC TAM by 2027 \u2014 multi-year hyperscaler design cycles create lock-in.\n(2) Dominant in network switching \u2014 AI clusters require Broadcom switches.\n(3) SiPh/CPO leadership extends AI networking advantage.\n(4) VMware provides $15B+ recurring software revenue and cloud customer relationships.\n(5) Diversified across AI compute, networking, SiPh, and software.", "Risks:\n(1) Custom ASIC revenue is lumpy (depends on hyperscaler design cycles).\n(2) If hyperscalers build in-house ASIC teams, Broadcom's role diminishes.\n(3) High debt from VMware acquisition.\n(4) Complex conglomerate structure.\n(5) NVIDIA networking competes with Broadcom switching."]}, "mrvl": {"title": "Marvell Technology", "bullets": ["Business: Custom AI ASICs, DPUs, networking controllers, storage controllers, electro-optics (Celestial AI, $5.5B). Revenue ~$6B. Data center 70%+ of revenue. Custom silicon for Amazon (Trainium/Inferentia) and other hyperscalers. Fabless at TSMC", "AI relevance: High. Custom AI ASICs for hyperscaler workloads. Celestial AI optical I/O could be transformative \u2014 enables chip-to-chip communication via light. DPUs for AI networking. Growing AI custom silicon portfolio", "Investment thesis:\n(1) Deep hyperscaler relationships (Amazon is major custom silicon partner).\n(2) Celestial AI optical I/O is a potentially transformative technology.\n(3) Broad IP across networking, storage, compute.\n(4) TSMC leading-edge access.\n(5) Data center 70%+ provides AI concentration.", "Risks:\n(1) Custom ASIC revenue lumpiness.\n(2) Broadcom is the larger custom ASIC competitor.\n(3) Celestial AI integration risk ($5.5B bet).\n(4) If hyperscalers shift to fully internal ASIC design, outsourced design wins could slow."]}, "arm": {"title": "Arm Holdings", "bullets": ["Business: CPU architecture IP \u2014 licenses ISA and processor core designs. Revenue ~$3.2B. ~95% gross margin. 99% of smartphones use Arm. Growing rapidly in servers \u2014 Amazon Graviton, Google Axion, NVIDIA Grace, Microsoft Cobalt all Arm-based. Neoverse platform targets data center/cloud. IP licensing (upfront fees + per-chip royalties). SoftBank ownership", "AI relevance: Growing. Arm-based CPUs increasingly used alongside GPUs in AI servers. Growing from 15% to potentially 50%+ of cloud/server CPUs over next 5 years. Arm profits regardless of which specific chip company wins \u2014 royalty model. Armv9 architecture commands higher per-chip royalties than Armv8", "Investment thesis:\n(1) Near-monopoly in mobile (99% of smartphones) with growing server penetration.\n(2) Royalty model means Arm profits regardless of which chip company wins.\n(3) Server CPU share growth from 15% to 50%+ is a multi-year structural trend.\n(4) Armv9 royalty rate increase drives revenue per chip higher.\n(5) 95% gross margin \u2014 one of highest-margin businesses in technology.\n(6) 5M+ developer ecosystem creates deep switching costs.", "Risks:\n(1) RISC-V open-source ISA is a free alternative (threat at low-end/embedded).\n(2) Qualcomm legal dispute over Nuvia custom cores.\n(3) Customer pushback on royalty rate increases.\n(4) If x86 maintains server dominance, growth ceiling exists.\n(5) SoftBank ownership creates governance questions."]}, "intc": {"title": "Intel", "bullets": ["Business: CPUs (Xeon server, Core/Ultra client), FPGAs (Altera \u2014 spinning off), Mobileye ADAS, SiPh transceivers, foundry services. Revenue ~$54B but declining. Massive restructuring \u2014 Altera IPO, foundry separation, cost cuts. CHIPS Act beneficiary ($8.5B grants). Broadest semiconductor portfolio in the industry", "AI relevance: Complex. Xeon CPUs in most existing servers (but losing share to AMD/Arm). Gaudi AI accelerator struggled vs. NVIDIA. Altera FPGAs have edge AI applications. SiPh transceivers relevant for CPO. Intel Foundry's 18A could manufacture AI chips for others. 'Strategic importance for US semiconductor sovereignty'", "Investment thesis:\n(1) Stock up 71% YTD suggests turnaround narrative gaining credibility.\n(2) 18A foundry process could restore manufacturing competitiveness.\n(3) CHIPS Act $8.5B in grants reduces capex burden.\n(4) Altera IPO unlocks hidden value.\n(5) SiPh manufacturing capability is undervalued.\n(6) Xeon market share could stabilize if execution improves.", "Risks:\n(1) Continued CPU share loss to AMD EPYC and Arm-based chips.\n(2) Gaudi failed in AI accelerators \u2014 NVIDIA dominance unchallenged.\n(3) Massive foundry losses during transition.\n(4) Management credibility concerns after years of process delays.\n(5) 18A must prove yields \u2014 existential for foundry strategy."]}, "qcom": {"title": "Qualcomm", "bullets": ["Business: Mobile SoCs (Snapdragon), 5G modems, Wi-Fi/BT, automotive SoCs, PC processors (Snapdragon X Elite). Revenue ~$39B. QCT (chips) ~80%, QTL (patent licensing) ~20%. QTL generates billions in royalties from 3G/4G/5G patents regardless of hardware market. 160K+ patents", "AI relevance: Moderate/growing. On-device AI (running AI models locally on phones/PCs/cars) is Qualcomm's angle. Snapdragon X Elite puts NPUs in PCs. Automotive AI (ADAS, autonomous driving) \u2014 $45B pipeline. Not competing with NVIDIA in data center AI", "Investment thesis:\n(1) #1 mobile SoCs with technology leadership.\n(2) 5G patent portfolio generates billions regardless of hardware market.\n(3) On-device AI is a growing theme \u2014 Snapdragon X for AI PCs.\n(4) $45B automotive pipeline is a multi-year growth story.\n(5) 160K+ patents \u2014 deep IP moat.", "Risks:\n(1) Apple designing own modem \u2014 potential loss of major customer.\n(2) Samsung uses Exynos in some models.\n(3) MediaTek competition in mid-range.\n(4) If on-device AI doesn't gain traction, PC/auto diversification slows."]}, "mtek": {"title": "MediaTek", "bullets": ["Business: Mobile SoCs (Dimensity), Wi-Fi chips, smart TV processors, IoT connectivity. Revenue ~$18B. #1 smartphone chip vendor by volume. Taiwan-based. Fabbed at TSMC", "AI relevance: Moderate. On-device AI in smartphones (NPUs in Dimensity chips). Generative AI on mobile is a growth theme. Not a data center AI play", "Investment thesis:\n(1) #1 smartphone chip volume \u2014 massive scale.\n(2) On-device AI in Dimensity chips.\n(3) TSMC leading-edge access.\n(4) Wi-Fi 7 and IoT provide diversification.", "Risks:\n(1) Qualcomm competition at high end.\n(2) Smartphone market maturation.\n(3) Taiwan geopolitical risk."]}, "mpwr": {"title": "Monolithic Power Systems", "bullets": ["Business: Power management ICs \u2014 voltage regulators, DC-DC converters. Revenue ~$2.2B. ~58% gross margin. Key supplier of GPU power delivery for NVIDIA. Fabless analog semiconductor", "AI relevance: Direct. AI GPUs consume 500-1000+ watts each, requiring sophisticated power delivery. MPS voltage regulators sit on NVIDIA GPU boards converting 48V to precise GPU voltages. More powerful GPUs = more power management content per system", "Investment thesis:\n(1) Direct NVIDIA GPU power delivery exposure \u2014 content grows with GPU power.\n(2) 48V rack architecture transition drives more power conversion stages.\n(3) ~58% gross margins with growing AI content.\n(4) Automotive electrification adds second growth vector.", "Risks:\n(1) Customer concentration if NVIDIA relationship changes.\n(2) Competition from TI and Infineon in power management.\n(3) GPU power architectures could change.\n(4) Analog semiconductor cycle exposure."]}, "csco": {"title": "Cisco", "bullets": ["Business: Networking equipment (switches, routers), SiPh (ex-Luxtera/Acacia), software. Revenue ~$55B. Network switches connect AI GPU clusters. SiPh transceivers for data center interconnect", "AI relevance: High. Cisco switches and SiPh-based optics connect AI data center infrastructure. Acacia coherent optics serve hyperscaler demand. AI cluster networking is essential infrastructure", "Investment thesis:\n(1) AI data center networking demand growing.\n(2) SiPh technology (Luxtera/Acacia) positions for CPO.\n(3) Software-defined networking adds recurring revenue.", "Risks:\n(1) Broadcom switching (Tomahawk) and Arista competing for AI cluster share.\n(2) Massive company \u2014 AI is a fraction of total Cisco.\n(3) Networking market cyclicality."]}, "txn": {"title": "Texas Instruments", "bullets": ["Business: #1 analog company globally by revenue. Revenue ~$16B. 80,000+ products across analog and embedded. Owns 300mm analog fabs \u2014 low-cost manufacturing advantage. Broadest distribution in semiconductors", "AI relevance: Moderate. Analog components in every AI server (voltage regulators, data converters, signal conditioning). TI components are ubiquitous but not a specific AI bottleneck. AI server power delivery uses TI parts", "Investment thesis:\n(1) Massive scale \u2014 80K+ products, broadest analog portfolio.\n(2) Own fabs (300mm analog) provide manufacturing cost advantage.\n(3) Analog in everything including AI servers.\n(4) Capital return story \u2014 consistent buybacks and dividends.", "Risks:\n(1) Cyclical \u2014 inventory correction has been prolonged.\n(2) Not a pure AI play \u2014 broad industrial/auto/consumer exposure.\n(3) Pricing pressure in analog downturn."]}, "adi": {"title": "Analog Devices", "bullets": ["Business: Precision analog, data converters, signal processing, power management. Revenue ~$12B. #2 analog behind TI. M
