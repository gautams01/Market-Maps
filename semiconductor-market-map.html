", "Risks: (1) Patent licensing revenue declining (by design). (2) CXL adoption pace uncertain. (3) Competition from Montage Technology (China) in DIMM chipsets."]}, "koku": {"title": "Kokusai Electric", "bullets": ["Business: Batch processing equipment — vertical furnaces for CVD, ALD, thermal processing. Spun out of Hitachi Kokusai, IPO'd 2023. Competes with TEL in batch processing", "AI relevance: Batch furnaces used in DRAM, NAND, HBM manufacturing for oxidation and insulation layers. HBM and 3D NAND scaling drive more furnace steps", "Investment thesis: (1) IPO provides investor access to batch processing niche. (2) HBM and NAND scaling drive furnace step count. (3) Deep Japanese memory fab relationships.", "Risks: (1) Narrow product focus. (2) TEL competition in batch processing. (3) Memory cycle sensitivity."]}, "naur": {"title": "NAURA Technology", "bullets": ["Business: China's largest domestic semiconductor equipment maker — etch, deposition, cleaning, thermal. Benefits from China's self-sufficiency push. Won $380M order from CXMT. Formed $320M JV with Lam Research", "AI relevance: Indirect to Western AI. Enables China's domestic semiconductor build-out. Could become competitor to AMAT/Lam/TEL in mature-node equipment over time", "Investment thesis: (1) Protected domestic market due to Western export controls. (2) Government subsidies support growth. (3) Growing installed base in China.", "Risks: (1) Technology gap vs. Western leaders (1-2 generations). (2) Dependent on Chinese government policy. (3) If export controls ease, Western equipment becomes available again."]}, "cvv": {"title": "CVD Equipment Corp", "bullets": ["Business: Niche CVD systems for specialty semiconductor, industrial, and research applications. Very small company", "AI relevance: Minimal — too small to be material in AI chip manufacturing", "Investment thesis: (1) Niche specialty equipment.", "Risks: (1) Micro-cap with limited relevance to mainstream semiconductor."]}, "ebar": {"title": "Ebara Corporation", "bullets": ["Business: CMP equipment (wafer polishing/planarization) — #2 behind Applied Materials. Also industrial pumps and environmental equipment (diversified). CMP flattens surfaces between process layers", "AI relevance: CMP required after each deposition step. More layers at advanced AI nodes = more CMP. Essential for advanced packaging (hybrid bonding requires atomically flat surfaces)", "Investment thesis: (1) CMP is a growing market driven by back-end-of-line complexity. (2) Hybrid bonding surface prep is a new growth vector. (3) #2 position behind AMAT.", "Risks: (1) AMAT dominance in CMP. (2) Semiconductor is a smaller part of diversified Ebara. (3) Limited direct AI leverage."]}, "axcl": {"title": "Axcelis Technologies", "bullets": ["Business: Ion implantation systems — embeds dopant atoms into silicon to modify electrical properties. Strong in SiC power semiconductor implant.", "AI relevance: Indirect. Ion implant required for all chips but less of a bottleneck than lithography or etch. SiC implant serves EV/power markets. Data center power delivery growing", "Investment thesis: (1) Market leader in SiC ion implantation alongside AMAT. (2) SiC power for data center and EV are dual growth vectors. (3) Diversifying beyond SiC into logic/memory implant.", "Risks: (1) SiC/EV cycle has been weaker than expected. (2) AMAT is the dominant implant player overall. (3) Narrower portfolio than diversified competitors."]}, "cohu": {"title": "Cohu Inc.", "bullets": ["Business: Test handlers (move chips through ATE), test contactors/sockets, and lower-end ATE. More exposed to automotive/industrial than AI.", "AI relevance: Indirect — handlers needed for every chip tested. Benefits from overall volume growth but less leveraged to AI/HBM than Advantest/Teradyne", "Investment thesis: (1) Leading test handler position globally. (2) Consumable contactors provide recurring revenue. (3) Automotive/industrial semiconductor recovery is a cyclical upside.", "Risks: (1) Heavy auto cycle exposure. (2) Limited AI leverage vs. top-2 ATE players. (3) Lower margins and smaller scale."]}, "tpro": {"title": "Technoprobe", "bullets": ["Business: Probe cards for wafer testing — direct competitor to FormFactor. Italian-based. Strong in MEMS and vertical probe technologies. Opened 80M EUR Dresden facility for European fabs.", "AI relevance: Same dynamics as FormFactor — benefits from HBM and advanced-node probe complexity", "Investment thesis: (1) European manufacturing for growing EU fab ecosystem. (2) MEMS probe technology competitive with FormFactor. (3) Dresden facility positions for Intel Germany, TSMC potential EU fabs.", "Risks: (1) Smaller than FormFactor. (2) Asian competitors in probe cards. (3) Needs scale to compete on cost."]}, "mpic": {"title": "MPI Corporation", "bullets": ["Business: Probe stations and probe cards. Taiwan-based. Probe stations are platforms that bring probe cards into contact with wafers for testing. Partnership with ASE for chiplet-ready probe cards.", "AI relevance: Chiplet-ready probe cards directly relevant to AI chip architectures. Probe stations essential for R&D and production wafer test", "Investment thesis: (1) Chiplet probe card partnership with ASE targets AI packaging. (2) Probe stations serve all fabs. (3) Strong Taiwan market position.", "Risks: (1) Smaller scale globally. (2) Taiwan concentration."]}, "shkw": {"title": "Shinkawa Ltd.", "bullets": ["Business: Wire bonding and die bonding equipment — similar space to K&S but focused on Japanese domestic market", "AI relevance: Limited direct. Benefits from overall packaging volume growth", "Investment thesis: (1) Japanese domestic market position. (2) Automotive power packaging.", "Risks: (1) Small scale. (2) Wire bonding declining. (3) Limited international presence."]}, "hnmi": {"title": "Hanmi Semiconductor", "bullets": ["Business: Packaging equipment — trim/form, singulation, vision inspection. Korean domestic market leader.", "AI relevance: Benefits from Korean semiconductor industry growth (Samsung, SK Hynix HBM packaging)", "Investment thesis: (1) Korean semiconductor ecosystem exposure (Samsung, SK Hynix). (2) HBM packaging equipment demand. (3) Strong domestic market position.", "Risks: (1) Smaller scale. (2) Limited global reach. (3) Competition from Japanese equipment makers."]}, "towa": {"title": "Towa Corporation", "bullets": ["Business: Resin molding and encapsulation equipment — seals chips in protective resin after assembly. Compression molding for advanced packages. Also singulation/cutting systems", "AI relevance: Growing. Compression molding increasingly critical for large-format AI chip packages. As packages get bigger (chiplets, large SoCs), molding precision and uniformity matter more", "Investment thesis: (1) Advanced compression molding serves growing advanced package market. (2) Fan-out and SiP packaging drive demand. (3) Leading Japanese molding technology.", "Risks: (1) Niche market. (2) Competition from APIC Yamada. (3) Limited direct AI leverage vs. BESI/DISCO."]}, "azta": {"title": "Azenta (Brooks Automation)", "bullets": ["Business: Automated wafer handling and contamination control — robots transporting wafers between process chambers in fabs. Also cryogenics (being divested)", "AI relevance: Indirect — fab automation scales with wafer starts. More AI chip production = more handling", "Investment thesis: (1) New fab construction (CHIPS Act) drives equipment demand. (2) Advanced packaging automation is growing.", "Risks: (1) Cyclical with fab construction. (2) Commoditized vs. process-critical equipment."]}, "daif": {"title": "Daifuku", "bullets": ["Business: Automated material handling systems (AMHS) — overhead transport systems moving wafer lots through entire fabs. Revenue tied to new fab construction ($50-200M+ per fab). Also logistics automation. Semiconductor is ~40% of diversified Daifuku", "AI relevance: Every new fab needs AMHS. CHIPS Act fabs are direct demand drivers. Larger/more complex fabs for AI chips need more sophisticated AMHS", "Investment thesis: (1) Market leader in semiconductor AMHS. (2) CHIPS Act fab construction creates multi-year order pipeline. (3) High switching costs — AMHS designed into fab from the beginning.", "Risks: (1) Revenue is lumpy/project-based. (2) Cyclical with fab construction. (3) Semiconductor is ~40% of diversified company."]}, "jeol": {"title": "JEOL Ltd.", "bullets": ["Business: Electron microscopes (SEM, TEM), e-beam lithography for mask writing and R&D. Scientific instruments company", "AI relevance: Minimal for production. E-beam litho for mask writing, TEM/SEM for failure analysis", "Investment thesis: (1) Mask writing for advanced nodes. (2) R&D microscopy demand.", "Risks: (1) Very niche semiconductor exposure. (2) Scientific instruments market is modest growth."]}, "ndsn": {"title": "Nordson", "bullets": ["Business: Precision dispensing, fluid management, and test/inspection for electronics assembly. Semiconductor is one division alongside adhesive dispensing and medical", "AI relevance: Indirect — electronics assembly testing benefits from volume growth", "Investment thesis: (1) Advanced packaging dispensing is growing. (2) Diversified industrial company with semi exposure.", "Risks: (1) Semiconductor is a minority of total Nordson. (2) Not a pure-play."]}, "brkr": {"title": "Bruker", "bullets": ["Business: Scientific instruments — X-ray diffraction, AFM, surface analysis for semiconductor R&D and metrology", "AI relevance: R&D tools help develop advanced materials and processes but not a production inline tool", "Investment thesis: (1) Semiconductor R&D tool demand growing. (2) Advanced materials characterization.", "Risks: (1) Semiconductor is small part of diversified Bruker. (2) R&D budgets can be cut."]}, "atro": {"title": "Astronics Corporation", "bullets": ["Business: Test systems for semiconductor (lower-complexity) and aerospace lighting/power. Dual business", "AI relevance: Limited direct AI exposure", "Investment thesis: (1) Aerospace recovery. (2) Defense electronics test.", "Risks: (1) Semiconductor is secondary business. (2) Limited AI leverage."]}, "chrm": {"title": "Chroma ATE", "bullets": ["Business: ATE for power electronics, LED, battery, and EV testing. Strong in Taiwan/China. Power semiconductor testing is the AI-adjacent segment", "AI relevance: Indirect. Power testing for data center power supplies. Less tied to AI chip testing than Advantest/Teradyne", "Investment thesis: (1) EV battery and power semiconductor testing. (2) Data center power validation is growing.", "Risks: (1) Chinese economic cycle exposure. (2) Niche market."]}, "toks": {"title": "Tokyo Seimitsu (Accretech)", "bullets": ["Business: Semiconductor probers and wafer dicing/grinding (competes with DISCO). Also precision metrology. Dual business", "AI relevance: Wafer probing essential for every fab. Dicing competes with DISCO for backend processing", "Investment thesis: (1) Probing systems benefit from increased wafer starts. (2) Dicing is a #2 to DISCO's monopoly.", "Risks: (1) DISCO dominance in dicing. (2) Limited international reach."]}, "smin": {"title": "Smiths Interconnect", "bullets": ["Business: Test sockets, connectors, RF/microwave test solutions. Part of Smiths Group plc. Serves semiconductor and defense", "AI relevance: Test sockets needed for every packaged chip test. Higher I/O on AI processors drives more complex socket requirements", "Investment thesis: (1) High-speed test interfaces for AI chips. (2) 5G/mmWave test solutions.", "Risks: (1) Part of diversified conglomerate. (2) Limited pure-play exposure."]}, "jem": {"title": "JEM (Japan Electronic Materials)", "bullets": ["Business: Probe cards — strong in Japanese domestic market. Serves Japanese IDMs and fabs", "AI relevance: Indirect — benefits from test intensity increase but less directly than FormFactor", "Investment thesis: (1) Domestic Japanese fab expansion. (2) Memory test probe cards.", "Risks: (1) Limited international diversification. (2) Smaller scale vs. global leaders."]}, "ceva": {"title": "CEVA Inc.", "bullets": ["Business: Semiconductor IP — DSP cores, AI/ML processors (NeuPro), sensor hubs, wireless (BT/Wi-Fi) IP. IP licensing + royalties. Licensed to chip designers globally", "AI relevance: Moderate. NeuPro AI processor IP licensed to edge device designers for on-device AI inference. Growing demand for AI-capable IP blocks in IoT and mobile", "Investment thesis: (1) AI/ML processor IP addresses growing on-device AI market. (2) Royalty model provides recurring revenue as customer chips ship. (3) Wireless IP (BT/Wi-Fi) is a stable revenue base.", "Risks: (1) Small company. (2) Competition from Arm (which also licenses AI-capable cores). (3) Long IP licensing cycles."]}, "awe": {"title": "Alphawave Semi", "bullets": ["Business: High-speed connectivity IP (SerDes, PCIe, CXL, UCIe) and custom silicon for AI interconnect. UK-based, fabbed at TSMC. Multi-die chiplet interconnect solutions. Also appears in IP/cores and SerDes tiers", "AI relevance: High. SerDes IP and custom silicon for AI chip connectivity. UCIe chiplet interconnect essential for next-gen AI chip architectures. Custom silicon for hyperscaler AI chips", "Investment thesis: (1) Leading-edge SerDes IP at 3nm/2nm. (2) UCIe chiplet interconnect for next-gen AI architectures. (3) Custom silicon for hyperscalers adds higher-value revenue. (4) Multi-protocol support (PCIe 6.0, CXL 3.0, UCIe).", "Risks: (1) Small company — execution risk. (2) Competition from Synopsys/Cadence IP and Credo/Astera. (3) Custom silicon is capital-intensive."]}, "tsmc": {"title": "TSMC", "bullets": ["Business: World's leading foundry — ~60% global share, ~90% of sub-7nm production. Gross margin ~60%. Capex $40-42B for 2025. CoWoS advanced packaging capacity scaling from 35K wafers/month (late 2024) to projected 130K wafers/month by end 2026. NVIDIA secures >60% of CoWoS capacity. Also provides InFO, SoIC packaging. Arizona fab began 4nm production in March 2026 (20K wafers/month). N2 (2nm GAA) ramping 2025-2026, A16 (1.6nm backside power) in 2026-2027", "AI relevance: THE most critical single company in the AI supply chain. Every NVIDIA GPU, AMD MI accelerator, Broadcom custom ASIC, and Apple chip is made at TSMC. CoWoS packaging is the primary physical bottleneck for AI GPU production — demand still exceeds supply despite massive expansion. 'CoWoS capacity is very tight and remains sold out through 2025 and into 2026' — CEO C.C. Wei. First commercial CPO chips expected within 18-24 months from TSMC packaging", "Investment thesis: (1) 3-5 year technology lead over Samsung at leading edge — no customer can leave. (2) $30B+ annual capex creates barriers no competitor can match. (3) CoWoS capacity 3-4x expansion is the single biggest unlock for AI GPU supply. (4) Network effects — more customers = better yields = more customers. (5) N2/A16 extends technology leadership into next-gen AI chips. (6) Arizona fab provides US supply chain diversification. (7) ~$90B+ revenue at 60% gross margins — best financial profile in semiconductors.", "Risks: (1) Taiwan geopolitical risk — #1 investor concern. (2) Customer concentration (Apple + NVIDIA = ~40% of revenue). (3) Massive capex ($40B+/year) creates execution risk. (4) If AI capex slows, leading-edge utilization drops. (5) Samsung and Intel competing aggressively at leading edge. (6) Arizona fab is significantly more expensive than Taiwan operations."]}, "sam_f": {"title": "Samsung Foundry/Memory", "bullets": ["Business: Both foundry (#2 behind TSMC) and memory (DRAM, NAND, HBM). Only company manufacturing leading-edge logic AND memory. Total Samsung Electronics revenue ~$220B (semiconductor ~60%). Memory alone ~$70B+. In DRAM, Samsung and SK Hynix alternate as #1 by revenue. In HBM, Samsung holds an estimated ~17% share vs. SK Hynix's 57-62% — a significant gap. Samsung was later to qualify HBM3E with NVIDIA but has started shipping HBM4. Foundry business has struggled with yields at leading-edge nodes vs. TSMC", "AI relevance: Major HBM producer (share growing) supplying NVIDIA and hyperscalers, though lagging SK Hynix in HBM qualification timing. Samsung acknowledged that conventional DRAM profitability exceeded HBM in certain recent quarters — counterintuitive given HBM's 'strategic' label, but explained by wafer allocation economics: HBM uses 3-4x more wafer with 50-60% yield on 12-Hi stacks vs. 90%+ for DDR5, and when conventional DRAM ASPs surge 60%+ QoQ, the per-wafer revenue gap narrows or temporarily inverts. Samsung is pursuing PIM (Processing-in-Memory) via HBM-PIM to move from component supplier toward subsystem integration. Custom silicon programs at hyperscalers (Google TPU, Amazon Trainium, Microsoft Maia, Meta MTIA) could be both a threat (hyperscalers controlling their own memory mix) and an opportunity (Samsung foundry serving some of these custom chips)", "Investment thesis: (1) Only company that manufactures both leading-edge logic and memory — unique strategic position across the AI supply chain. (2) HBM share expected to rise as HBM3E/HBM4 qualifications broaden — catching up to SK Hynix. (3) Conventional DRAM repricing has been extraordinary and benefits Samsung's dominant DRAM position — conventional DRAM profitability exceeding HBM in certain quarters demonstrates Samsung's broad memory portfolio strength. (4) PIM (HBM-PIM) and custom HBM (cHBM) strategies position Samsung for the emerging multi-tier AI memory hierarchy. (5) Scale advantages in DRAM/NAND provide cost leadership and wafer allocation flexibility. (6) Conglomerate discount means semiconductor value is partially hidden.", "Risks: (1) Foundry yield issues vs. TSMC have lost market share — customers migrating to TSMC. (2) HBM lags SK Hynix by roughly a year in NVIDIA qualification — second/third-mover disadvantage in the most profitable memory segment. (3) Wafer allocation tension: when conventional DRAM spot prices surge, Samsung faces the same economic question as all memory vendors — 'is putting this wafer into HBM really the best business?' Multi-year HBM contracts can underperform surging DDR5 spot pricing on a per-wafer basis. (4) Captive ratio risk — if platform owners successfully disaggregate inference memory, HBM pricing power weakens industry-wide. (5) Conglomerate structure limits pure-play semiconductor investor access. (6) Memory is cyclical — the key question is not peak margin but how many quarters this margin can hold."]}, "int_f": {"title": "Intel Foundry", "bullets": ["Business: Intel's manufacturing division — fabricates Intel's own chips plus pursuing external foundry customers. Intel 18A (1.8nm-class) process in development. ~$100B+ announced fab investments backed by $8.5B CHIPS Act grants. Altera FPGA being spun off. Also has SiPh transceiver manufacturing capability", "AI relevance: Strategic importance for US semiconductor sovereignty. If 18A succeeds, it provides an alternative to TSMC for AI chip production. SiPh transceivers relevant for AI data center interconnects. Only advanced foundry on US soil until TSMC Arizona ramps fully", "Investment thesis: (1) Only advanced foundry on US soil — strategic importance for supply chain security. (2) CHIPS Act funding ($8.5B grants) reduces capital burden. (3) If 18A yields are competitive with TSMC N2, Intel regains manufacturing credibility. (4) Altera IPO unlocks hidden value. (5) SiPh manufacturing adds AI interconnect angle.", "Risks: (1) Enormous execution risk — must prove 18A yields are competitive. (2) Massive cash burn during foundry transition. (3) Has lost technology leadership to TSMC over past decade. (4) Cultural shift from IDM to customer-serving foundry is difficult. (5) Gaudi AI accelerator failed to gain traction. (6) Management credibility concerns after years of process delays."]}, "gf": {"title": "GlobalFoundries", "bullets": ["Business: Specialty foundry — RF, silicon photonics, automotive, IoT. Deliberately does NOT compete at leading edge (<7nm). Key SiPh foundry platform alongside Tower. Acquired AMF (Advanced Micro Foundry) for photonics. US-based (Malta, NY). Abu Dhabi (Mubadala) ownership provides patient capital", "AI relevance: Growing. SiPh platform is one of two key foundries for CPO photonics chips (alongside Tower). CPO transceivers fabricated at GF. Also supplies Marvell, NXP, Qualcomm for RF/connectivity. US manufacturing provides supply chain security premium", "Investment thesis: (1) SiPh foundry platform positions GF in AI interconnect supply chain. (2) US-based manufacturing — supply chain security advantage. (3) Specialty processes (RF, SiPh, automotive) that TSMC doesn't focus on. (4) AMF acquisition strengthens photonics capability. (5) Patient Mubadala ownership supports long-term investment.", "Risks: (1) Cannot compete at leading edge — missing from the highest-value AI chip manufacturing. (2) Specialty markets have been in inventory correction. (3) SiPh revenue is still small. (4) Tower Semi is the more established SiPh foundry. (5) Revenue growth has been modest."]}, "tower": {"title": "Tower Semiconductor", "bullets": ["Business: Specialty analog foundry and THE leading open-platform silicon photonics foundry. Committed $920M in SiPh capital spending, with 70%+ of capacity pre-sold before being built. 5x-ing photonics capacity from year-end 2025 to year-end 2026. Joint SiPh EDA flow with Cadence.Also serves analog, RF, power management customers", "AI relevance: CRITICAL. Tower is the #1 open-platform SiPh foundry. As CPO becomes essential for AI data center interconnects (NVIDIA Rubin/Feynman), the photonics chips are fabricated at Tower. SiPh process qualified by Broadcom, Cisco, Coherent, Credo, MACOM. Uses Soitec's Photonics-SOI wafers and Lightwave Logic's EO polymers. CPO foundry services announced 2025", "Investment thesis: (1) First-mover in open-platform SiPh foundry — deep process co-development with leading designers. (2) 70%+ of new SiPh capacity pre-sold — extraordinary customer commitment. (3) 5x capacity ramp in 2026 demonstrates conviction from both Tower and customers. (4) Diversified analog foundry provides revenue stability beyond SiPh. (5) Joint EDA flow with Cadence creates design ecosystem moat.", "Risks: (1) Stock has already run ~6x — P/E of ~105x prices in significant growth. (2) Massive SiPh capex ($920M) must deliver returns. (3) Concentrated SiPh customer base. (4) If CPO adoption timeline extends, capacity could be underutilized. (5) GF competing in SiPh. (6) Specialty foundry margins are lower than leading-edge."]}, "umc": {"title": "UMC", "bullets": ["Business: Specialty foundry — mature nodes (12nm-180nm) for automotive, IoT, consumer, RF. Taiwan-based. Profitable at mature nodes with lower capex than leading-edge. Licensed imec SiPh process for future CPO capability but not yet in production", "AI relevance: Indirect. Serves mature node markets, not leading-edge AI. SiPh license from imec is an interesting future optionality but unproven. Benefits from overall semiconductor demand growth", "Investment thesis: (1) Profitable mature-node foundry with stable customer base. (2) Lower capex requirements than leading-edge foundries. (3) SiPh license from imec provides future CPO optionality. (4) Mature nodes still in high demand for automotive/IoT.", "Risks: (1) Not participating in leading-edge AI chip manufacturing. (2) Chinese foundry competition at mature nodes (SMIC, Hua Hong). (3) Taiwan geopolitical risk. (4) Mature node pricing pressure."]}, "smic": {"title": "SMIC", "bullets": ["Business: China's largest foundry. Capable up to ~7nm-class without EUV. Benefits from Chinese government self-sufficiency push. Under US export restrictions limiting EUV access", "AI relevance: Limited for Western AI supply chain. Serves Chinese domestic market. Cannot access EUV lithography for leading-edge AI chips. Could be relevant for Chinese AI chip production (Huawei)", "Investment thesis: (1) Protected domestic market due to Western export controls. (2) Chinese government support and subsidies. (3) Growing domestic customer base.", "Risks: (1) Technology gap vs. TSMC (1-2 generations behind at leading edge). (2) Cannot access EUV — limits advancement. (3) Geopolitical risk — further sanctions possible. (4) If export controls ease, TSMC/Samsung capture Chinese demand."]}, "sk": {"title": "SK Hynix", "bullets": ["Business: #1 HBM supplier globally with an estimated 57-62% market share. Also #2 in DRAM overall and a major NAND producer. Korean-listed (660 KS). Operating margins have reached record levels driven by HBM and a sharp conventional DRAM repricing cycle. First to qualify HBM3E with NVIDIA for Blackwell GPUs. Customers are signing 3-to-5-year strategic capacity agreements (SCAs) — a structural shift from the traditional quarter-by-quarter spot pricing that historically defined DRAM. Parent company SK Group also connects to SK Telecom (sovereign AI) and Penguin Solutions (AI memory infrastructure)", "AI relevance: ESSENTIAL. HBM sits at the center of the AI GPU bill of materials — external estimates put HBM at roughly 47% of a single GPU's component cost, and HBM plus advanced packaging at 66-70% of the GPU BOM. Training workloads are locked to HBM (cannot leave without extending training time across entire GPU clusters). Hot inference decode is still strongly tied to HBM. The 'captive ratio' — the share of total AI memory demand that must remain inside HBM — is currently very high, supporting vendor pricing power. However, NVIDIA's Vera Rubin platform is introducing tools to disaggregate inference memory (SOCAMM for warm KV cache, Groq 3 LPX SRAM-based decode accelerator, BlueField-4 CMX for cold context), which could gradually lower the captive ratio over time. SK Hynix is responding with three counterstrategies: (1) custom HBM (cHBM) with customer-specific base dies that create lock-in and prevent second-sourcing, (2) HBF (High-Bandwidth Flash) standardization collaboration with SanDisk to capture the warm/cold memory tier that platform owners are building, and (3) PIM (Processing-in-Memory) via AiM to move from component supplier toward subsystem integration", "Investment thesis: (1) 57-62% HBM share with first-mover NVIDIA qualification — dominant position in the captive zone of AI memory. (2) Multi-year SCAs (3-5 years) transform DRAM from a spot-pricing commodity into a contracted infrastructure product — structurally different from past memory cycles. (3) Conventional DRAM repricing has been extraordinary (ASPs rising 60%+ QoQ) — conventional DRAM profitability has at times exceeded HBM in the short term, lifting overall margins. (4) cHBM strategy creates customer-specific lock-in, preventing second-sourcing and protecting pricing power. (5) HBF and PIM strategies position SK Hynix to capture revenue across the emerging multi-tier AI memory hierarchy, not just HBM. (6) HBM4 generation transition drives higher per-stack ASPs (estimated 60-70% higher sticker price vs. HBM3E). (7) Wafer allocation economics favor SK Hynix — yield leadership means HBM is more profitable per wafer for SK Hynix than competitors with lower yields.", "Risks: (1) The captive ratio is the key variable — if NVIDIA and hyperscaler bypass tools (SOCAMM, Groq 3 LPX, HBF, custom silicon memory mix) pass production SLO verification in 2026-2027, HBM pricing power could weaken even as volume grows. (2) Wafer allocation economics create a tension: when conventional DRAM spot prices surge, the opportunity cost of allocating wafers to multi-year-contract HBM rises — Samsung has acknowledged conventional DRAM profitability exceeded HBM in certain quarters. (3) HBM consumes 3-4x more wafer capacity than conventional DRAM with 50-60% yield on 12-Hi stacks vs. 90%+ for DDR5 — supply growth requires disproportionate wafer allocation. (4) Hyperscalers are designing custom silicon (Google TPU, Amazon Trainium, Microsoft Maia, Meta MTIA) that gives them authority over the memory mix, reducing dependence on NVIDIA's prescribed HBM allocation. (5) Memory share of hyperscaler capex has risen from ~8% to an estimated ~30% — at this level, memory is no longer a line item but a budget category that invites cost optimization. (6) Past memory cycles ended when supply gluts broke pricing — this cycle's duration depends on how long the captive ratio stays high, not on peak margins."]}, "mu": {"title": "Micron Technology", "bullets": ["Business: #3 memory company — DRAM, NAND, HBM. Only US-based memory manufacturer. HBM revenue on a multi-billion-dollar annual run rate and growing rapidly. First memory company to disclose entering a 5-year strategic capacity agreement (SCA), along with separate 3-to-5-year supply agreements with certain customers. HBM3E qualified for NVIDIA Blackwell and AMD MI350. Building HBM manufacturing in the US (Idaho, New York) with CHIPS Act support. Also a leading NAND producer for enterprise SSDs", "AI relevance: High. HBM3E supplier for NVIDIA and AMD AI accelerators. US-based HBM production is strategically important for supply chain diversification away from Korea. Micron's position in the AI memory hierarchy spans HBM (captive zone for training and hot inference), server DDR5 (expanding rapidly as AI servers consume far more DRAM per rack than traditional servers), and enterprise SSDs (cold storage tier for AI training data and model checkpoints). The same wafer allocation economics that govern SK Hynix apply to Micron: HBM consumes 3-4x more wafer with lower yield, so Micron must maintain an HBM ASP premium of roughly 4.5-7.6x over conventional DRAM to justify allocation. The 5-year SCA structure gives Micron unprecedented demand visibility but also locks in pricing that may underperform if conventional DRAM spot prices surge", "Investment thesis: (1) Only US-based memory manufacturer — strategic supply chain importance amplified by geopolitical tensions and CHIPS Act investment. (2) HBM share rising (estimated ~21% and growing) with NVIDIA and AMD qualification — closing the gap with SK Hynix. (3) First 5-year SCA in the industry — unprecedented demand visibility and revenue predictability for a memory company. (4) Conventional DRAM repricing benefits Micron across the portfolio, not just HBM — server DDR5 demand driven by AI racks consuming significantly more memory. (5) Enterprise SSD demand growing with AI data volumes — positioned across all tiers of the AI memory hierarchy. (6) US manufacturing expansion provides geopolitical diversification premium.", "Risks: (1) Trailing SK Hynix in HBM market share and NVIDIA qualification timing — second-mover disadvantage. (2) HBM yield disadvantage vs. SK Hynix directly impacts wafer allocation profitability — lower yield means Micron needs a higher ASP premium to justify HBM production over conventional DRAM. (3) Multi-year contracts lock in pricing — if conventional DRAM spot surges, the opportunity cost of HBM wafer allocation rises. (4) The captive ratio framework applies equally: if platform owners successfully disaggregate inference memory away from HBM, Micron's HBM pricing power weakens. (5) Memory is historically cyclical — whether this cycle's duration extends depends on whether the captive ratio stays high, not on peak margins. (6) CHIPS Act fab construction carries execution and cost overrun risk."]}, "nny": {"title": "Nanya Technology", "bullets": ["Business: #4 DRAM maker globally. Taiwan-based. Focused on specialty DRAM (consumer, networking, niche). Does NOT produce HBM", "AI relevance: Limited. Does not produce HBM. Focused on commodity/specialty DRAM segments. Benefits from general DRAM pricing improvement as HBM production diverts industry capacity", "Investment thesis: (1) Benefits from DRAM pricing uplift as HBM production tightens standard DRAM supply. (2) Specialty DRAM niches are less competitive.", "Risks: (1) No HBM — missing the highest-growth memory segment. (2) Smaller scale vs. Samsung/SK Hynix/Micron. (3) Taiwan geopolitical risk."]}, "kxia": {"title": "Kioxia", "bullets": ["Business: #2 NAND flash producer globally (JV with Western Digital). IPO'd on Tokyo Stock Exchange late 2024. NAND for SSDs, smartphones, data centers.", "AI relevance: Moderate but growing. AI training requires massive storage for training data. Enterprise SSDs for AI servers growing rapidly. NAND is less directly AI-critical than HBM but storage is an expanding part of AI infrastructure", "Investment thesis: (1) #2 NAND with technology leadership in 3D NAND scaling. (2) Enterprise SSD demand growing with AI data storage needs. (3) IPO provides public market access to pure-play NAND leader.", "Risks: (1) NAND pricing is cyclical and historically volatile. (2) Competition from Samsung, SK Hynix, WDC, Micron. (3) Less directly tied to AI than HBM/DRAM. (4) Post-IPO maturation."]}, "wdc": {"title": "Western Digital", "bullets": ["Business: HDDs and NAND flash SSDs. Split into HDD and Flash companies in 2024. Enterprise storage for data centers is the primary growth driver", "AI relevance: Growing. Enterprise SSDs for AI data storage. HDDs for massive AI training data sets. AI data volumes growing exponentially — both hot (SSD) and cold (HDD) storage demand increasing", "Investment thesis: (1) Enterprise SSD demand for AI data centers driving revenue growth. (2) HDD still essential for bulk AI training data storage. (3) Company split unlocks pure-play value for each segment.", "Risks: (1) NAND pricing cyclicality. (2) HDD is a declining market long-term. (3) Competition from Samsung, Kioxia, Micron in NAND. (4) Less directly AI-critical than compute or memory."]}, "winb": {"title": "Winbond Electronics", "bullets": ["Business: NOR flash and specialty DRAM. Taiwan-based. NOR flash for firmware/boot in IoT, automotive, consumer devices", "AI relevance: Limited. NOR flash serves firmware storage — not a primary AI growth vector", "Investment thesis: (1) NOR flash demand from IoT and automotive. (2) Specialty DRAM for niche applications.", "Risks: (1) Niche market. (2) Competition from Macronix, GigaDevice. (3) Not an AI play."]}, "mxic": {"title": "Macronix International", "bullets": ["Business: NOR flash memory. Taiwan-based.", "AI relevance: Limited direct AI exposure. NOR flash serves firmware/boot applications. The massive stock move may reflect speculative momentum or specific product wins rather than AI fundamentals", "(2) NOR flash demand from automotive and IoT growing.", "(2) NOR is a niche, mature market. (3) Limited AI relevance."]}, "giga": {"title": "GigaDevice", "bullets": ["Business: Chinese NOR flash and MCU manufacturer. Benefits from China domestic semiconductor push", "AI relevance: Limited. NOR flash and MCUs for Chinese domestic market", "Investment thesis: (1) Protected Chinese domestic market. (2) MCU growth in Chinese automotive/IoT.", "Risks: (1) Geopolitical risk. (2) Limited international relevance. (3) Competition from Winbond, Macronix."]}, "evrsp": {"title": "Everspin Technologies", "bullets": ["Business: MRAM (magnetoresistive RAM) — non-volatile memory with SRAM-like speed. Niche memory technology for applications requiring fast non-volatile storage", "AI relevance: Niche. MRAM used in some AI inference applications requiring fast, persistent storage. Potential for edge AI applications", "Investment thesis: (1) MRAM is a unique memory technology with specific performance advantages. (2) Edge AI applications could drive demand.", "Risks: (1) Very small company. (2) Niche market with limited TAM. (3) Competition from other emerging memory technologies."]}, "phis": {"title": "Phison Electronics", "bullets": ["Business: NAND flash controller design — makes the controller chips that manage flash storage in SSDs. Taiwan-based. Partners with NAND suppliers to deliver complete SSD solutions", "AI relevance: Moderate. SSD controllers in AI server storage. As AI training data sets grow, enterprise SSD demand increases, driving controller demand", "Investment thesis: (1) SSD controller demand grows with enterprise SSD deployment. (2) AI data storage expansion drives volume. (3) Taiwan market leader in flash controllers.", "Risks: (1) Competition from Silicon Motion. (2) Dependent on NAND suppliers for partnership models. (3) Controller is lower-value component vs. NAND itself."]}, "simo": {"title": "Silicon Motion", "bullets": ["Business: NAND flash controllers for SSDs and eMMC. US-listed, Taiwan-based. Competes with Phison in flash controller market", "AI relevance: Same as Phison — SSD controllers for AI data storage. Enterprise SSD demand growing", "Investment thesis: (1) Enterprise SSD controller demand from AI. (2) Growing share in enterprise segment.", "Risks: (1) Competition from Phison. (2) Controller market is competitive. (3) Dependent on NAND ecosystem."]}, "ase": {"title": "ASE Technology", "bullets": ["Business: World's #1 OSAT. Two businesses: ATM (packaging + test, 60% of revenue, 23.5% gross margin rising to 26.0% in Q1 2026) and EMS (electronics manufacturing services, 40%, 9.1% gross margin). Consolidated gross margin of 17.7% understates the actual OSAT business quality. LEAP (advanced packaging) revenue surged 6.4x in 3 years — $250M (2023) to $1.6B (2025), guided to $3.2B+ in 2026. Test revenue grew +32% in FY2025 (nearly 2x packaging growth of +17%). Of $3.4B capex in 2025, $1.14B (33%) went to test. 2026 capex raised to $8.5B with wafer test expansion as priority. Co-leads Silicon Photonics Industry Alliance with TSMC. Investing $200M in CoWoP (panel-level packaging). Management targets ATM gross margin of 24-30%", "AI relevance: Direct TSMC CoWoS overflow beneficiary — estimated ~40K wafers/month of CoWoS-related volume flowing to OSATs (480K annually). Hyperscalers (NVIDIA, Google, Amazon) are voluntarily diversifying away from 100% TSMC dependence, creating structural demand separate from overflow. AI chip SLT (system-level test) demand growing structurally with chiplet complexity. CPO optical packaging capability in early production 2026. The nature of work ASE receives is changing — from commodity oS assembly to higher-value CoWoS-related processes, RDL, and AI chip SLT", "Investment thesis: (1) LEAP mix expansion (6% → 13% → 20%+) drives margin improvement within ATM. (2) Test share within ATM rising (15.8% → 16.7% → 18.5%) — test has nonlinear operating leverage vs. linear packaging margins. (3) CPO optionality — co-leads SiPh Industry Alliance with TSMC, $200M CoWoP investment, early production 2026. (4) CoWoS overflow tailwind valid through 2027-2028 (new lines take 18-24 months). (5) ATM gross margin at 26.0% vs. target of 24-30% — still room to upper bound as LEAP and test mix increases. (6) EMS dilutes today, but if ATM grows +20% while EMS flatlines, consolidated margins improve structurally over time.", "Risks: (1) Trailing P/E 45-53x — 4x its 5-year average of 12x. Premium valuation. (2) CoWoS overflow pricing power could weaken after 2028 as TSMC capacity expands. (3) EMS at 40% of revenue with 9.1% gross margin structurally dilutes consolidated profitability. (4) TSMC Foundry 2.0 strategy could eventually internalize more backend. (5) Competition from Amkor and JCET in advanced packaging."]}, "amk": {"title": "Amkor Technology", "bullets": ["Business: OSAT #2. US-headquartered with Asian manufacturing. Q1 2026 gross margin 14.2%, negative FCF — early in heavy capex cycle. Arizona fab (operational 2028) with up to $400M CHIPS Act grants. Secured primary partner position in TSMC CoWoS-S networking outsourcing. Announced partnership with Lightmatter on 3D photonics packaging for CPO", "AI relevance: TSMC CoWoS-S networking outsourcing partner — directly benefits from overflow. Arizona fab positions Amkor as the only large-scale US-based OSAT, critical for reshoring AI chip packaging near TSMC's Arizona fab. CPO partnership with Lightmatter signals optical packaging capability buildout. Hyperscaler supply chain diversification drives structural demand beyond overflow", "Investment thesis: (1) Only large-scale US-based OSAT — reshoring play alongside TSMC Arizona. (2) CHIPS Act grants (up to $400M) reduce capex burden. (3) TSMC CoWoS-S networking outsourcing partner — direct AI packaging exposure. (4) Lightmatter CPO partnership positions for optical packaging 2028+. (5) P/E went from 17.6x (end 2024) to ~39x — re-rating underway but not as extreme as ASE.", "Risks: (1) Arizona fab may dilute operating margin 1-2pts starting 2027 before converting to margin driver at full scale 2028+. (2) Currently negative FCF in heavy capex cycle. (3) Q1 2026 gross margin only 14.2% — lower than ASE ATM. (4) TSMC could pull back outsourcing as its own capacity expands. (5) Competition from ASE which has broader capabilities."]}, "jcet": {"title": "JCET Group", "bullets": ["Business: OSAT #3. China's largest OSAT. A-share listed (600584.SS). Capabilities in advanced packaging (flip-chip, fan-out, 2.5D), conventional packaging, and test. One of only three OSATs (with ASE and Amkor) that span advanced packaging, test, AND emerging optical packaging. Benefits from Chinese semiconductor self-sufficiency push", "AI relevance: Advanced packaging capabilities position JCET for CoWoS-related overflow and Chinese domestic AI chip packaging. Emerging optical packaging capability (one of only 3 OSATs investing in CPO). Benefits from both global TSMC overflow and Chinese domestic AI semiconductor demand", "Investment thesis: (1) One of only 3 OSATs with breadth across advanced packaging, test, and optical. (2) Chinese domestic AI semiconductor demand provides protected market. (3) Advanced packaging capabilities growing. (4) Benefits from global CoWoS overflow.", "Risks: (1) A-share listed — limited access for international investors. (2) Geopolitical risk — Chinese operations may face restrictions. (3) Less advanced than ASE/Amkor at the leading edge. (4) Customer base more China-centric."]}, "pwt": {"title": "Powertech Technology", "bullets": ["Business: Memory packaging specialist OSAT. Taiwan-based (6239.TW). Key DRAM/NAND packaging provider. Closer to cycle-sensitive play than structural AI play", "AI relevance: Moderate. Packages DRAM/NAND that goes into servers. Benefits from overall memory volume growth as AI drives DRAM/NAND demand. But not directly packaging HBM or performing advanced AI chip test", "Investment thesis: (1) Memory packaging volume grows with DRAM/NAND production expansion. (2) Benefits from AI-driven memory demand uplift.", "Risks: (1) Cycle-sensitive — closer to commodity OSAT. (2) IDM outsourcing policy risk. (3) Not participating in highest-value advanced packaging or test."]}, "tfme": {"title": "TongFu Microelectronics", "bullets": ["Business: Chinese OSAT (002156.SZ). Advanced packaging capabilities. A-share listed. Benefits from Chinese AI semiconductor demand. Emerging memory packaging exposure", "AI relevance: Chinese domestic AI chip packaging demand. Advanced packaging for Chinese fabless chip designers. One of the Chinese OSATs with growth potential from domestic AI buildout", "Investment thesis: (1) Chinese domestic AI semiconductor packaging demand. (2) Advanced packaging capability growing. (3) Attractive growth rates for A-share investors.", "Risks: (1) A-share listed — limited international access. (2) Geopolitical risk. (3) Less advanced than ASE/Amkor."]}, "htia": {"title": "Huatian Technology", "bullets": ["Business: Chinese OSAT (002185.SZ). A-share listed. Advanced packaging focus — one of China's OSATs positioned for domestic AI chip packaging", "AI relevance: Chinese domestic AI packaging demand. Similar positioning to TongFu within the Chinese semiconductor ecosystem", "Investment thesis: (1) Chinese domestic semiconductor growth. (2) Advanced packaging expansion.", "Risks: (1) A-share only — limited international access. (2) Geopolitical risk. (3) Less advanced than global leaders."]}, "kyec": {"title": "KYEC (King Yuan Electronics)", "bullets": ["Business: Test-specialized OSAT with ~97% of revenue from test services — the purest test play among all OSATs. FY2025 EBITDA margin 47.3%, Q4 2025 hit 50.2%. Revenue grew in FY2025, February 2026 monthly revenue accelerated to. Known as core partner holding very high share of NVIDIA AI GPU final test, SLT, and burn-in. Partnership dates back 20+ years to when NVIDIA was a small PC GPU company. Possesses rare dual capability to test both memory and logic simultaneously — critical for NVIDIA chips with embedded memory. ASE and SPIL were relatively weaker in memory testing, which is how KYEC captured NVIDIA volume", "AI relevance: THE test pure-play for AI GPUs. When NVIDIA GPU shipments grow, KYEC revenue grows directly. Test has nonlinear operating leverage — once ATE is installed, profits accrue with no incremental cost as utilization climbs. As chiplet architectures become standard, test points multiply exponentially. SLT (system-level test) demand growing structurally. This is not a cycle — unless trajectory toward more complex chips reverses, test demand rises structurally", "Investment thesis: (1) 47-50% EBITDA margin demonstrates the nonlinear profit profile of test vs. packaging's linear margins. (2) ~97% test revenue — purest operating leverage play in OSAT. (3) 20+ year NVIDIA partnership with dual memory+logic test capability creates deep moat. (4) Chiplet architectures multiply test points exponentially — structural demand growth, not cyclical. (5) SLT will inevitably emerge as a bottleneck as AI ASIC production scales. (6) The market's OSAT re-rating has been packaging-driven — the test leverage narrative has not yet become mainstream. If market assigns separate premium to test pure-plays, the multiple moves to a different level.", "Risks: (1) Customer concentration — NVIDIA is the dominant customer. If NVIDIA internalizes testing or diversifies, KYEC takes direct hit. (2) Geographic concentration in Taiwan (Hsinchu and Miaoli). (3) Stock already up 236% — not cheap. (4) Given 20+ year partnership and dual test capability, near-term replacement unlikely, but long-term single-customer risk is real."]}, "imos": {"title": "ChipMOS Technologies", "bullets": ["Business: Memory OSAT with meaningful test exposure. NASDAQ-listed (IMOS). Memory revenue share climbed from 38.8% (Q1 2025) to 49.9% (Q4 2025). Q4 memory revenue +55.3% YoY. Management has customer demand visibility through all of 2026. PE ~36x with +30% revenue growth = PEG of ~1.2. Diversified customer base with no single-customer dependency", "AI relevance: AI datacenter DRAM/NAND demand is the driver behind memory revenue surge. As HBM production concentrates resources at IDMs, conventional DRAM/NAND packaging overflows to OSATs like ChipMOS — a two-way beneficiary structure. Test exposure within the memory OSAT mix provides higher-margin revenue", "Investment thesis: (1) Memory OSAT + test exposure — benefits from AI DRAM/NAND demand overflow. (2) PEG of ~1.2 at 30% revenue growth — reasonable valuation. (3) Rising memory revenue mix (39% → 50%) reflects AI demand shift. (4) Diversified customer base — no single-customer concentration risk. (5) NASDAQ-listed — accessible to international investors unlike many Asian OSATs.", "Risks: (1) Less direct AI GPU exposure than KYEC. (2) Memory OSAT outsourcing depends on IDM policy — Samsung/SK Hynix could pull back (as in 2023 precedent). (3) Display driver IC business is declining. (4) Smaller scale than ASE/Amkor."]}, "chpb": {"title": "Chipbond Technology", "bullets": ["Business: LCD/OLED driver IC packaging and testing. Taiwan-based (6147.TW). Niche display driver packaging", "AI relevance: Minimal. Pure display driver packaging — not connected to AI chip backend", "Investment thesis: (1) Display driver packaging niche.", "Risks: (1) No AI relevance. (2) Display market cyclicality."]}, "unim": {"title": "Unimicron", "bullets": ["Business: #1 IC substrate (ABF) manufacturer globally with ~22% share. Also HDI PCBs. Taiwan-based. Supplies substrates for the highest-end processors. Every NVIDIA GPU package sits on an ABF substrate. Revenue driven by substrate complexity and AI GPU demand", "AI relevance: Critical. Every NVIDIA GPU, AMD CPU, Broadcom ASIC sits on an Unimicron (or competitor) ABF substrate. As AI chips get larger (more I/O, more power), substrates become more complex (more ABF layers, finer pitch). Substrate content per AI GPU is significantly higher than consumer chips", "Investment thesis: (1) #1 ABF substrate maker — key NVIDIA supplier. (2) AI GPU substrate complexity driving higher content per chip. (3) Capacity takes 2-3 years to build — supply constraints create pricing power during demand surges. (4) Chiplet architectures need more sophisticated substrates.", "Risks: (1) Ajinomoto ABF film sole-source dependency. (2) Taiwan geopolitical risk. (3) Cyclical with chip demand. (4) Competition from Ibiden and Shinko. (5) Capital-intensive capacity expansion."]}, "ibid": {"title": "Ibiden", "bullets": ["Business: #2 IC substrate (ABF) manufacturer globally with ~19% share. Japanese company. Key Intel and NVIDIA substrate supplier. Also makes automotive exhaust ceramics (diversified). Revenue growth driven by semiconductor substrates", "AI relevance: Same dynamics as Unimicron — critical substrate supplier for AI processors. Intel CPU substrates and growing NVIDIA GPU substrates drive AI leverage", "Investment thesis: (1) #2 ABF substrate maker — deep Intel relationship + growing NVIDIA. (2) Japanese manufacturing quality. (3) Diversified revenue (automotive ceramics) provides stability. (4) Growing GPU substrate wins expanding AI exposure.", "Risks: (1) ABF film sole-source dependency on Ajinomoto. (2) Intel market share loss reduces one key customer. (3) Competition from Unimicron. (4) Capital-intensive."]}, "shko": {"title": "Shinko Electric Industries", "bullets": ["Business: ABF IC substrate maker. Fujitsu subsidiary. Key Intel and NVIDIA substrate supplier. Strong in flip-chip BGA substrates for server processors", "AI relevance: High. Supplies substrates under Intel Xeon and growing NVIDIA GPU business. Critical link between Ajinomoto ABF film and finished AI chip packages", "Investment thesis: (1) Key Intel substrate supplier with growing NVIDIA exposure. (2) Fujitsu backing provides stability. (3) Japanese quality in high-reliability substrates.", "Risks: (1) Ajinomoto ABF sole-source dependency. (2) Intel customer concentration. (3) Competition from Unimicron and Ibiden."]}, "kins": {"title": "Kinsus Interconnect", "bullets": ["Business: ABF IC substrates — specialist in GPU and HPC substrates. Taiwan-based. Strong position in high-end compute substrates", "AI relevance: High. Supplies substrates for NVIDIA GPUs and AMD processors. AI chip substrate content significantly higher than consumer chips", "Investment thesis: (1) GPU/HPC substrate specialist — directly leveraged to AI chip demand. (2) Fine-pitch substrate expertise for high-performance computing.", "Risks: (1) Ajinomoto ABF dependency. (2) Taiwan geopolitical risk. (3) Competition from larger substrate makers."]}, "nypc": {"title": "Nan Ya PCB", "bullets": ["Business: ABF IC substrates and HDI PCBs. Part of Formosa Plastics Group. Taiwan-based", "AI relevance: Moderate. Substrates for Intel CPUs and growing GPU substrate business", "Investment thesis: (1) Formosa Plastics backing provides capital. (2) Growing AI GPU substrate business.", "Risks: (1) Smaller than Unimicron/Ibiden. (2) Ajinomoto ABF dependency."]}, "ats": {"title": "AT&S", "bullets": ["Business: ABF IC substrates — European leader (~16% share). Austrian company. Key Intel substrate supplier. Building capacity in Kulim (Malaysia) and Leoben (Austria)", "AI relevance: Substrates for Intel server CPUs and growing AI GPU business. European manufacturing provides geographic diversification", "Investment thesis: (1) Only European ABF substrate maker — supply chain diversification premium. (2) Capacity expansion in Malaysia reduces cost. (3) Intel + growing AI exposure.", "Risks: (1) Smaller than Asian competitors. (2) Intel dependency. (3) European cost base for legacy operations."]}, "seme": {"title": "Samsung Electro-Mechanics", "bullets": ["Business: IC substrates, MLCC capacitors, camera modules. Part of Samsung Group. Substrates serve Samsung's own chips and external customers", "AI relevance: IC substrates for Samsung products. MLCCs used in every AI server (hundreds per board)", "Investment thesis: (1) Captive Samsung substrate demand. (2) MLCC content per AI server is high.", "Risks: (1) Samsung Group internal dynamics. (2) Competition from larger substrate makers."]}, "ddk": {"title": "Daeduck Electronics", "bullets": ["Business: Korean IC substrate and PCB manufacturer. Serves Korean semiconductor ecosystem", "AI relevance: Substrates for Korean semiconductor companies (Samsung, SK Hynix). Benefits from Korean AI semiconductor investment", "Investment thesis: (1) Korean semiconductor ecosystem exposure. (2) 143% combined return suggests market recognizing positioning. (3) Benefits from Samsung/SK Hynix capacity expansion.", "Risks: (1) Smaller scale. (2) Korean market concentration."]}, "xfab": {"title": "X-FAB Silicon Foundries", "bullets": ["Business: European specialty foundry — SiC, GaN, SOI, MEMS, photonics, analog at 180nm-110nm. Belgian-based (XFAB FP). Six fabs in Germany (3), France, Malaysia, and US (Lubbock, TX). ~4,300 employees. First pure-play foundry to offer both SiC and GaN-on-Si foundry services. SiC processed at 6-inch Lubbock fab, GaN-on-Si launched at 8-inch Dresden fab. Confirmed foundry partner for Navitas (GaN ICs) and Power Integrations (power ICs). Photonics platform in development with LIGENTEC collaboration — product revenue expected 2027-2028. Targeting $1.5B revenue and 35% EBITDA margins by 2030", "AI relevance: Growing on three fronts. (1) SiC foundry services for power MOSFETs used in 800V HVDC data center architectures — the same power transition Infineon and Navitas are riding. (2) GaN-on-Si foundry services — X-FAB is the first pure-play foundry with both SiC and GaN, serving fabless power companies targeting AI data center power conversion. (3) Photonics platform in development with LIGENTEC — silicon photonics foundry capability could serve CPO component demand. Also provides timing clock technologies for data centers", "Investment thesis: (1) First pure-play foundry offering both SiC AND GaN — unique foundry partner for fabless wide-bandgap companies like Navitas and Power Integrations. (2) Wide-bandgap revenue inflecting sharply — SiC wafer shipments nearly tripling as 800V data center architectures scale. (3) Photonics foundry capability in development — potential CPO component manufacturing. (4) a significant discount to specialty foundry peers on revenue and book value. (5) EU CHIPS Act beneficiary with European manufacturing footprint. (6) Targeting $1.5B revenue and 35% margins by 2030 — significant upside if WBG and photonics scale.", "Risks: (1) Automotive weakness — auto is ~94% of core revenue, and the segment has been declining. (2) Book-to-bill has been below 1.0 — limited near-term visibility. (3) Photonics revenue is pre-production — years from meaningful contribution. (4) Competition from GlobalFoundries, Tower Semi in specialty foundry. (5) Profitability is thin — net income margins in low single digits. (6) Data center SiC/GaN is a small and early portion of revenue."]}, "skyt": {"title": "SkyWater Technology", "bullets": ["Business: US-based specialty foundry — CHIPS Act beneficiary. Defense-grade and research fabs in Minnesota and Florida.", "AI relevance: Strategic US foundry for defense and research. Potential for specialized AI chip prototyping. Trusted foundry designation gives access to government AI programs", "Investment thesis: (1) Only US-based trusted foundry — defense and government AI programs. (2) CHIPS Act beneficiary. (3) Research/prototyping services for AI startups.", "Risks: (1) Small revenue base. (2) Mature nodes — not leading-edge AI chip manufacturing. (3) Government contract timing can be lumpy."]}, "vang": {"title": "Vanguard International Semiconductor", "bullets": ["Business: TSMC subsidiary — specialty foundry for 150mm/200mm wafers. Power, analog, MEMS", "AI relevance: Limited. Mature-node foundry for non-AI applications", "Investment thesis: (1) TSMC subsidiary with stable business. (2) Power/analog demand for automotive.", "Risks: (1) Mature nodes only. (2) Limited growth vs. leading-edge."]}, "hhng": {"title": "Hua Hong Semiconductor", "bullets": ["Business: Chinese specialty foundry — power discrete, NOR flash, logic at 55nm-350nm", "AI relevance: Limited. Chinese domestic market, mature nodes", "Investment thesis: (1) Chinese domestic semiconductor growth.", "Risks: (1) Mature nodes. (2) Geopolitical risk."]}, "dbhi": {"title": "DB HiTek", "bullets": ["Business: Korean specialty foundry — display drivers, power management, analog ICs", "AI relevance: Limited. Mature-node foundry for non-AI applications", "Investment thesis: (1) Korean semiconductor ecosystem.", "Risks: (1) Mature nodes. (2) Display market exposure."]}, "psmc": {"title": "PSMC (Powerchip)", "bullets": ["Business: Taiwan-based specialty foundry and DRAM. Makes commodity DRAM and provides foundry services at mature nodes", "AI relevance: Limited. Commodity DRAM and mature-node foundry", "Investment thesis: (1) Commodity DRAM benefits from overall pricing uplift.", "Risks: (1) Small scale. (2) Not participating in HBM or advanced nodes."]}, "wins": {"title": "WIN Semiconductors", "bullets": ["Business: World's largest pure-play III-V foundry — GaAs/GaN devices on 6-inch wafers. Taiwan-based. Revenue growing strongly on 5G and photonics", "AI relevance: III-V component manufacturing for 5G infrastructure and emerging photonics. As SiPh drives demand for III-V laser integration, WIN's foundry becomes more relevant for CPO", "Investment thesis: (1) Largest III-V foundry — capacity that takes years to replicate.(3) Deep GaAs/GaN process expertise creates switching costs. (4) 5G mmWave and photonics are dual growth vectors.", "Risks: (1) Concentrated in III-V niche — small TAM. (2) Taiwan geopolitical risk. (3) Competition from IDMs with in-house fabs."]}, "cohr": {"title": "Coherent Corp.", "bullets": ["Business: #1 optical transceiver manufacturer (~25% share). Formed from II-VI + Finisar + original Coherent mergers. Three segments: Networking (~50%, AI growth driver), Materials (SiC substrates), Industrial (lasers). Data center book-to-bill exceeds 4x with backlog extending to 2028. Scaling InP wafer production from 3-inch to 6-inch — doubling output by end Q4 FY2026, doubling again by end 2027. NVIDIA invested $2B + multi-year CPO supply agreement covering CW lasers, ELS modules, fiber attach through end of decade. CPO represents >$15B incremental TAM. Also makes SiC substrates and optical circuit switches (OCS, >$4B TAM). Debt leverage improving: 1.7x, down from 2.3x", "AI relevance: Core AI infrastructure company. 800G/1.6T transceivers connect AI GPU clusters. NVIDIA's $2B investment signals Coherent is the strategic laser/optics supplier for next-gen AI networking. CPO revenue for scale-out begins H2 2026, scale-up CPO in H2 2027. InP CW lasers are essential for CPO — silicon cannot emit light. NVIDIA's Spectrum-6 switch integrates 200Gb/s CPO, replacing pluggable transceivers entirely, creating structural procurement for Coherent's components", "Investment thesis: (1) NVIDIA's $2B investment + multi-year supply agreement provides revenue visibility through end of decade. (2) #1 transceiver share with InP laser technology that is essential for CPO — no substitutes. (3) Data center book-to-bill >4x with backlog to 2028. (4) CPO is >$15B incremental TAM on top of existing transceiver business. (5) 6-inch InP capacity ramp ahead of schedule — output doubling twice by end 2027. (6) OCS (optical circuit switches) adds another $4B+ TAM. (7) Q4 FY2026 guide: $1.91-2.05B revenue — quarterly run-rate approaching $8B annualized.", "Risks: (1) Customer concentration rising as NVIDIA becomes dominant buyer. (2) CPO transition could cannibalize pluggable transceiver revenue if timing misaligns. (3) Debt from acquisitions (though leverage declining). (4) Competition from Lumentum in lasers, Broadcom in SiPh. (5) SiC/Industrial segments have been softer. (6) Execution risk on rapid InP capacity ramp."]}, "lite": {"title": "Lumentum Holdings", "bullets": ["Business: CW (continuous wave) lasers for silicon photonics, coherent optical components, 3D sensing VCSELs, telecom lasers. NVIDIA invested $2B alongside Coherent to secure laser supply. Key CPO laser supplier — CW lasers are the external light sources that SiPh PICs require. Shifting from telecom dependence to datacom/AI", "AI relevance: High. CW lasers are mandatory for silicon photonics — silicon cannot generate its own light. Every SiPh chip for CPO needs an external laser, and Lumentum is a primary supplier. NVIDIA's $2B investment confirms strategic importance. As CPO scales, laser demand multiplies directly", "Investment thesis: (1) NVIDIA's $2B investment secures Lumentum as strategic CPO laser supplier. (2) CW lasers are mandatory for SiPh — no alternative light source exists. (3) CPO laser demand multiplies with every SiPh chip deployed. (4) 1.6T datacom transceivers provide near-term revenue growth. (5) Deep InP laser technology expertise with strong IP portfolio.", "Risks: (1) Apple VCSEL revenue has declined — 3D sensing business weakening. (2) Telecom market weakness. (3) Competition from Coherent in lasers. (4) If CPO adoption delays, laser demand growth slows. (5) Needs to execute shift from telecom to datacom/AI."]}, "aaoi": {"title": "Applied Optoelectronics (AAOI)", "bullets": ["Business: Vertically integrated optical transceiver manufacturer — makes its own lasers + modules in-house. Revenue growing rapidly on AI data center demand. Received first volume order for 1.6T transceivers from major hyperscale customer (suspected Amazon). CFO targets mid-2027 monthly transceiver revenue run-rate of ~$378M/month across 100/400G, 800G, and 1.6T products. Three hyperscale customers confirmed", "AI relevance: High. Transceivers connect AI GPU clusters in data centers. 800G/1.6T transceiver demand surging with AI buildout. Vertically integrated InP laser manufacturing is the key differentiator — AAOI can control its laser supply chain when others face shortages", "Investment thesis: (1) Vertical integration (own laser fabs) provides cost advantage and supply security. (2) First 1.6T volume order from hyperscaler validates product. (3) $378M/month target by mid-2027 implies massive revenue inflection. (4) Three hyperscale customers provide diversification. (5) Pluggable transceivers remain dominant for next 18-24 months before CPO transition.", "Risks: (1) Smaller than Coherent/Lumentum — less diversified. (2) Customer concentration in hyperscalers. (3) CPO could eventually displace pluggable transceivers — transition risk. (4) Historically volatile financial performance. (5) Competition from larger optical players."]}, "siv_p": {"title": "Sivers Semiconductors (Photonics)", "bullets": ["Business: Swedish designer and manufacturer of InP CW DFB lasers for silicon photonics and optical interconnects. Stockholm-listed (SIVE SS), evaluating Nasdaq New York dual listing. Photonics segment (~30% of group revenue) operates a Glasgow cleanroom with in-house InP manufacturing. WIN Semiconductors (Taiwan) partnership provides outsourced high-volume foundry capacity — a critical lock-in given industry-wide CW laser shortages. TAM has expanded from CPO-only to include pluggable transceivers. ~125 employees across both segments", "AI relevance: Structural chokepoint. CW lasers are the mandatory external light source for every silicon photonics transceiver and CPO module, but InP laser manufacturing has sub-30% wafer yields with only a handful of scaled suppliers globally. Lumentum has publicly signaled CW laser bottlenecks. Sivers confirmed hyperscalers and pluggable suppliers expect a shortage in the coming years. Dense partnership ecosystem: POET (CPO light engines, production readiness end 2026), Ayar Labs (SuperNova light source on GFS SiPi), O-Net (ELSFP modules), Jabil (1.6T LRO pluggable), LIGHTIUM (TFLN for 3.2T+ cycle), Aeva (LiDAR ramp Q4 2026)", "Investment thesis: (1) CW laser bottleneck — sub-30% InP yields, confirmed industry shortage, Lumentum buying externally. (2) TAM expansion from CPO to pluggable transceivers — multiple manufacturers qualifying Sivers DFB lasers. (3) WIN Semiconductor capacity lock-in during supply shortage. (4) Volume production inflection starting H2 2026 across CPO and LiDAR. (5) Nasdaq dual listing would transform visibility and investor access.", "Risks: (1) Pre-volume (~$33M group revenue) — CPO volume is a 2027-2028 story. (2) Competition from Coherent and Lumentum at massive scale. (3) Partnership density doesn't guarantee purchase orders — partners are themselves early-stage in CPO. (4) Tight cash position — may need additional capital for production ramp."]}, "poet": {"title": "POET Technologies", "bullets": ["Business: Photonic integrated circuit platform — combines electronic and photonic functions on a single chip. Partnership with Sivers for external light source modules for AI data centers. Pre-revenue/early stage", "AI relevance: Potential enabler for next-gen CPO if platform gains adoption. Integrating optical and electronic functions could simplify CPO packaging", "Investment thesis: (1) Novel integration approach could reduce CPO cost and complexity. (2) Sivers partnership provides access to III-V laser technology.", "Risks: (1) Very early stage — unproven at production scale. (2) Small company with limited resources. (3) Competition from established players (Coherent, Broadcom SiPh)."]}, "hama": {"title": "Hamamatsu Photonics", "bullets": ["Business: Photodetectors, photomultiplier tubes, image sensors, laser diodes for scientific/industrial applications. Deep expertise in photon detection and measurement. Japanese company", "AI relevance: Moderate. Photonic components for sensing and measurement. Less directly tied to AI data center interconnect than Coherent/Lumentum. Potential role in quantum computing and advanced imaging for AI", "Investment thesis: (1) Deep photonics expertise positions for emerging applications (quantum, LiDAR). (2) Scientific instruments demand is stable.", "Risks: (1) Limited direct AI data center exposure. (2) Scientific instruments market is modest growth."]}, "fabn": {"title": "Fabrinet", "bullets": ["Business: Contract manufacturer for optical transceivers and photonics components. Key manufacturing partner for Coherent and Lumentum. Thailand-based manufacturing with precision optical assembly expertise. Revenue grows in direct proportion to transceiver demand", "AI relevance: High. Manufactures the transceivers that connect AI GPU clusters. As optical interconnect scales for AI data centers, Fabrinet's manufacturing volume grows directly. When Coherent and Lumentum sell more, Fabrinet makes more", "Investment thesis: (1) Pure-play contract manufacturer riding the AI optical interconnect wave. (2) Precision optical manufacturing expertise is difficult to replicate. (3) Thailand-based cost advantage. (4) Revenue directly correlated to Coherent/Lumentum growth. (5) Multiple product lines provide diversification within optics.", "Risks: (1) Manufacturing margins are lower than component/IP companies. (2) Customer concentration (Coherent + Lumentum = large share). (3) If CPO changes transceiver form factors, manufacturing processes may need to adapt. (4) Thai baht currency exposure."]}, "brcm_s": {"title": "Broadcom (Silicon Photonics)", "bullets": ["Business: Leading merchant SiPh chip designer — designs photonic integrated circuits for CPO. SiPh PICs fabricated at Tower Semi and GlobalFoundries. Broadcom's dominant switch position (Tomahawk) creates natural path to integrate CPO. Demonstrated 6.4T socketed SiPho CPO at OFC 2026", "AI relevance: Critical. CPO is the next paradigm for AI data center interconnects. Broadcom's SiPh PICs replace pluggable transceivers in next-gen networking switches, dramatically increasing bandwidth density and reducing power. NVIDIA's Spectrum-6 architecture integrates CPO — Broadcom's Tomahawk is the competitive switch platform", "Investment thesis: (1) First-mover in merchant CPO — deep co-development with Tower Semi SiPh process. (2) Broadcom's dominant switch position creates natural CPO integration pathway. (3) 6.4T CPO demonstrated — technology is production-ready. (4) CPO eliminates pluggable transceivers entirely — structural architecture shift.", "Risks: (1) CPO adoption timeline could extend. (2) Competition from Cisco/Intel/Marvell SiPh. (3) Requires new packaging ecosystem. (4) Tower Semi SiPh capacity could constrain ramp."]}, "csc_s": {"title": "Cisco (Silicon Photonics)", "bullets": ["Business: SiPh transceivers and coherent optics via Luxtera (acquired 2018) and Acacia acquisitions. Fabricated at Tower Semi/GF. Early SiPh pioneer", "AI relevance: SiPh optics for AI data center networking. Cisco integrating photonics into its networking portfolio. Coherent optics for DCI (data center interconnect)", "Investment thesis: (1) Early SiPh pioneer with acquired technology (Luxtera, Acacia). (2) Networking market position provides distribution for SiPh products.", "Risks: (1) SiPh is one small division within huge Cisco. (2) Broadcom SiPh may be more advanced. (3) Cisco's networking share under pressure from Broadcom/Arista."]}, "int_s": {"title": "Intel (Silicon Photonics)", "bullets": ["Business: SiPh optical transceivers manufactured in Intel's own fabs. One of first companies to ship SiPh products at scale. Unique because Intel fabs its own SiPh — unlike Broadcom/Cisco which use Tower/GF", "AI relevance: SiPh transceivers serve AI data center interconnect. Vertically integrated SiPh manufacturing is a differentiator", "Investment thesis: (1) Only company manufacturing SiPh in-house at scale. (2) Deep process expertise from years of development. (3) Could supply SiPh to Intel Foundry external customers.", "Risks: (1) Intel is restructuring — SiPh may not get investment priority. (2) Tower Semi's open-platform model may be more attractive to designers. (3) Small division within struggling Intel."]}, "mrv_s": {"title": "Marvell (Silicon Photonics)", "bullets": ["Business: SiPh-based optical I/O via Celestial AI acquisition ($5.5B). Enables chip-to-chip communication via light instead of electrical traces. Could be transformative for AI cluster scaling", "AI relevance: Very high. Optical I/O replaces electrical interconnects between chiplets — this could solve the bandwidth/power wall for AI cluster scaling. If optical I/O becomes standard, every AI chip package needs photonic interconnect", "Investment thesis: (1) Celestial AI's optical I/O technology could be transformative. (2) Chip-to-chip photonic communication solves AI scaling bottleneck. (3) Marvell's custom silicon platform provides distribution.", "Risks: (1) Very early stage — optical I/O not yet proven at production scale. (2) $5.5B acquisition integration risk. (3) If electrical interconnects continue improving, optical I/O may not be necessary near-term."]}, "glw": {"title": "Corning Inc.", "bullets": ["Business: #1 optical fiber manufacturer globally. Optical Communications ~35% of revenue. Also display glass, specialty materials, life sciences. Estimates AI data centers use 10x more fiber per rack than traditional data centers", "AI relevance: High. AI data centers require massive amounts of optical fiber for GPU interconnects. 10x fiber content per AI rack vs. traditional. New ultra-low-loss fiber products designed for AI workloads. Every CPO and pluggable transceiver connection needs Corning fiber", "Investment thesis: (1) 10x fiber content per AI data center rack — structural demand multiplier. (2) #1 fiber manufacturer with decades of manufacturing expertise. (3) Ultra-low-loss fiber for AI workloads commands premium pricing. (4) Volume commitments from hyperscalers provide revenue visibility.", "Risks: (1) Fiber is a commodity-like product with competitive pricing. (2) Telecom fiber demand has been weak. (3) Optical Communications is ~35% of diversified Corning. (4) If AI data center buildout slows, fiber demand declines."]}, "aph": {"title": "Amphenol", "bullets": ["Business: #1 connector company globally. IT Datacom segment $8.3B, Communications Solutions OPM 32.7%. Every electrical connection in a data center requires a connector — servers, networking, power distribution, cooling systems. Content value rises as datacenter density increases, regardless of which power architecture wins", "AI relevance: Single stock with leverage on the entire AI power chain. Every watt that travels from the grid to the GPU passes through Amphenol connectors at multiple points. Whichever company in the power chain grows — whether it's Vertiv (UPS), MPS (VRM), or Navitas (GaN) — that growth involves more connectors. AI data center connector content per rack is significantly higher than traditional. 800G/1.6T cable assemblies, high-power GPU connectors, and busbar systems all flow through Amphenol", "Investment thesis: (1) Architecture-agnostic leverage on the entire AI power chain — wins regardless of 48V vs. 12V, GaN vs. Si, 800V DC vs. AC. (2) IT Datacom demonstrates explosive AI connector demand. (3) OPM 32.7% — premium margins. (4) Acquisitive growth model extends into adjacent segments. (5) Content per rack rises with every GPU TDP increase.", "Risks: (1) If the entire AI chain decelerates, Amphenol decelerates — risk is linked to the whole chain, not diversified. (2) (3) Competition in connector market."]}, "tec": {"title": "TE Connectivity", "bullets": ["Business: Connectors, sensors, electronic components. Automotive ~50%, data center/communications growing. High-power connectors for data centers", "AI relevance: Growing. Data center power and signal connectors for AI servers. High-power connector demand for GPU racks. 48V power distribution connectors", "Investment thesis: (1) Data center connector demand growing with AI. (2) High-power connectors for GPU racks. (3) Automotive provides stable base revenue.", "Risks: (1) Automotive is largest segment — not an AI pure-play. (2) Competition from Amphenol. (3) Cyclical with auto/industrial."]}, "crdo": {"title": "Credo Technology", "bullets": ["Business: High-speed SerDes chipsets and active electrical cables (AECs) for AI data center interconnects. AECs replace passive copper cables in AI GPU clusters with active signal conditioning. Enables 100G/200G per lane connectivity. Fabbed at Tower Semiconductor", "AI relevance: Very high. As AI clusters scale to tens of thousands of GPUs, the cables connecting them become a bottleneck. Credo's AECs enable longer reach and higher bandwidth between GPUs within racks. Every AI GPU needs multiple high-speed connections", "Investment thesis: (1) Leading-edge SerDes technology (200G/lane) — first-mover in AECs for AI clusters. (2) 50%+ YoY revenue growth demonstrates product-market fit. (3) Deep hyperscaler relationships (Microsoft, Google reportedly). (4) Tower Semi fabrication connects Credo to SiPh ecosystem. (5) Every AI GPU added to a cluster needs more cables — linear scaling.", "Risks: (1) Small company — customer concentration. (2) Competition from Broadcom and Marvell in SerDes. (3) If optical cables replace electrical (CPO), AEC demand shifts. (4) Stock has already run significantly."]}, "alab": {"title": "Astera Labs", "bullets": ["Business: PCIe/CXL retimers, smart cable modules, connectivity ICs for AI data center infrastructure. IPO'd 2024. Products solve signal integrity problems in AI server designs — retimers clean up degraded signals at high speeds", "AI relevance: Very high. AI servers push PCIe and CXL interfaces to their limits. Retimers are needed as link lengths and speeds increase. CXL memory expansion enables larger memory pools for AI workloads. Every AI server uses PCIe — retimers become essential at higher speeds", "Investment thesis: (1) First-mover in AI-optimized PCIe/CXL retimers. (2) Strong hyperscaler design wins validate product. (3) PCIe 6.0/7.0 transition drives retimer demand — higher speeds need more signal conditioning. (4) CXL memory expansion for AI is a major new TAM. (5) Rapidly growing revenue validates product-market fit.", "Risks: (1) Broadcom and Marvell competing in PCIe retimers. (2) CXL adoption pace uncertain. (3) Small company — stock has run significantly from IPO. (4) If PCIe speeds plateau, retimer demand stalls."]}, "macom": {"title": "MACOM Technology", "bullets": ["Business: High-speed analog/mixed-signal — TIAs, laser drivers, RF amplifiers, ADCs for optical, 5G, and defense. Acquired Wolfspeed's RF GaN business. Products enable electrical-to-optical conversion in transceivers and RF amplification in 5G", "AI relevance: Growing. TIAs and drivers are inside optical transceivers connecting AI GPU clusters. As transceiver speeds increase to 800G/1.6T, more sophisticated analog components needed. 5G infrastructure for wireless AI also growing", "Investment thesis: (1) Critical analog components inside every optical transceiver. (2) 800G/1.6T speed transitions drive higher-value analog content. (3) Wolfspeed RF acquisition adds GaN for 5G/defense. (4) Defense RF provides stable revenue base.", "Risks: (1) Wolfspeed RF integration risk. (2) Competition from Broadcom in transceiver analog. (3) If CPO changes transceiver architecture, analog component requirements may shift."]}, "nvda": {"title": "NVIDIA", "bullets": ["Business: Dominant AI accelerator company — ~80% market share in AI GPUs. FY2026 revenue. Data Center ~91% of revenue ($194B+). 1B. Gross margins 79-88% depending on product mix. 2-4.5T (world's most valuable). Blackwell architecture generating billions per quarter, GB300 now ~2/3 of Blackwell revenue. Supply commitments nearly doubled to $95.2B. CFO visibility into $500B Blackwell+Rubin revenue through end of calendar 2026. 5M+ CUDA developers. Invested $4B in Coherent+Lumentum for CPO supply. Rubin samples shipping, Vera Rubin on track for H2 FY2027. Gaming $16B (+41%), Auto $2.3B (+39%), ProViz $3.2B (+70%)", "AI relevance: THE center of the AI universe. NVIDIA GPUs are the default hardware for AI training and inference. CUDA ecosystem (5M+ developers, 18+ years) creates near-insurmountable switching costs. Full-stack advantage: hardware + software + networking + now optical (CPO investments). Every major AI lab, hyperscaler, and enterprise trains on NVIDIA. Hyperscalers projected to spend ~$700B on AI capex in 2026 — flows through NVIDIA", "Investment thesis: (1) ~80% AI accelerator market share with CUDA ecosystem moat. (2) $500B revenue visibility through end of calendar 2026. (3) FY2026 $215.9B revenue at ~80%+ gross margins — unprecedented hardware economics. (4) Blackwell sold out, Rubin extending product cycle — annual cadence prevents customer pause. (5) $4B CPO investment secures optical supply chain for Spectrum-6/Rubin networking. (6) Forward P/E compressed to ~25x despite 60%+ earnings growth — valuation reasonable relative to growth. (7) Networking (InfiniBand, Ethernet) and CPO expanding TAM beyond GPUs. (8) Gaming, Auto, ProViz provide diversification — all growing 35%+.", "Risks: (1) Customer concentration — top 4 hyperscalers are 40%+ of revenue. (2) AMD (MI350) and custom ASICs (Broadcom for Google/Meta) competing for share — absolute share may decline from 87% to 75%
