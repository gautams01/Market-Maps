axim acquisition created broad portfolio", "AI relevance: Moderate. Precision data converters and signal conditioning used in AI server power delivery and 5G infrastructure. High-speed ADCs for data acquisition", "Investment thesis:\n(1) #2 analog with precision technology leadership.\n(2) AI server power and 5G infrastructure drive growth.\n(3) Maxim acquisition expanded portfolio.", "Risks:\n(1) Cyclical with industrial/auto.\n(2) Competition from TI."]}, "ifx": {"title": "Infineon Technologies", "bullets": ["Business: #1 power semiconductor company globally \u2014 SiC/IGBT, automotive MCUs, sensors, security ICs. Revenue ~16B EUR. Automotive ~50%, power/energy ~25%. German-based. SiC MOSFET market leader", "AI relevance: Growing. Power semiconductors for AI data center power delivery \u2014 48V to point-of-load conversion using SiC/IGBT. Data centers consume enormous power, and efficient conversion is critical. Not a direct AI chip company but essential for powering AI infrastructure", "Investment thesis:\n(1) #1 power semiconductor globally \u2014 structural EV and data center demand.\n(2) SiC MOSFETs for efficient data center power conversion.\n(3) Automotive MCUs for ADAS and EV.\n(4) Broadest SiC portfolio in the industry.", "Risks:\n(1) Automotive cycle weakness.\n(2) Chinese SiC competitors growing.\n(3) Not a pure AI play \u2014 broad industrial exposure."]}, "nxp": {"title": "NXP Semiconductors", "bullets": ["Business: Automotive MCUs, radar, secure connectivity, edge processing. Revenue ~$13B. Automotive ~55%. Netherlands-based", "AI relevance: Moderate. Edge AI in vehicles (ADAS, autonomous driving). S32 automotive processors have AI capability. Not a data center AI play", "Investment thesis:\n(1) Automotive semiconductor leader.\n(2) Edge AI for ADAS is a multi-year growth story.\n(3) Secure connectivity for IoT.", "Risks:\n(1) Automotive cycle weakness.\n(2) Competition from Infineon, Renesas."]}, "stm": {"title": "STMicroelectronics", "bullets": ["Business: SiC power devices, automotive MCUs, MEMS sensors, analog. Revenue ~14B EUR. Automotive + Industrial ~65%. Swiss/Italian", "AI relevance: SiC power for data center power delivery. Wide-bandgap semiconductors for efficient AI power conversion", "Investment thesis:\n(1) SiC power leadership alongside Infineon.\n(2) Automotive MCUs and MEMS for ADAS.\n(3) Stock up 118% combined \u2014 AI power narrative gaining.", "Risks:\n(1) Automotive cycle weakness.\n(2) SiC competition from Infineon and Chinese players."]}, "on_s": {"title": "ON Semiconductor", "bullets": ["Business: SiC power MOSFETs, image sensors for automotive, power management. Revenue ~$7B. Automotive ~50%. Transitioning to SiC power and intelligent sensing", "AI relevance: Growing. SiC for data center power. Image sensors for edge AI vision systems (automotive ADAS, industrial automation)", "Investment thesis:\n(1) SiC power for data center and EV.\n(2) Image sensors for AI vision at the edge.\n(3) Margin expansion from SiC mix shift.", "Risks:\n(1) Automotive cycle weakness.\n(2) SiC competition.\n(3) Image sensor competition from Sony."]}, "ren": {"title": "Renesas Electronics", "bullets": ["Business: MCUs, analog, power management. Revenue ~$14B. Automotive + Industrial ~65%. Japanese. Acquired Dialog and Intersil for analog portfolio", "AI relevance: Limited direct. MCUs and analog for automotive and industrial. Edge MCU AI capability is growing but not a primary revenue driver", "Investment thesis:\n(1) #1 automotive MCU in Japan.\n(2) Dialog/Intersil acquisitions broadened analog portfolio.\n(3) Stock up ~80% combined.", "Risks:\n(1) Automotive cycle weakness.\n(2) Limited data center AI exposure."]}, "lscc": {"title": "Lattice Semiconductor", "bullets": ["Business: Low-power FPGAs for edge computing, industrial, automotive, communications. Revenue ~$500M. Smallest major FPGA company", "AI relevance: Growing. Low-power FPGAs for AI inference at the edge (not data center training). AI-specific product lines for vision and sensor processing", "Investment thesis:\n(1) Low-power FPGAs uniquely suited for edge AI inference.\n(2) AI-specific product lines growing.\n(3) Small company with potential acquisition appeal.", "Risks:\n(1) Competition from AMD (Xilinx) and Intel (Altera).\n(2) Small scale.\n(3) Edge AI is lower revenue per unit than data center."]}, "mchp": {"title": "Microchip Technology", "bullets": ["Business: MCUs, analog, FPGAs (Microsemi), memory. Revenue ~$5.5B. Broadest embedded portfolio. Automotive + Industrial ~65%", "AI relevance: Limited direct. Microsemi FPGAs used in some edge/defense AI applications. MCUs are ubiquitous but not AI-specific", "Investment thesis:\n(1) Broadest embedded portfolio serves diverse end markets.\n(2) Microsemi FPGAs for defense AI.\n(3) Automotive MCU demand growing.", "Risks:\n(1) Cyclical \u2014 inventory correction prolonged.\n(2) Not an AI pure-play.\n(3) Competition across all product lines."]}, "wolf_c": {"title": "Wolfspeed (power devices)", "bullets": ["Business: See Wolfspeed SiC substrates entry \u2014 also fabricates SiC power MOSFETs in addition to growing substrates. Vertically integrated from crystal to finished device", "AI relevance: SiC power devices for EV and growing data center power delivery", "Investment thesis:\n(1) See Wolfspeed SiC substrates entry.\n(2) Vertical integration provides differentiated power device performance.", "Risks:\n(1) See Wolfspeed SiC substrates entry."]}, "nvts": {"title": "Navitas Semiconductor", "bullets": ["Business: GaN and SiC power ICs for fast charging, data center power, EV, solar. Revenue ~$100M. Stock up ~270% combined returns. Growing in data center 48V power applications", "AI relevance: Growing. GaN power ICs for efficient AI server power supplies. 48V-to-point-of-load conversion for GPU racks. GaN offers higher efficiency than silicon at high frequencies", "Investment thesis:\n(1) GaN power ICs for data center power \u2014 higher efficiency than silicon.\n(2) 270% combined return reflects data center power demand.\n(3) 48V rack architecture transition favors GaN.\n(4) Fast charging for mobile is a stable base revenue.", "Risks:\n(1) Small revenue base (~$100M).\n(2) Competition from Infineon (GaN Systems acquisition).\n(3) GaN cost premium over silicon limits adoption speed."]}, "vsh": {"title": "Vishay Intertechnology", "bullets": ["Business: Discrete semiconductors (MOSFETs, diodes), passive components (resistors, capacitors, inductors). Broad portfolio across all electronic applications", "AI relevance: Indirect. Passive components in every electronic system including AI servers. Benefits from volume growth across all end markets", "Investment thesis:\n(1) Broad portfolio benefits from overall electronics growth.\n(2) Stock up ~107% combined \u2014 industrial recovery play.", "Risks:\n(1) Commodity-like products with limited pricing power.\n(2) Not an AI pure-play."]}, "lfus": {"title": "Littelfuse", "bullets": ["Business: Circuit protection (fuses, TVS diodes), power control semiconductors, sensors", "AI relevance: Limited. Circuit protection in all electronics", "Investment thesis:\n(1) Circuit protection is essential in every electronic system.\n(2) EV power protection growing.", "Risks:\n(1) Not an AI play.\n(2) Cyclical with industrial demand."]}, "fuji": {"title": "Fuji Electric", "bullets": ["Business: Power semiconductors (IGBTs, SiC), industrial inverters. Japanese conglomerate", "AI relevance: IGBT/SiC modules for industrial power. Growing data center power applications", "Investment thesis:\n(1) SiC power growing alongside Infineon.\n(2) Japanese industrial demand.", "Risks:\n(1) Diversified conglomerate \u2014 semiconductor is one segment.\n(2) Competition from Infineon, STMicro."]}, "mite": {"title": "Mitsubishi Electric", "bullets": ["Business: Power modules (IGBTs, SiC), factory automation, automotive. Japanese conglomerate", "AI relevance: Limited direct. Power modules for industrial applications", "Investment thesis:\n(1) Power module demand from industrial automation.", "Risks:\n(1) Huge conglomerate \u2014 semiconductor is small piece.\n(2) Limited AI exposure."]}, "nexp": {"title": "Nexperia", "bullets": ["Business: Discrete semiconductors, MOSFETs, logic ICs. Subsidiary of Chinese Wingtech", "AI relevance: Limited. Commodity discrete components", "Investment thesis:\n(1) Broad discrete portfolio.", "Risks:\n(1) Chinese ownership creates geopolitical uncertainty.\n(2) Commodity products."]}, "sony": {"title": "Sony Semiconductor", "bullets": ["Business: #1 CMOS image sensor globally (~50% share). Revenue ~$10B (semiconductor division). Powers smartphone cameras for Apple and Samsung. Image sensors ~80% of semi division", "AI relevance: Growing. Image sensors for AI vision systems \u2014 autonomous driving, surveillance, robotics, industrial automation. Edge AI increasingly processes Sony sensor data. On-sensor AI processing capability growing", "Investment thesis:\n(1) ~50% image sensor market share \u2014 dominant position.\n(2) AI vision systems drive sensor demand beyond smartphones.\n(3) On-sensor AI processing is a differentiated growth area.\n(4) Automotive ADAS image sensors growing rapidly.", "Risks:\n(1) Smartphone camera upgrade cycle slowing.\n(2) Competition from Samsung (ISOCELL), OmniVision.\n(3) Part of Sony conglomerate \u2014 limited pure-play access."]}, "ams": {"title": "ams-OSRAM", "bullets": ["Business: Optical sensors, LED/laser components, VCSEL arrays for 3D sensing. Austrian company", "AI relevance: Limited direct. 3D sensing/VCSEL for face recognition. LiDAR components for autonomous vehicles", "Investment thesis:\n(1) 3D sensing technology for AR/VR and automotive.\n(2) LiDAR components for autonomous driving.", "Risks:\n(1) Apple 3D sensing demand has declined.\n(2) Restructuring ongoing.\n(3) Competition from multiple sensor companies."]}, "algm": {"title": "Allegro MicroSystems", "bullets": ["Business: Magnetic sensors and power ICs for automotive and industrial. Hall-effect current sensors are the core product", "AI relevance: Limited direct. Current sensors used in power monitoring including some data center applications", "Investment thesis:\n(1) Automotive sensor demand for EV.\n(2) Current sensing for power management.", "Risks:\n(1) Automotive cycle weakness.\n(2) Niche sensor market."]}, "sensa": {"title": "Sensata Technologies", "bullets": ["Business: Sensors and controls for automotive and industrial \u2014 pressure, temperature, position sensors", "AI relevance: Minimal direct AI exposure", "Investment thesis:\n(1) Automotive sensor content per vehicle growing.", "Risks:\n(1) Automotive cycle weakness.\n(2) No meaningful AI exposure."]}, "tdk": {"title": "TDK (InvenSense)", "bullets": ["Business: MEMS sensors (accelerometers, gyroscopes), passive components, batteries. InvenSense MEMS division", "AI relevance: Limited direct. MEMS sensors for edge AI devices (wearables, IoT). Passive components in AI servers", "Investment thesis:\n(1) MEMS sensors for edge devices.\n(2) Passive components in every electronic system.", "Risks:\n(1) Consumer electronics cyclicality.\n(2) Limited AI leverage."]}, "slab": {"title": "Silicon Labs", "bullets": ["Business: IoT wireless SoCs \u2014 Wi-Fi, BT, Zigbee, Thread, Matter connectivity. Focus on smart home and industrial IoT", "AI relevance: Limited. IoT connectivity for edge devices. Matter protocol adoption is growth theme", "Investment thesis:\n(1) Matter protocol standard adoption.\n(2) IoT proliferation.\n(3) Focused pure-play on IoT connectivity.", "Risks:\n(1) IoT growth has been slower than expected.\n(2) Competition from Nordic, Espressif."]}, "nord": {"title": "Nordic Semiconductor", "bullets": ["Business: Bluetooth Low Energy and cellular IoT wireless SoCs. Norway-based. Market leader in BLE", "AI relevance: Limited. Wireless connectivity for IoT devices", "Investment thesis:\n(1) BLE market leadership.\n(2) Cellular IoT expansion.", "Risks:\n(1) IoT growth uncertainty.\n(2) Competition from Silicon Labs, Qualcomm."]}, "espr": {"title": "Espressif Systems", "bullets": ["Business: Wi-Fi/BT SoCs (ESP32 family) for IoT. Chinese fabless. Massive maker/developer community", "AI relevance: Growing. ESP32 increasingly used for edge AI/ML inference in IoT devices. TinyML on ESP32 is an active development area", "Investment thesis:\n(1) Massive developer community (millions of ESP32 users).\n(2) Edge AI/TinyML on ESP32 is a growing use case.", "Risks:\n(1) Low ASPs.\n(2) Chinese company \u2014 geopolitical risk.\n(3) Limited moat in commodity Wi-Fi/BT."]}, "rtk": {"title": "Realtek", "bullets": ["Business: Ethernet PHYs, Wi-Fi controllers, audio codecs, PCIe switches. Revenue ~$3B. Taiwan-based. Ubiquitous in consumer electronics", "AI relevance: Limited. Ethernet PHYs in servers but not at the high-speed AI interconnect tier (that's Broadcom/Marvell)", "Investment thesis:\n(1) Ethernet PHY market share.\n(2) Wi-Fi controller demand from IoT.", "Risks:\n(1) Consumer electronics cyclicality.\n(2) Limited AI tier exposure."]}, "swks": {"title": "Skyworks Solutions", "bullets": ["Business: RF front-end \u2014 filters, PAs, switches for mobile devices. Revenue ~$4B. Key Apple RF supplier. Mobile ~70%", "AI relevance: Indirect. RF components in smartphones running on-device AI. 5G infrastructure for wireless AI connectivity", "Investment thesis:\n(1) Key Apple RF supplier \u2014 captive relationship.\n(2) 5G content per phone increasing.\n(3) Broad markets diversification growing.", "Risks:\n(1) Apple concentration \u2014 any design loss is material.\n(2) Qualcomm integrating more RF internally.\n(3) Smartphone market maturation."]}, "qrvo": {"title": "Qorvo", "bullets": ["Business: RF filters (BAW/SAW), power amplifiers, GaN RF for defense and 5G infrastructure. Revenue ~$3.5B. Mobile ~50%, Infrastructure/Defense ~30%", "AI relevance: Indirect. 5G infrastructure RF for wireless AI. GaN for defense radar/communications. Less consumer-exposed than Skyworks", "Investment thesis:\n(1) 5G infrastructure RF demand growing.\n(2) GaN for defense is a stable, growing market.\n(3) BAW filter technology leadership.", "Risks:\n(1) Mobile RF market competition with Skyworks and Qualcomm.\n(2) Apple reducing external RF content.\n(3) Cyclical."]}, "mura": {"title": "Murata Manufacturing", "bullets": ["Business: #1 MLCC (ceramic capacitor) company globally. Revenue ~$14B. Also SAW/BAW filters, Wi-Fi/BT modules. MLCCs used in virtually every electronic device", "AI relevance: Moderate. Every AI server contains hundreds of MLCCs for power filtering and decoupling. Higher-performance capacitors needed for GPU power delivery. Content per AI server is significantly higher than consumer devices", "Investment thesis:\n(1) AI server MLCC content per board is significantly higher.\n(2) #1 MLCC with global scale.\n(3) Filter technology for 5G.", "Risks:\n(1) MLCC pricing can be competitive.\n(2) Smartphone MLCC demand maturing.\n(3) Diversified \u2014 limited pure AI leverage."]}, "crus": {"title": "Cirrus Logic", "bullets": ["Business: Audio codecs, haptic drivers, power management ICs. Key Apple supplier", "AI relevance: Limited. Audio processing for consumer devices. On-device AI audio processing is emerging", "Investment thesis:\n(1) Key Apple supplier \u2014 captive relationship.\n(2) Haptic and power management growing.", "Risks:\n(1) Apple concentration.\n(2) Limited AI exposure."]}, "smtc": {"title": "Semtech", "bullets": ["Business: LoRa IoT connectivity, signal integrity ICs, analog/mixed-signal. Acquired Sierra Wireless", "AI relevance: Limited direct. IoT connectivity. Signal integrity ICs for high-speed data links have some AI infrastructure relevance", "Investment thesis:\n(1) LoRa IoT connectivity growing.\n(2) Signal integrity ICs for data center.", "Risks:\n(1) LoRa adoption slower than expected.\n(2) Debt from Sierra Wireless acquisition."]}, "mxl": {"title": "MaxLinear", "bullets": ["Business: Broadband, networking, infrastructure analog/mixed-signal ICs. Ethernet PHYs, PAM4 SerDes. Revenue growing. Stock up ~199% combined", "AI relevance: Moderate. PAM4 SerDes for data center networking. Ethernet PHYs for AI server connectivity", "Investment thesis:\n(1) PAM4 SerDes for high-speed data center networking.\n(2) 199% combined return reflects AI networking demand.\n(3) Ethernet PHY market share.", "Risks:\n(1) Competition from Broadcom/Marvell in high-speed networking.\n(2) Smaller scale."]}, "rohm": {"title": "ROHM Semiconductor", "bullets": ["Business: SiC power devices, analog ICs, LEDs. Japanese. Growing SiC portfolio alongside Infineon and STMicro", "AI relevance: SiC power for data center power delivery. Growing but smaller than Infineon/STMicro", "Investment thesis:\n(1) SiC power growing for data center and EV.\n(2) Japanese quality and automotive relationships.\n(3) Stock up ~85% combined.", "Risks:\n(1) Smaller than Infineon/STMicro in SiC.\n(2) Competitive SiC market."]}, "gf_s": {"title": "GlobalFoundries (SiPh)", "bullets": ["Business: See GlobalFoundries main entry \u2014 SiPh foundry platform alongside Tower Semi. Acquired AMF for photonics capability", "AI relevance: See GlobalFoundries main entry. SiPh foundry for CPO chips", "Investment thesis:\n(1) See GlobalFoundries main entry.", "Risks:\n(1) See GlobalFoundries main entry."]}, "tow_s": {"title": "Tower Semi (SiPh)", "bullets": ["Business: See Tower Semi main entry \u2014 #1 open-platform SiPh foundry, 5x-ing capacity in 2026", "AI relevance: See Tower Semi main entry", "Investment thesis:\n(1) See Tower Semi main entry.", "Risks:\n(1) See Tower Semi main entry."]}, "siv_r": {"title": "Sivers Semiconductors (mmWave)", "bullets": ["Business: 5G mmWave RF ICs and modules. Swedish company. Dual business with photonics lasers", "AI relevance: 5G infrastructure enables wireless AI connectivity. mmWave for fixed wireless access and 5G base stations", "Investment thesis:\n(1) 5G mmWave demand growing.\n(2) Dual photonics+RF exposure.", "Risks:\n(1) Small company.\n(2) 5G mmWave adoption has been slower than expected."]}, "sam_s": {"title": "Samsung LSI", "bullets": ["Business: Exynos mobile SoCs, ISOCELL image sensors. Samsung's fabless design division", "AI relevance: On-device AI in Exynos chips. Image sensors for AI vision systems", "Investment thesis:\n(1) Captive Samsung smartphone demand.\n(2) Image sensors for automotive AI.", "Risks:\n(1) Exynos competes poorly vs. Qualcomm Snapdragon.\n(2) Part of Samsung conglomerate."]}, "sam_x": {"title": "Samsung (Exynos)", "bullets": ["Business: See Samsung LSI entry \u2014 Exynos mobile processors with NPU for on-device AI", "AI relevance: On-device AI processing in Samsung phones", "Investment thesis:\n(1) See Samsung LSI entry.", "Risks:\n(1) See Samsung LSI entry."]}, "indk": {"title": "Innodisk", "bullets": ["Business: Industrial-grade embedded memory (SSDs, DRAM modules) and edge AI systems. Taiwan-based (5289 TT). April 2026 revenue NT$6.67B (+583% YoY). First 4 months of 2026 revenue (NT$19.85B) already surpassed full-year 2025 (NT$14.26B). March 2026 single-month EPS of NT$28.1 exceeded full-year 2025 EPS (NT$21.72). Profit before tax up 1,845% YoY. AI-related products rose from 23% to 25% of revenue, targeting 30%+ in 2026. Products include PCIe Gen5 data center SSDs, CXL memory modules, edge AI workstations (APEX-P200), LPDDR5X modules. 220 employees", "AI relevance: Edge AI is the primary growth driver \u2014 industrial memory and embedded systems for AI inference at the edge (factories, autonomous vehicles, robotics, smart cities). Also expanding into data center SSDs and CXL memory for cloud AI. Memory shortage driven by AI demand is lifting both volumes and ASPs simultaneously. Chairman stated 'strong demand from large cloud and AI customers' is tightening memory supply across the board", "Investment thesis:\n(1) Revenue inflecting dramatically \u2014 4 months of 2026 already exceeded full-year 2025.\n(2) Edge AI business expected to grow 'multiple-fold' in 2026.\n(3) CXL memory and data center SSDs expand TAM from industrial niche into cloud/AI.\n(4) Memory shortage benefits Innodisk \u2014 both volume and ASP rising simultaneously.\n(5) Small company (NT$48B market cap) with massive operating leverage on AI demand.\n(6) Industrial-grade products command premium pricing vs. consumer memory.\n(7) Stock up from NT$190 to NT$635 (52-week) \u2014 momentum is strong.", "Risks:\n(1) Memory pricing is cyclical \u2014 current shortage pricing may not sustain.\n(2) Small company (220 employees) \u2014 capacity constraints could limit growth.\n(3) Dependent on upstream NAND/DRAM suppliers (Samsung, SK Hynix, Micron) for components.\n(4) Edge AI is still early \u2014 adoption pace could disappoint.\n(5) Massive stock run (235%+ from 52-week low) \u2014 valuation stretched.\n(6) Taiwan geopolitical risk."]}, "sndk": {"title": "SanDisk", "bullets": ["Business: Pure-play NAND flash company \u2014 spun off from Western Digital in Feb 2025. Ticker SNDK. Revenue $5.95B in Q3 FY2026 (+251% YoY, +97% sequentially). Non-GAAP gross margin 78.4% (vs. 22.5% a year earlier). EPS $23.41 (beat consensus). Guiding Q4 to $7.75-8.25B revenue at 79-81% gross margins. Market cap ~$145B. Stock up 3,314% since spinoff \u2014 from $32 to $1,096. JV with Kioxia in Japan for NAND manufacturing. Developing BiCS8 3D NAND for AI inference. Enterprise SSDs up to 256TB designed for AI workloads. $11B+ in multiyear supply agreements with financial guarantees. Joined Nasdaq-100 in April 2026", "AI relevance: One of the most direct AI infrastructure beneficiaries. Data center revenue $1.47B in Q3 (+645% YoY) \u2014 data centers on track to overtake mobile as largest NAND consumer for the first time in 2026. AI data centers are building massive 'data lakes' requiring vastly more storage than traditional computing. NAND prices rose 60% in Q1 2026 with projections of 234% price increase by year-end (Gartner). Supply expected to remain constrained through 2028. On-device AI in phones/PCs also driving larger local storage requirements \u2014 128GB Android config expected to disappear by end 2026", "Investment thesis:\n(1) Pure-play NAND company riding the AI storage supercycle \u2014 data center revenue +645% YoY.\n(2) NAND prices surging (60% in Q1, projected 234% by year-end) with supply tight through 2028.\n(3) Gross margins expanded from 22.5% to 78.4% in one year \u2014 unprecedented margin expansion.\n(4) $11B+ in multiyear supply agreements provide revenue visibility.\n(5) Data centers becoming largest NAND consumer in 2026 \u2014 structural demand shift.\n(6) 256TB enterprise SSDs designed specifically for AI workloads.\n(7) Kioxia JV provides manufacturing partnership for NAND scaling.\n(8) Q4 guide of $7.75-8.25B implies $30B+ annualized run-rate.", "Risks:\n(1) Stock up 3,314% \u2014 valuation is pricing in sustained supercycle pricing.\n(2) NAND pricing is historically the most volatile commodity in semiconductors \u2014 cycles can reverse sharply.\n(3) If AI storage demand growth slows or supply ramps faster than expected, margins compress.\n(4) Competition from Samsung, SK Hynix, Micron, Kioxia in enterprise SSDs.\n(5) Kioxia JV creates interdependency \u2014 disputes could disrupt production.\n(6) On-device AI storage thesis depends on consumer upgrade cycle materializing."]}}</script>
